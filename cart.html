<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Nash Bites | Cart</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF4D2D">
  <link rel="icon" href="/images/tent.jpeg" type="image/jpeg">
  <link rel="apple-touch-icon" href="/images/tent.jpeg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Poppins:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ── DESIGN TOKENS (shared with all Nash Bites pages) ── */
    :root {
      --primary:#FF4D2D; --primary-dark:#e63e20; --primary-light:#FFF0ED; --primary-shadow:rgba(255,77,45,0.35);
      --bg:#F8FAFC; --bg-card:#FFFFFF; --bg-input:#F1F5F9;
      --text:#0F172A; --text-secondary:#64748B; --text-muted:#94A3B8;
      --border:#E2E8F0; --border-hover:#CBD5E1;
      --success:#22C55E; --success-light:#F0FDF4; --success-dark:#15803D;
      --warning:#F59E0B; --warning-light:#FFFBEB; --warning-dark:#B45309;
      --danger:#EF4444; --danger-light:#FEF2F2;
      --info:#3B82F6; --info-light:#EFF6FF;
      --radius:16px; --radius-sm:12px; --radius-xs:8px;
      --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
      --shadow-md:0 4px 6px -1px rgba(0,0,0,0.1);
      --footer-nav-h:70px;
    }
    [data-theme="dark"] {
      --bg:#0B1121; --bg-card:#1A2332; --bg-input:#243044;
      --text:#F1F5F9; --text-secondary:#94A3B8; --text-muted:#64748B;
      --border:#2D3A4A; --border-hover:#3D4A5A;
      --primary-light:#2D1510; --success-light:#052E16;
      --warning-light:#451A03; --danger-light:#450A0A;
      --info-light:#1E3A5F;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
    body { background:var(--bg); color:var(--text); overflow-x:hidden; padding-bottom:calc(var(--footer-nav-h) + 90px); transition:background 0.3s, color 0.3s; line-height:1.6; }

    /* ── HEADER ── */
    .top-header {
      background:var(--primary);
      padding:20px 20px 36px;
      border-radius:0 0 28px 28px;
    }
    .header-row { display:flex; align-items:center; justify-content:space-between; }
    .header-back {
      width:38px; height:38px; border-radius:50%;
      background:rgba(255,255,255,.2); backdrop-filter:blur(10px);
      border:none; color:#fff; font-size:1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:background .2s;
    }
    .header-back:hover { background:rgba(255,255,255,.35); }
    .header-title { font-size:1.1rem; font-weight:800; color:#fff; letter-spacing:-.3px; font-family:'Poppins'; }
    .header-right { display:flex; align-items:center; gap:8px; }
    .header-theme {
      width:34px; height:34px; border-radius:50%;
      background:rgba(255,255,255,.2); border:none; color:#fff;
      font-size:.9rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background .2s;
    }
    .header-theme:hover { background:rgba(255,255,255,.35); }
    .header-clear {
      background:rgba(255,255,255,.2); border:none; color:#fff;
      font-size:.72rem; font-weight:700; padding:6px 14px; border-radius:20px;
      cursor:pointer; transition:background .2s;
    }
    .header-clear:hover { background:rgba(255,255,255,.35); }

    /* ── SECTION LABEL ── */
    .section-label {
      padding:20px 20px 10px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .section-label h2 { font-size:.95rem; font-weight:800; letter-spacing:-.3px; }
    .item-count { font-size:.78rem; font-weight:600; color:var(--text-muted); }

    /* ── CART ITEMS ── */
    .cart-list { padding:0 20px; display:flex; flex-direction:column; gap:12px; }
    .cart-item {
      background:var(--bg-card); border-radius:20px;
      border:1px solid var(--border);
      box-shadow:var(--shadow-sm);
      display:flex; align-items:center; gap:14px; padding:14px;
      animation:fadeUp .3s ease both;
      transition:opacity .3s, transform .3s, border-color .2s, box-shadow .2s;
    }
    .cart-item:hover { border-color:var(--primary); box-shadow:var(--shadow-md); }
    .cart-item.removing { opacity:0; transform:translateX(30px); }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .item-img {
      width:72px; height:72px; border-radius:16px;
      flex-shrink:0; overflow:hidden;
      background:var(--primary-light);
    }
    .item-img img { width:100%; height:100%; object-fit:cover; display:block; }
    .item-img-placeholder {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center; font-size:2rem;
    }
    .item-details { flex:1; min-width:0; }
    .item-vendor {
      font-size:.6rem; font-weight:800; color:var(--primary);
      text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px;
    }
    .item-name {
      font-size:.9rem; font-weight:700; line-height:1.25;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:5px;
    }
    .item-unit-price { font-size:.75rem; color:var(--text-muted); font-weight:600; }
    .item-right { display:flex; flex-direction:column; align-items:flex-end; gap:10px; flex-shrink:0; }
    .item-subtotal { font-size:.95rem; font-weight:800; color:var(--text); }
    .qty-control {
      display:flex; align-items:center;
      background:var(--bg-input); border-radius:12px; overflow:hidden;
      border:1.5px solid var(--border);
    }
    .qty-btn {
      width:32px; height:32px; border:none; background:transparent;
      color:var(--text); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s;
    }
    .qty-btn:hover { background:var(--border); }
    .qty-btn.minus:hover { background:var(--danger-light); }
    .qty-num { min-width:28px; text-align:center; font-size:.88rem; font-weight:800; }

    /* ── SUMMARY CARD ── */
    .summary-card {
      margin:16px 20px 0;
      background:var(--bg-card); border-radius:22px;
      border:1px solid var(--border);
      box-shadow:var(--shadow-sm);
      overflow:hidden;
    }
    .summary-card-header {
      padding:15px 18px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:10px;
    }
    .summary-icon {
      width:34px; height:34px; border-radius:11px;
      background:var(--info-light);
      display:flex; align-items:center; justify-content:center;
      color:var(--info); font-size:.85rem;
    }
    .summary-card-header h3 { font-size:.9rem; font-weight:800; }
    .summary-body { padding:14px 18px; }
    .summary-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:5px 0; font-size:.87rem;
    }
    .summary-row .lbl { color:var(--text-muted); font-weight:600; }
    .summary-row .val { font-weight:700; }
    .summary-divider { height:1px; background:var(--border); margin:10px 0; }
    .summary-total {
      display:flex; justify-content:space-between; align-items:center; padding-top:4px;
    }
    .summary-total .lbl { font-size:1rem; font-weight:800; }
    .summary-total .val { font-size:1.2rem; font-weight:800; color:var(--primary); }

    /* ── EMPTY STATE ── */
    .empty-cart {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:70px 30px; text-align:center;
    }
    .empty-icon {
      width:90px; height:90px; border-radius:28px;
      background:var(--primary-light);
      display:flex; align-items:center; justify-content:center;
      font-size:2.8rem; margin-bottom:20px;
    }
    .empty-cart h2 { font-size:1.1rem; font-weight:800; margin-bottom:8px; }
    .empty-cart p { font-size:.88rem; color:var(--text-muted); line-height:1.5; margin-bottom:24px; }
    .browse-btn {
      background:var(--primary); color:#fff; border:none;
      padding:14px 32px; border-radius:18px; font-weight:700;
      font-size:.92rem; cursor:pointer; text-decoration:none;
      display:inline-flex; align-items:center; gap:8px; transition:background .2s, transform .2s;
    }
    .browse-btn:hover { background:var(--primary-dark); transform:translateY(-2px); }

    /* ── PROCEED BAR ── */
    .proceed-bar {
      position:fixed; bottom:var(--footer-nav-h); left:0; right:0;
      padding:0 20px 12px;
      background:linear-gradient(to top, var(--bg) 60%, transparent);
      z-index:500;
    }
    .proceed-btn {
      width:100%; padding:17px; border:none;
      background:var(--primary); color:#fff; border-radius:20px;
      font-weight:800; font-size:1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:10px;
      box-shadow:0 8px 24px var(--primary-shadow);
      transition:all .25s; letter-spacing:-.2px;
    }
    .proceed-btn:hover { background:var(--primary-dark); transform:translateY(-2px); }

    /* ── FOOTER NAV ── */
    .footer-nav {
      position:fixed; bottom:0; left:0; width:100%;
      background:var(--bg-card); display:flex; justify-content:space-around;
      padding:12px 0 20px; box-shadow:0 -2px 0 var(--border), 0 -10px 30px rgba(0,0,0,.05);
      z-index:2000; border-radius:24px 24px 0 0;
      transition:background 0.3s;
      height:var(--footer-nav-h);
    }
    .footer-nav a {
      text-decoration:none; color:var(--text-muted);
      display:flex; flex-direction:column; align-items:center;
      font-size:.7rem; font-weight:600; gap:4px;
      transition:color .2s;
    }
    .footer-nav a.active { color:var(--primary); }
    .footer-nav a:hover:not(.active) { color:var(--text-secondary); }
    .footer-nav i { font-size:1.2rem; }

    /* ── TOAST ── */
    .toast {
      position:fixed; bottom:calc(var(--footer-nav-h) + 16px); left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--text); color:var(--bg-card); padding:12px 22px; border-radius:50px;
      font-size:.82rem; font-weight:700; white-space:nowrap;
      z-index:5000; opacity:0; transition:all .3s; pointer-events:none;
      box-shadow:var(--shadow-md); display:flex; align-items:center; gap:8px;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="top-header">
  <div class="header-row">
    <button class="header-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
    <span class="header-title">My Cart</span>
    <div class="header-right">
      <button class="header-theme" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">
        <i class="fa-solid fa-moon"></i>
      </button>
      <button class="header-clear" id="clearBtn" onclick="clearCart()" style="display:none">Clear all</button>
      <span id="clearPlaceholder" style="width:56px"></span>
    </div>
  </div>
</div>

<div class="section-label" id="cartLabel" style="display:none">
  <h2>Your Items</h2>
  <span class="item-count" id="itemCountLabel"></span>
</div>
<div class="cart-list" id="cartList"></div>

<div class="summary-card" id="summaryCard" style="display:none">
  <div class="summary-card-header">
    <div class="summary-icon"><i class="fa-solid fa-receipt"></i></div>
    <h3>Order Summary</h3>
  </div>
  <div class="summary-body">
    <div id="summaryRows"></div>
    <div class="summary-divider"></div>
    <div class="summary-row">
      <span class="lbl">Subtotal</span>
      <span class="val" id="subtotalVal">UGX 0</span>
    </div>
    <div class="summary-row">
      <span class="lbl">Delivery fee</span>
      <span class="val" style="color:var(--success)">Free</span>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-total">
      <span class="lbl">Total</span>
      <span class="val" id="totalVal">UGX 0</span>
    </div>
  </div>
</div>

<div class="empty-cart" id="emptyState" style="display:none">
  <div class="empty-icon">🛒</div>
  <h2>Your cart is empty</h2>
  <p>Browse the menu and add something delicious!</p>
  <a href="home.html" class="browse-btn"><i class="fa-solid fa-utensils"></i> Browse Menu</a>
</div>

<div class="proceed-bar" id="proceedBar" style="display:none">
  <button class="proceed-btn" onclick="location.href='checkout.html'">
    Proceed to Checkout <i class="fa-solid fa-arrow-right"></i>
  </button>
</div>

<nav class="footer-nav">
  <a href="home.html"><i class="fa-solid fa-house"></i><span>Menu</span></a>
  <a href="order-history.html"><i class="fa-solid fa-receipt"></i><span>Orders</span></a>
  <a href="cart.html" class="active"><i class="fa-solid fa-bag-shopping"></i><span>Cart</span></a>
  <a href="profile.html"><i class="fa-solid fa-user"></i><span>Profile</span></a>
</nav>

<div class="toast" id="toast">
  <i class="fa-solid fa-circle-check" style="color:var(--success)"></i>
  <span id="toastMsg"></span>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://lwpwicajcbcmzkyecnbv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3cHdpY2FqY2JjbXpreWVjbmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDgxNjAsImV4cCI6MjA5MTkyNDE2MH0.BF2azgoZPOmo4OP9Zo1-QNpXX-EJ23BWQx-lf3GgW68'
);

let mealDetails = {};

// ── THEME (shared logic across all Nash Bites pages) ──
function loadTheme() {
  const t = localStorage.getItem('nash-theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  updateThemeIcon(t);
}
function updateThemeIcon(t) {
  const btn = document.getElementById('themeBtn');
  if (btn) btn.querySelector('i').className = t === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
}
window.toggleTheme = () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('nash-theme', next);
  updateThemeIcon(next);
};

async function init() {
  loadTheme();
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) { location.href = 'index.html'; return; }
  await hydrateMeals();
  renderCart();
}

async function hydrateMeals() {
  const cart = getCart();
  if (!cart.length) return;
  const { data } = await supabase
    .from('meals')
    .select('id, name, price, image_url, profiles!meals_vendor_id_fkey(business_name)')
    .in('id', cart.map(i => i.id));
  if (data) data.forEach(m => { mealDetails[m.id] = m; });
}

function getCart() { return JSON.parse(localStorage.getItem('nash_cart') || '[]'); }
function saveCart(c) { localStorage.setItem('nash_cart', JSON.stringify(c)); }

function renderCart() {
  const cart = getCart();
  const has = cart.length > 0;

  document.getElementById('emptyState').style.display      = has ? 'none'   : 'flex';
  document.getElementById('cartLabel').style.display        = has ? 'flex'   : 'none';
  document.getElementById('summaryCard').style.display      = has ? 'block'  : 'none';
  document.getElementById('proceedBar').style.display       = has ? 'block'  : 'none';
  document.getElementById('clearBtn').style.display         = has ? 'inline' : 'none';
  document.getElementById('clearPlaceholder').style.display = has ? 'none'   : 'inline';

  if (!has) { document.getElementById('cartList').innerHTML = ''; return; }

  const totalQty   = cart.reduce((s, i) => s + (i.qty || 1), 0);
  const totalPrice = cart.reduce((s, i) => s + (i.price * (i.qty || 1)), 0);

  document.getElementById('itemCountLabel').textContent = `${totalQty} item${totalQty !== 1 ? 's' : ''}`;
  document.getElementById('subtotalVal').textContent    = `UGX ${totalPrice.toLocaleString()}`;
  document.getElementById('totalVal').textContent       = `UGX ${totalPrice.toLocaleString()}`;

  document.getElementById('summaryRows').innerHTML = cart.map(i =>
    `<div class="summary-row">
      <span class="lbl">${esc(i.name)} <span style="opacity:.6">×${i.qty||1}</span></span>
      <span class="val">UGX ${((+i.price)*(i.qty||1)).toLocaleString()}</span>
    </div>`
  ).join('');

  document.getElementById('cartList').innerHTML = cart.map((item, idx) => {
    const d = mealDetails[item.id];
    const imgHtml = d?.image_url
      ? `<img src="${d.image_url}" alt="${esc(item.name)}" loading="lazy">`
      : `<div class="item-img-placeholder">🍽️</div>`;
    return `
    <div class="cart-item" id="ci-${item.id}" style="animation-delay:${idx*50}ms">
      <div class="item-img">${imgHtml}</div>
      <div class="item-details">
        ${d?.profiles?.business_name ? `<div class="item-vendor">${esc(d.profiles.business_name)}</div>` : ''}
        <div class="item-name">${esc(item.name)}</div>
        <div class="item-unit-price">UGX ${(+item.price).toLocaleString()} each</div>
      </div>
      <div class="item-right">
        <div class="item-subtotal">UGX ${((+item.price)*(item.qty||1)).toLocaleString()}</div>
        <div class="qty-control">
          <button class="qty-btn minus" onclick="changeQty('${item.id}',-1)">
            ${(item.qty||1)===1
              ? '<i class="fa-solid fa-trash" style="font-size:.72rem;color:var(--danger)"></i>'
              : '<i class="fa-solid fa-minus" style="font-size:.72rem"></i>'}
          </button>
          <span class="qty-num">${item.qty||1}</span>
          <button class="qty-btn" onclick="changeQty('${item.id}',1)">
            <i class="fa-solid fa-plus" style="font-size:.72rem"></i>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.changeQty = (id, delta) => {
  let cart = getCart();
  const item = cart.find(i => i.id === id);
  if (!item) return;
  const newQty = (item.qty || 1) + delta;
  if (newQty <= 0) {
    const el = document.getElementById(`ci-${id}`);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => { saveCart(cart.filter(i => i.id !== id)); renderCart(); }, 280);
    } else {
      saveCart(cart.filter(i => i.id !== id)); renderCart();
    }
  } else {
    item.qty = newQty; saveCart(cart); renderCart();
  }
};

window.clearCart = () => {
  if (!confirm('Remove all items from your cart?')) return;
  localStorage.removeItem('nash_cart');
  renderCart();
  showToast('Cart cleared');
};

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
