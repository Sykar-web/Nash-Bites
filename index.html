<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF4D2D">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nash Bites">
  <link rel="apple-touch-icon" href="tent.jpg">
  <link rel="icon" type="image/jpeg" href="tent.jpg">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
  <title>Nash Bites | Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root{
      --primary:#FF4D2D;--primary-dark:#e63e20;--primary-light:#FFF0ED;
      --bg:#F4F6FB;--bg-card:#FFFFFF;--bg-input:#F0F3F9;
      --text:#0D1321;--text-secondary:#5A6A85;--text-muted:#9DADC4;--border:#E4EAF4;
      --success:#22C55E;--danger:#EF4444;
      --shadow-md:0 8px 28px rgba(13,19,33,.11);
    }
    [data-theme="dark"]{
      --bg:#080E1C;--bg-card:#111827;--bg-input:#1A2540;
      --text:#F1F5F9;--text-secondary:#8DA0BC;--text-muted:#4A6080;
      --border:#1E2E48;--primary-light:#2A1510;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:background .3s,color .3s;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── SPLASH ── */
    .splash{
      position:fixed;inset:0;
      background:#ffffff;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:0;
      z-index:9999;
      transition:opacity .45s ease, transform .45s ease;
    }
    .splash.hidden{
      opacity:0;
      pointer-events:none;
    }
    .splash-logo{
      width:92px;height:92px;border-radius:24px;overflow:hidden;
      box-shadow:0 8px 28px rgba(0,0,0,.10);
      opacity:0;transform:scale(.72);
      animation:splashPop .55s cubic-bezier(.16,1,.3,1) .15s forwards;
    }
    .splash-logo img{width:100%;height:100%;object-fit:cover;display:block;}
    .splash-name{
      font-family:'Playfair Display',serif;font-size:1.85rem;font-weight:900;
      color:#0D1321;letter-spacing:-.4px;
      margin-top:20px;
      opacity:0;transform:translateY(10px);
      animation:splashUp .45s ease .58s forwards;
    }
    .splash-dots{
      display:flex;align-items:center;gap:7px;
      margin-top:52px;
      opacity:0;
      animation:splashUp .4s ease .95s forwards;
    }
    .splash-dot{
      width:7px;height:7px;border-radius:50%;
      background:#E4EAF4;
      animation:dotPulse 1.2s ease-in-out infinite;
    }
    .splash-dot:nth-child(1){animation-delay:0s;}
    .splash-dot:nth-child(2){animation-delay:.2s;}
    .splash-dot:nth-child(3){animation-delay:.4s;}
    @keyframes splashPop{
      from{opacity:0;transform:scale(.72);}
      to{opacity:1;transform:scale(1);}
    }
    @keyframes splashUp{
      from{opacity:0;transform:translateY(10px);}
      to{opacity:1;transform:translateY(0);}
    }
    @keyframes dotPulse{
      0%,100%{background:#E4EAF4;transform:scale(1);}
      50%{background:#FF4D2D;transform:scale(1.4);}
    }

    /* ── AUTH BOX ── */
    .auth-box{display:none;background:var(--bg-card);border-radius:24px;border:1px solid var(--border);padding:36px 32px;width:100%;max-width:420px;box-shadow:var(--shadow-md);animation:fadeIn .4s ease;}
    .auth-header{text-align:center;margin-bottom:28px;}
    .auth-logo{width:56px;height:56px;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(255,77,45,.3);margin:0 auto 12px;}
    .auth-logo img{width:100%;height:100%;object-fit:cover;}
    .auth-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;margin-bottom:4px;}
    .auth-sub{font-size:.88rem;color:var(--text-muted);font-weight:600;}
    .tabs{display:flex;gap:4px;background:var(--bg-input);border-radius:12px;padding:4px;margin-bottom:22px;}
    .tab-btn{flex:1;padding:10px;border:none;border-radius:9px;background:transparent;color:var(--text-secondary);font-weight:700;font-size:.88rem;cursor:pointer;transition:.2s;font-family:'Nunito',sans-serif;}
    .tab-btn.active{background:var(--bg-card);color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.08);}
    .form-group{margin-bottom:14px;}
    .form-label{display:block;font-size:.72rem;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.84rem;pointer-events:none;}
    .form-input{width:100%;padding:12px 12px 12px 40px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg-input);font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:600;color:var(--text);outline:none;transition:.2s;}
    .form-input:focus{border-color:var(--primary);background:var(--bg-card);box-shadow:0 0 0 3px rgba(255,77,45,.12);}
    .form-input::placeholder{color:var(--text-muted);}
    .submit-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 20px rgba(255,77,45,.32);margin-top:4px;}
    .submit-btn:hover{background:var(--primary-dark);transform:translateY(-1px);}
    .submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .msg{padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:700;margin-top:12px;display:none;align-items:center;gap:8px;}
    .msg.show{display:flex;}
    .msg.ok{background:var(--primary-light);color:var(--primary);border:1px solid rgba(255,77,45,.2);}
    .msg.err{background:#FEF2F2;color:var(--danger);border:1px solid #FECACA;}
    [data-theme="dark"] .msg.err{background:#450A0A;border-color:#991B1B;}
    .forgot-link{text-align:center;margin-top:12px;font-size:.82rem;color:var(--text-muted);}
    .forgot-link a{color:var(--primary);font-weight:700;text-decoration:none;}
    .btn-spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none;}
    .loading .btn-spinner{display:block;}
    .loading .btn-label{display:none;}
    .theme-toggle{position:fixed;top:16px;right:16px;width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-secondary);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:.2s;}
    .theme-toggle:hover{border-color:var(--primary);color:var(--primary);}
  </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn"><i class="fa-solid fa-moon"></i></button>

<div class="splash" id="splash">
  <div class="splash-logo"><img src="tent.jpg" alt="Nash Bites"></div>
  <div class="splash-name">Nash Bites</div>
  <div class="splash-dots">
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
</div>

<div class="auth-box" id="authBox">
  <div class="auth-header">
    <div class="auth-logo"><img src="tent.jpg" alt="Nash Bites"></div>
    <div class="auth-title">Nash Bites</div>
    <div class="auth-sub">Order fresh food, fast delivery</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
    <button class="tab-btn" id="tabSignUp" onclick="switchTab('signup')">Create Account</button>
  </div>

  <form id="signinForm" onsubmit="handleSignIn(event)">
    <div class="form-group">
      <label class="form-label">Email</label>
      <div class="input-wrap"><i class="fa-solid fa-envelope"></i>
        <input class="form-input" type="email" id="siEmail" placeholder="you@example.com" required autocomplete="email">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap"><i class="fa-solid fa-lock"></i>
        <input class="form-input" type="password" id="siPass" placeholder="Your password" required autocomplete="current-password">
      </div>
    </div>
    <button class="submit-btn" type="submit" id="siBtn">
      <div class="btn-spinner"></div>
      <span class="btn-label"><i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In</span>
    </button>
    <div class="msg" id="siMsg"></div>
    <div class="forgot-link"><a href="#" onclick="handleForgot(event)">Forgot password?</a></div>
  </form>

  <form id="signupForm" onsubmit="handleSignUp(event)" style="display:none;">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <div class="input-wrap"><i class="fa-solid fa-user"></i>
        <input class="form-input" type="text" id="suName" placeholder="Your full name" required autocomplete="name">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <div class="input-wrap"><i class="fa-solid fa-envelope"></i>
        <input class="form-input" type="email" id="suEmail" placeholder="you@example.com" required autocomplete="email">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap"><i class="fa-solid fa-lock"></i>
        <input class="form-input" type="password" id="suPass" placeholder="Min. 8 characters" required autocomplete="new-password">
      </div>
    </div>
    <button class="submit-btn" type="submit" id="suBtn">
      <div class="btn-spinner"></div>
      <span class="btn-label"><i class="fa-solid fa-user-plus"></i> Create Account</span>
    </button>
    <div class="msg" id="suMsg"></div>
  </form>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const S = createClient(
  'https://lwpwicajcbcmzkyecnbv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3cHdpY2FqY2JjbXpreWVjbmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDgxNjAsImV4cCI6MjA5MTkyNDE2MH0.BF2azgoZPOmo4OP9Zo1-QNpXX-EJ23BWQx-lf3GgW68'
);

async function checkAuth(){
  const {data:{session}} = await S.auth.getSession();
  if(session){ location.replace('home.html'); return; }
  // Let the splash animations finish, then fade it out
  setTimeout(()=>{
    const splash=document.getElementById('splash');
    splash.classList.add('hidden');
    setTimeout(()=>{
      splash.style.display='none';
      document.getElementById('authBox').style.display='block';
    }, 450);
  }, 2200);
}
checkAuth();

window.handleSignIn = async (e) => {
  e.preventDefault();
  const btn=document.getElementById('siBtn');
  const email=document.getElementById('siEmail').value.trim();
  const pass=document.getElementById('siPass').value;
  setLoading(btn,true); showMsg('siMsg','','');
  const {error}=await S.auth.signInWithPassword({email,password:pass});
  if(error){showMsg('siMsg',error.message,'err');setLoading(btn,false);return;}
  showMsg('siMsg','Signed in! Loading…','ok');
  setTimeout(()=>location.replace('home.html'),500);
};

window.handleSignUp = async (e) => {
  e.preventDefault();
  const btn=document.getElementById('suBtn');
  const name=document.getElementById('suName').value.trim();
  const email=document.getElementById('suEmail').value.trim();
  const pass=document.getElementById('suPass').value;
  if(pass.length<8){showMsg('suMsg','Password must be at least 8 characters','err');return;}
  setLoading(btn,true); showMsg('suMsg','','');
  const {data,error}=await S.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  if(error){showMsg('suMsg',error.message,'err');setLoading(btn,false);return;}
  if(data.user){
    await S.from('profiles').upsert({id:data.user.id,full_name:name,email,created_at:new Date().toISOString()});
  }
  showMsg('suMsg','✓ Account created! Check your email to confirm, then sign in.','ok');
  setLoading(btn,false);
};

window.handleForgot = async (e) => {
  e.preventDefault();
  const email=document.getElementById('siEmail').value.trim();
  if(!email){showMsg('siMsg','Enter your email above first','err');return;}
  const {error}=await S.auth.resetPasswordForEmail(email);
  if(error)showMsg('siMsg',error.message,'err');
  else showMsg('siMsg','✓ Password reset email sent!','ok');
};

window.switchTab = (tab) => {
  const isSignIn=tab==='signin';
  document.getElementById('tabSignIn').classList.toggle('active',isSignIn);
  document.getElementById('tabSignUp').classList.toggle('active',!isSignIn);
  document.getElementById('signinForm').style.display=isSignIn?'':'none';
  document.getElementById('signupForm').style.display=isSignIn?'none':'';
};

function setLoading(btn,loading){btn.disabled=loading;btn.classList.toggle('loading',loading);}
function showMsg(id,msg,type){const el=document.getElementById(id);if(!msg){el.classList.remove('show');return;}el.textContent=msg;el.className=`msg ${type} show`;}
</script>
<script>
function loadTheme(){const t=localStorage.getItem('nash-theme')||'light';document.documentElement.setAttribute('data-theme',t);document.querySelector('#themeBtn i').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}
window.toggleTheme=()=>{const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('nash-theme',t);document.querySelector('#themeBtn i').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';};
loadTheme();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
</script>
</body>
</html>
