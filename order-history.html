<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF4D2D">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nash Bites">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>My Orders | Nash Bites</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{
      --primary:#FF4D2D;--primary-dark:#e63e20;--primary-light:#FFF0ED;
      --bg:#F5F7FA;--bg-card:#FFFFFF;--bg-input:#F1F5F9;
      --text:#0F172A;--text-secondary:#64748B;--text-muted:#94A3B8;
      --border:#E2E8F0;--success:#22C55E;--success-light:#F0FDF4;
      --warning:#F59E0B;--warning-light:#FFFBEB;
      --danger:#EF4444;--danger-light:#FEF2F2;
      --info:#3B82F6;--info-light:#EFF6FF;
      --purple:#7C3AED;--purple-light:#F5F3FF;
      --whatsapp:#25D366;
      --shadow-sm:0 1px 4px rgba(0,0,0,0.06);
      --shadow-md:0 4px 16px rgba(0,0,0,0.08);
      --footer-h:68px;
    }
    [data-theme="dark"]{
      --bg:#0A0F1E;--bg-card:#141B2D;--bg-input:#1E2940;
      --text:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;
      --border:#243046;--primary-light:#2A1510;
      --success-light:#052E16;--warning-light:#451A03;
      --danger-light:#450A0A;--info-light:#172554;--purple-light:#2E1065;
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:'DM Sans',sans-serif;}
    body{background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;transition:background .3s,color .3s;}

    /* ── HEADER ── */
    .page-header{
      background:var(--bg-card);border-bottom:1px solid var(--border);
      position:sticky;top:0;z-index:100;
      padding:16px 20px;
      display:flex;align-items:center;justify-content:space-between;
      transition:background .3s;
    }
    .header-left{display:flex;align-items:center;gap:12px;}
    .back-btn{width:36px;height:36px;border-radius:50%;background:var(--bg-input);border:1px solid var(--border);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;text-decoration:none;transition:.2s;}
    .back-btn:hover{border-color:var(--primary);color:var(--primary);}
    .header-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;}
    .theme-btn{width:36px;height:36px;border-radius:50%;background:var(--bg-input);border:1px solid var(--border);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;transition:.2s;}
    .theme-btn:hover{border-color:var(--primary);color:var(--primary);}

    /* ── CONTENT ── */
    .content{max-width:680px;margin:0 auto;padding:20px 16px;}
    @media(min-width:768px){.content{padding:28px 20px;}}

    /* ── FILTER CHIPS ── */
    .filter-bar{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;padding:2px;}
    .filter-bar::-webkit-scrollbar{display:none;}
    .chip{padding:7px 16px;border-radius:50px;border:1.5px solid var(--border);background:var(--bg-card);font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s;color:var(--text-secondary);}
    .chip:hover{border-color:var(--primary);color:var(--primary);}
    .chip.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 3px 10px rgba(255,77,45,.3);}

    /* ── EMPTY / LOADING ── */
    .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
    .empty-state i{font-size:2.5rem;margin-bottom:14px;display:block;opacity:.35;}
    .empty-state h3{font-size:1rem;font-weight:700;color:var(--text-secondary);margin-bottom:6px;}
    .spinner-wrap{display:flex;justify-content:center;padding:60px;}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── ORDER LIST ITEM (expandable) ── */
    /* ── ORDER LIST ── */
    .order-list{display:flex;flex-direction:column;gap:14px;}
    .order-item{
      background:var(--bg-card);border:1.5px solid var(--border);
      border-radius:20px;overflow:hidden;
      transition:border-color .2s,box-shadow .2s;
      box-shadow:var(--shadow-sm);
    }
    .order-item:hover{box-shadow:var(--shadow-md);}
    .order-item.expanded{border-color:var(--primary);}

    /* ── MEAL IMAGE STRIP (always visible) ── */
    .order-preview{padding:14px 16px 12px;display:flex;align-items:center;gap:0;cursor:pointer;}
    .preview-imgs{display:flex;flex-shrink:0;}
    .preview-img{
      width:54px;height:54px;border-radius:12px;object-fit:cover;
      border:2.5px solid var(--bg-card);background:var(--bg-input);
      flex-shrink:0;margin-right:-12px;
      box-shadow:0 2px 8px rgba(0,0,0,.12);
    }
    .preview-more{
      width:54px;height:54px;border-radius:12px;
      background:var(--bg-input);border:2.5px solid var(--bg-card);
      display:flex;align-items:center;justify-content:center;
      font-size:.68rem;font-weight:800;color:var(--text-secondary);
      flex-shrink:0;margin-right:-12px;box-shadow:0 2px 8px rgba(0,0,0,.1);
    }
    .preview-info{flex:1;min-width:0;padding-left:22px;}
    .preview-names{font-size:.84rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
    .preview-vendor{font-size:.71rem;color:var(--text-muted);font-weight:500;}

    /* ── ROW META ── */
    .order-row{
      display:flex;align-items:center;gap:12px;
      padding:0 16px 14px;cursor:pointer;user-select:none;
    }
    .order-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .dot-pending{background:var(--warning);}
    .dot-preparing,.dot-ready{background:var(--info);}
    .dot-out-for-delivery,.dot-picked_up,.dot-in_transit{background:var(--purple);}
    .dot-delivered{background:var(--success);}
    .dot-cancelled{background:var(--danger);}

    .order-row-main{flex:1;min-width:0;}
    .order-row-id{font-size:.75rem;font-weight:700;color:var(--text-muted);margin-bottom:2px;font-family:monospace;}
    .order-row-meta{font-size:.72rem;color:var(--text-muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .order-row-meta span{display:flex;align-items:center;gap:3px;}
    .order-row-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
    .order-pill{padding:3px 10px;border-radius:50px;font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.3px;}
    .pill-pending{background:var(--warning-light);color:#B45309;}
    .pill-preparing,.pill-ready{background:var(--info-light);color:#1D4ED8;}
    .pill-out-for-delivery,.pill-picked_up,.pill-in_transit{background:var(--purple-light);color:var(--purple);}
    .pill-delivered{background:var(--success-light);color:#15803D;}
    .pill-cancelled{background:var(--danger-light);color:#DC2626;}
    .order-total{font-family:'Syne',sans-serif;font-size:.92rem;font-weight:800;color:var(--primary);}
    .chevron{font-size:.75rem;color:var(--text-muted);transition:transform .25s;}
    .order-item.expanded .chevron{transform:rotate(180deg);}

    /* ── EXPANDED DETAIL ── */
    .order-detail{
      max-height:0;overflow:hidden;
      transition:max-height .4s cubic-bezier(.16,1,.3,1);
      border-top:0 solid var(--border);
    }
    .order-item.expanded .order-detail{max-height:1000px;border-top-width:1px;}
    .detail-inner{padding:16px;}

    /* ── ITEM ROWS IN DETAIL ── */
    .detail-items{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
    .detail-item-row{display:flex;align-items:center;gap:12px;padding:10px;background:var(--bg-input);border-radius:14px;}
    .item-img{width:58px;height:58px;border-radius:12px;object-fit:cover;background:var(--bg-input);flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.1);}
    .item-img-ph{width:58px;height:58px;border-radius:12px;background:var(--primary-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
    .item-info{flex:1;min-width:0;}
    .item-name{font-size:.88rem;font-weight:700;margin-bottom:3px;}
    .item-qty{font-size:.73rem;color:var(--text-muted);font-weight:500;}
    .item-price{font-size:.88rem;font-weight:800;color:var(--primary);flex-shrink:0;}

    /* info rows */
    .detail-info{background:var(--bg-input);border-radius:12px;padding:12px;margin-bottom:12px;}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:.82rem;}
    .info-row:not(:last-child){border-bottom:1px solid var(--border);}
    .info-label{color:var(--text-muted);font-weight:500;}
    .info-val{font-weight:700;text-align:right;max-width:60%;}
    .info-val.brand{color:var(--primary);}
    .info-val.green{color:var(--success);}
    .pin-display{
      font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;
      letter-spacing:6px;color:var(--primary);
    }

    /* carrier card */
    .carrier-card{
      background:var(--success-light);border:1px solid #86EFAC;
      border-radius:12px;padding:12px;margin-bottom:12px;
      display:flex;align-items:center;gap:10px;
    }
    [data-theme="dark"] .carrier-card{background:#052E16;border-color:#166534;}
    .carrier-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;}
    .carrier-info{flex:1;}
    .carrier-name{font-size:.88rem;font-weight:700;color:#15803D;}
    [data-theme="dark"] .carrier-name{color:#86EFAC;}
    .carrier-vehicle{font-size:.73rem;color:#16A34A;}
    [data-theme="dark"] .carrier-vehicle{color:#4ADE80;}
    .carrier-call{background:#16A34A;color:#fff;border:none;border-radius:9px;padding:7px 12px;font-size:.75rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:5px;transition:.2s;}
    .carrier-call:hover{background:#15803D;}

    /* action buttons */
    .detail-actions{display:flex;gap:8px;margin-top:4px;}
    .act-btn{flex:1;padding:11px;border-radius:12px;font-size:.8rem;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s;font-family:inherit;}
    .act-btn-wa{background:var(--whatsapp);color:#fff;}
    .act-btn-wa:hover{filter:brightness(.92);}
    .act-btn-cancel{background:var(--bg-input);color:var(--danger);border:1px solid var(--danger-light);}
    .act-btn-cancel:hover{background:var(--danger-light);}
    .act-btn-delete{background:var(--danger-light);color:var(--danger);}
    .act-btn-delete:hover{background:#FECACA;}
    .act-btn-disabled{background:var(--bg-input);color:var(--text-muted);cursor:default;opacity:.5;}

    /* ── FAB BUBBLE NAV ── */
    .footer-nav{ display:none!important; }
    .fab-nav{position:fixed;bottom:28px;right:22px;z-index:2000;display:flex;flex-direction:column-reverse;align-items:center;gap:12px;}
    @media(min-width:768px){.fab-nav{display:none;}}
    .fab-main{width:56px;height:56px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 8px 28px rgba(255,77,45,.48);transition:transform .3s cubic-bezier(.16,1,.3,1),background .2s;position:relative;z-index:2;-webkit-tap-highlight-color:transparent;}
    .fab-main:hover{background:var(--primary-dark);}
    .fab-main .fab-icon-open,.fab-main .fab-icon-close{transition:opacity .2s,transform .3s cubic-bezier(.16,1,.3,1);position:absolute;}
    .fab-main .fab-icon-close{opacity:0;transform:rotate(-90deg);}
    .fab-nav.open .fab-main{transform:rotate(45deg);background:var(--text);}
    .fab-nav.open .fab-main .fab-icon-open{opacity:0;transform:rotate(90deg);}
    .fab-nav.open .fab-main .fab-icon-close{opacity:1;transform:rotate(0);}
    .fab-main::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid rgba(255,77,45,.25);transform:scale(0);opacity:0;transition:transform .3s,opacity .3s;}
    .fab-nav.open .fab-main::after{transform:scale(1);opacity:1;}
    .fab-items{display:flex;flex-direction:column-reverse;align-items:center;gap:10px;pointer-events:none;}
    .fab-nav.open .fab-items{pointer-events:auto;}
    .fab-item{display:flex;align-items:center;text-decoration:none;opacity:0;transform:translateY(20px) scale(.7);transition:opacity .28s,transform .28s cubic-bezier(.16,1,.3,1);}
    .fab-nav.open .fab-item{opacity:1;transform:translateY(0) scale(1);}
    .fab-nav.open .fab-item:nth-child(1){transition-delay:.03s;}
    .fab-nav.open .fab-item:nth-child(2){transition-delay:.07s;}
    .fab-nav.open .fab-item:nth-child(3){transition-delay:.11s;}
    .fab-label{background:var(--bg-card);color:var(--text);font-size:.7rem;font-weight:800;padding:5px 11px;border-radius:20px;box-shadow:var(--shadow-md);border:1px solid var(--border);white-space:nowrap;margin-right:8px;opacity:0;transform:translateX(6px);transition:opacity .2s .1s,transform .2s .1s;}
    .fab-nav.open .fab-item:hover .fab-label,.fab-nav.open .fab-item:focus .fab-label{opacity:1;transform:translateX(0);}
    .fab-circle{width:46px;height:46px;border-radius:50%;background:var(--bg-card);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:var(--shadow-md);border:1.5px solid var(--border);transition:background .2s,color .2s,border-color .2s,transform .15s;flex-shrink:0;}
    .fab-item[data-nav="home"] .fab-circle{color:var(--primary);border-color:#FFCBBB;background:var(--primary-light);}
    .fab-item[data-nav="home"]:hover .fab-circle{background:var(--primary);color:#fff;border-color:var(--primary);transform:scale(1.08);}
    .fab-item[data-nav="cart"] .fab-circle{color:#22C55E;border-color:#BBF7D0;background:#F0FDF4;}
    .fab-item[data-nav="cart"]:hover .fab-circle{background:#22C55E;color:#fff;border-color:#22C55E;transform:scale(1.08);}
    [data-theme="dark"] .fab-item[data-nav="cart"] .fab-circle{background:#052E16;border-color:#166534;color:#4ADE80;}
    .fab-item[data-nav="profile"] .fab-circle{color:#F59E0B;border-color:#FDE68A;background:#FFFBEB;}
    .fab-item[data-nav="profile"]:hover .fab-circle{background:#F59E0B;color:#fff;border-color:#F59E0B;transform:scale(1.08);}
    [data-theme="dark"] .fab-item[data-nav="profile"] .fab-circle{background:#451A03;border-color:#78350F;color:#FCD34D;}
  </style>
</head>
<body>

<header class="page-header">
  <div class="header-left">
    <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="header-title">My Orders</div>
  </div>
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
</header>

<div class="content">
  <div class="filter-bar" id="filterBar">
    <button class="chip active" onclick="setFilter('all',this)">All</button>
    <button class="chip" onclick="setFilter('pending',this)">Pending</button>
    <button class="chip" onclick="setFilter('active',this)">Active</button>
    <button class="chip" onclick="setFilter('delivered',this)">Delivered</button>
    <button class="chip" onclick="setFilter('cancelled',this)">Cancelled</button>
  </div>
  <div id="ordersContainer">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- FAB BUBBLE NAV — Orders is current page, excluded -->
<nav class="fab-nav" id="fabNav">
  <button class="fab-main" onclick="toggleFab()" aria-label="Navigation">
    <i class="fa-solid fa-grip-dots-vertical fab-icon-open"></i>
    <i class="fa-solid fa-xmark fab-icon-close"></i>
  </button>
  <div class="fab-items">
    <a href="home.html" class="fab-item" data-nav="home">
      <span class="fab-label">Menu</span>
      <div class="fab-circle"><i class="fa-solid fa-house"></i></div>
    </a>
    <a href="cart.html" class="fab-item" data-nav="cart">
      <span class="fab-label">Cart</span>
      <div class="fab-circle"><i class="fa-solid fa-bag-shopping"></i></div>
    </a>
    <a href="profile.html" class="fab-item" data-nav="profile">
      <span class="fab-label">Profile</span>
      <div class="fab-circle"><i class="fa-solid fa-user"></i></div>
    </a>
  </div>
</nav>
<script>
  function toggleFab(){document.getElementById('fabNav').classList.toggle('open');}
  function closeFab(){document.getElementById('fabNav').classList.remove('open');}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeFab();});
</script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const S = createClient(
  'https://lwpwicajcbcmzkyecnbv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3cHdpY2FqY2JjbXpreWVjbmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDgxNjAsImV4cCI6MjA5MTkyNDE2MH0.BF2azgoZPOmo4OP9Zo1-QNpXX-EJ23BWQx-lf3GgW68'
);
const SUPPORT = '256748372023';
let userId = null, allOrders = [], currentFilter = 'all';

// ── Theme ──
function loadTheme(){const t=localStorage.getItem('nash-theme')||'light';document.documentElement.setAttribute('data-theme',t);document.querySelector('#themeBtn i').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}
window.toggleTheme=()=>{const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('nash-theme',t);document.querySelector('#themeBtn i').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';};

// ── Init ──
async function init(){
  loadTheme();
  const {data:{user}}=await S.auth.getUser();
  if(!user){location.href='index.html';return;}
  userId=user.id;
  await fetchOrders();
  S.channel('my-orders')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'orders'},(p)=>{
      if(p.new.customer_id===userId||p.new.user_id===userId) fetchOrders();
    })
    .subscribe();
}

// Cache for meal images keyed by meal id
let mealImageCache={};

async function fetchMealImages(orders){
  // Collect all unique meal IDs from all orders
  const ids=new Set();
  orders.forEach(o=>(Array.isArray(o.items)?o.items:[]).forEach(i=>{if(i.id)ids.add(i.id);}));
  const missing=[...ids].filter(id=>!mealImageCache[id]);
  if(!missing.length) return;
  const {data}=await S.from('meals').select('id,image_url').in('id',missing);
  (data||[]).forEach(m=>{mealImageCache[m.id]=m.image_url||null;});
}

async function fetchOrders(){
  const {data,error}=await S.from('orders')
    .select('*, carrier:profiles!orders_carrier_id_fkey(full_name,phone,avatar_url,vehicle_type,transport_mode)')
    .or(`customer_id.eq.${userId},user_id.eq.${userId}`)
    .order('created_at',{ascending:false});
  if(!error){allOrders=data||[];await fetchMealImages(allOrders);renderOrders();}
  else console.error(error);
}

// ── Filter ──
window.setFilter=(f,btn)=>{
  currentFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
};

function filterOrders(){
  if(currentFilter==='all') return allOrders;
  if(currentFilter==='active') return allOrders.filter(o=>['preparing','ready','picked_up','in_transit'].includes(getStatus(o)));
  return allOrders.filter(o=>getStatus(o)===currentFilter);
}

function getStatus(o){return o.order_status||o.status||'pending';}
function getTotalAmt(o){return Number(o.total_price||o.total_amount||o.total||0).toLocaleString();}

function pillClass(s){
  const map={pending:'pending',preparing:'preparing',ready:'ready','out-for-delivery':'out-for-delivery',picked_up:'picked_up',in_transit:'in_transit',delivered:'delivered',cancelled:'cancelled'};
  return 'pill-'+(map[s]||'pending');
}
function dotClass(s){
  const map={pending:'dot-pending',preparing:'dot-preparing',ready:'dot-preparing','out-for-delivery':'dot-in_transit',picked_up:'dot-picked_up',in_transit:'dot-in_transit',delivered:'dot-delivered',cancelled:'dot-cancelled'};
  return map[s]||'dot-pending';
}

function renderOrders(){
  const filtered=filterOrders();
  const container=document.getElementById('ordersContainer');
  if(!filtered.length){
    container.innerHTML=`<div class="empty-state"><i class="fa-solid fa-receipt"></i><h3>No orders found</h3><p>Your orders will appear here</p></div>`;
    return;
  }
  container.innerHTML=`<div class="order-list">${filtered.map(o=>renderOrderItem(o)).join('')}</div>`;
}

function renderOrderItem(o){
  const status=getStatus(o);
  const date=new Date(o.created_at).toLocaleDateString('en-UG',{day:'numeric',month:'short'});
  const time=new Date(o.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const items=Array.isArray(o.items)?o.items:[];
  const carrier=o.carrier;
  const isConfirmed=['picked_up','in_transit','delivered'].includes(status);
  const isDeletable=['delivered','cancelled'].includes(status);
  const isCancelable=status==='pending';
  const isActive=['preparing','ready','picked_up','in_transit'].includes(status);
  const shortId=o.id.slice(0,8).toUpperCase();
  const statusText=status.replace(/_/g,' ');

  // Resolve image for each item (from cache, item field, or fallback)
  const resolveImg=(i)=>mealImageCache[i.id]||i.image_url||null;

  // ── Preview strip: up to 3 stacked images + overflow count ──
  const previewImgs=items.slice(0,3).map(i=>{
    const src=resolveImg(i);
    return src
      ? `<img class="preview-img" src="${esc(src)}" alt="${esc(i.name||'')}" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="preview-img" style="display:flex;align-items:center;justify-content:center;font-size:1.2rem;background:var(--primary-light);">🍽️</div>`;
  }).join('');
  const overflowBadge=items.length>3?`<div class="preview-more">+${items.length-3}</div>`:'';
  const previewNames=items.slice(0,2).map(i=>esc(i.name||'Item')).join(', ')+(items.length>2?` +${items.length-2} more`:'');
  const vendorNames=[...new Set(items.map(i=>i.vendor).filter(Boolean))].slice(0,2).join(', ')||'Nash Bites';

  // ── Detail item rows ──
  const itemsHtml=items.map(i=>{
    const src=resolveImg(i);
    const imgEl=src
      ? `<img class="item-img" src="${esc(src)}" alt="${esc(i.name||'')}" loading="lazy" onerror="this.outerHTML='<div class=\'item-img-ph\'>🍽️</div>'">`
      : `<div class="item-img-ph">🍽️</div>`;
    return `<div class="detail-item-row">
      ${imgEl}
      <div class="item-info">
        <div class="item-name">${esc(i.name||'Item')}</div>
        <div class="item-qty">× ${i.qty||1}</div>
      </div>
      <div class="item-price">UGX ${Number((i.price||0)*(i.qty||1)).toLocaleString()}</div>
    </div>`;
  }).join('');

  // Resolve carrier avatar — could be a storage path or full URL
  let carrierAvatarSrc = `https://ui-avatars.com/api/?name=${encodeURIComponent(carrier?.full_name||'C')}&background=22c55e&color=fff&size=80`;
  if(carrier?.avatar_url){
    if(carrier.avatar_url.startsWith('http')){
      carrierAvatarSrc = carrier.avatar_url;
    } else {
      // It's a storage path — resolve via Supabase
      const {data:avatarData} = S.storage.from('avatars').getPublicUrl(carrier.avatar_url);
      if(avatarData?.publicUrl) carrierAvatarSrc = avatarData.publicUrl;
    }
  }

  const carrierHtml=isConfirmed&&carrier?`
    <div class="carrier-card">
      <img class="carrier-avatar" src="${carrierAvatarSrc}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(carrier?.full_name||'C')}&background=22c55e&color=fff&size=80'">
      <div class="carrier-info">
        <div class="carrier-name">${carrier.full_name||'Carrier'}</div>
        <div class="carrier-vehicle"><i class="fa-solid fa-bicycle"></i> ${carrier.vehicle_type||carrier.transport_mode||'On the way'}</div>
      </div>
      ${carrier.phone?`<a href="tel:${carrier.phone}" class="carrier-call"><i class="fa-solid fa-phone"></i> Call</a>`:''}
    </div>`:'';

  const actionsHtml=`<div class="detail-actions">
    <a href="https://wa.me/${SUPPORT}?text=Query about Order %23${shortId}" class="act-btn act-btn-wa" style="text-decoration:none;"><i class="fab fa-whatsapp"></i> Support</a>
    ${isCancelable?`<button class="act-btn act-btn-cancel" onclick="cancelOrder('${o.id}',event)"><i class="fa-solid fa-xmark"></i> Cancel</button>`:''}
    ${isDeletable?`<button class="act-btn act-btn-delete" onclick="deleteOrder('${o.id}',event)"><i class="fa-solid fa-trash"></i> Delete</button>`:''}
    ${isActive&&!isCancelable&&!isDeletable?`<span class="act-btn act-btn-disabled">In progress</span>`:''}
  </div>`;

  return `
  <div class="order-item" id="oi-${o.id}">
    <!-- PREVIEW: images always visible -->
    <div class="order-preview" onclick="toggleOrder('${o.id}')">
      <div class="preview-imgs">${previewImgs}${overflowBadge}</div>
      <div class="preview-info">
        <div class="preview-names">${previewNames}</div>
        <div class="preview-vendor"><i class="fa-solid fa-store" style="font-size:.65rem;"></i> ${vendorNames}</div>
      </div>
      <i class="fa-solid fa-chevron-down chevron" style="flex-shrink:0;margin-left:8px;"></i>
    </div>
    <!-- ROW META -->
    <div class="order-row" onclick="toggleOrder('${o.id}')">
      <div class="order-status-dot ${dotClass(status)}"></div>
      <div class="order-row-main">
        <div class="order-row-id">#${shortId}</div>
        <div class="order-row-meta">
          <span><i class="fa-regular fa-calendar"></i>${date}</span>
          <span><i class="fa-regular fa-clock"></i>${time}</span>
          <span><i class="fa-solid fa-utensils"></i>${items.length} item${items.length!==1?'s':''}</span>
        </div>
      </div>
      <div class="order-row-right">
        <span class="order-pill ${pillClass(status)}">${statusText}</span>
        <span class="order-total">UGX ${getTotalAmt(o)}</span>
      </div>
    </div>
    <!-- EXPANDED DETAIL -->
    <div class="order-detail">
      <div class="detail-inner">
        ${items.length?`<div class="detail-items">${itemsHtml}</div>`:''}
        <div class="detail-info">
          <div class="info-row"><span class="info-label">Deliver to</span><span class="info-val">${esc(o.delivery_location||o.address||'—')}</span></div>
          ${o.delivery_pin?`<div class="info-row"><span class="info-label">Delivery PIN</span><span class="info-val"><span class="pin-display">${o.delivery_pin}</span></span></div>`:''}
          <div class="info-row"><span class="info-label">Total Paid</span><span class="info-val brand">UGX ${getTotalAmt(o)}</span></div>
          ${o.special_note?`<div class="info-row"><span class="info-label">Notes</span><span class="info-val">${esc(o.special_note)}</span></div>`:''}
          ${o.special_instructions?`<div class="info-row"><span class="info-label">Instructions</span><span class="info-val">${esc(o.special_instructions)}</span></div>`:''}
        </div>
        ${carrierHtml}
        ${actionsHtml}
      </div>
    </div>
  </div>`;
}

window.toggleOrder=(id)=>{
  const el=document.getElementById(`oi-${id}`);
  const wasExpanded=el.classList.contains('expanded');
  document.querySelectorAll('.order-item.expanded').forEach(e=>e.classList.remove('expanded'));
  if(!wasExpanded) el.classList.add('expanded');
};

window.cancelOrder=async(id,e)=>{
  e.stopPropagation();
  if(!confirm("Cancel this order?")) return;
  const {error}=await S.from('orders').update({order_status:'cancelled',status:'cancelled'}).eq('id',id);
  if(error) alert('Could not cancel: '+error.message);
  else await fetchOrders();
};

window.deleteOrder=async(id,e)=>{
  e.stopPropagation();
  if(!confirm("Delete this order from your history? This can't be undone.")) return;
  // Soft delete — we use a deleted_by_customer flag if available, otherwise hard delete
  const {error}=await S.from('orders').delete().eq('id',id);
  if(error){
    // fallback: mark deleted
    await S.from('orders').update({customer_deleted:true}).eq('id',id);
  }
  allOrders=allOrders.filter(o=>o.id!==id);
  renderOrders();
};

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
