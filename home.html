<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Nash Bites | Your Favorite Menu</title>
  
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF4D2D">
  <link rel="icon" href="/images/tent.jpeg" type="image/jpeg">
  <link rel="apple-touch-icon" href="/images/tent.jpeg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root { --brand: #FF4D2D; --dark: #1A1C1E; --bg: #F8F9FB; }
    * { margin:0; padding:0; box-sizing:border-box; font-family:"Plus Jakarta Sans", sans-serif; }
    
    body { background: var(--bg); color: var(--dark); overflow-x: hidden; padding-bottom: 110px; }

    header { 
        background: var(--brand); color:#fff; padding: 25px 20px 40px 20px; 
        border-radius: 0 0 30px 30px; position: sticky; top: -15px; z-index: 1000;
    }
    .header-content { display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; }

    /* Category Filter */
    .categories { display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none; }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn { 
        padding: 10px 20px; background: white; border-radius: 50px; border: 1px solid #eee;
        font-size: 0.75rem; font-weight: 700; white-space: nowrap; cursor: pointer; transition: 0.3s;
    }
    .cat-btn.active { background: var(--brand); color: white; border-color: var(--brand); }

    .slideshow-section { padding: 0 15px; margin-top: -25px; }
    .slideshow-container {
        width: 100%; height: 180px; border-radius: 25px;
        display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
        scrollbar-width: none; gap: 15px;
    }
    .slideshow-container::-webkit-scrollbar { display: none; }
    
    .slide {
        flex: 0 0 100%; scroll-snap-align: start;
        position: relative; height: 100%; border-radius: 25px; overflow: hidden;
    }
    .slide-img { width: 100%; height: 100%; object-fit: cover; }
    .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 10%, transparent 60%); }
    .slide-info { position: absolute; bottom: 15px; left: 15px; color: white; }

    .search-container { padding: 15px 20px; }
    #mealSearch { 
        width: 100%; padding: 16px 20px 16px 50px; border-radius: 20px; 
        border: none; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.03); outline: none;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="%23FF4D2D" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>');
        background-repeat: no-repeat; background-position: 18px center; background-size: 20px;
    }

    .meal-section { padding: 0 20px; display: grid; gap: 15px; grid-template-columns: repeat(2, 1fr); }
    .meal-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.02); border: 1px solid #f0f0f0; }
    .meal-card img { width: 100%; height: 120px; object-fit: cover; }
    .meal-info { padding: 12px; }
    .vendor-tag { font-size: 0.6rem; font-weight: 800; color: var(--brand); text-transform: uppercase; margin-bottom: 4px; display: block; }
    .meal-info h3 { font-size: 0.85rem; margin-bottom: 5px; height: 35px; overflow: hidden; }
    .meal-price { font-weight: 800; color: var(--dark); font-size: 0.9rem; }
    .add-btn { background: var(--dark); color: white; border: none; border-radius: 12px; padding: 10px; width: 100%; margin-top: 10px; font-weight: 700; font-size: 0.75rem; cursor: pointer; }

    .footer-nav { 
        position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; 
        display: flex; justify-content: space-around; padding: 15px 0 25px 0; 
        box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 2000; border-radius: 25px 25px 0 0;
    }
    .footer-nav a { text-decoration: none; color: #B0B5BB; display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; font-weight: 600; }
    .footer-nav a.active { color: var(--brand); }
    .footer-nav i { font-size: 1.2rem; margin-bottom: 5px; }
  </style>
</head>
<body>

<header>
    <div class="header-content">
      <h1 id="welcomeUser">Muni Dining.</h1>
      <i class="fa fa-bell" style="font-size: 1.2rem;"></i>
    </div>
</header>

<section class="slideshow-section">
    <div class="slideshow-container" id="featuredSlideshow"></div>
</section>

<div class="categories" id="catFilter">
    <button class="cat-btn active" onclick="filterCat('All')">All Meals</button>
    <button class="cat-btn" onclick="filterCat('Local Food')">Local Food</button>
    <button class="cat-btn" onclick="filterCat('Fast Food')">Fast Food</button>
    <button class="cat-btn" onclick="filterCat('Drinks')">Drinks</button>
</div>

<div class="search-container">
    <input type="text" id="mealSearch" placeholder="Search cravings...">
</div>

<section class="meal-section" id="mealSection">
    </section>

<nav class="footer-nav">
  <a href="home.html" class="active"><i class="fa-solid fa-house"></i><span>Menu</span></a>
  <a href="order-history.html"><i class="fa-solid fa-receipt"></i><span>Orders</span></a>
  <a href="cart.html"><i class="fa-solid fa-bag-shopping"></i><span>Cart</span></a>
  <a href="profile.html"><i class="fa-solid fa-user"></i><span>Profile</span></a>
</nav>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://lwpwicajcbcmzkyecnbv.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3cHdpY2FqY2JjbXpreWVjbmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDgxNjAsImV4cCI6MjA5MTkyNDE2MH0.BF2azgoZPOmo4OP9Zo1-QNpXX-EJ23BWQx-lf3GgW68'
const supabase = createClient(supabaseUrl, supabaseKey)

let allMeals = [];

async function init() {
    const { data: { user } } = await supabase.auth.getUser();
    if(!user) { window.location.href="index.html"; return; }

    const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
    if(profile) document.getElementById("welcomeUser").textContent = `Hey, ${profile.full_name.split(' ')[0]}! 👋`;

    // Complex Query: Get Meals from Vendors who are currently ONLINE
    const { data: meals, error } = await supabase
        .from('meals')
        .select('*, profiles!meals_vendor_id_fkey(business_name, is_online)')
        .eq('available', true)
        .eq('profiles.is_online', true); // Only show food from open kitchens

    if(!error) {
        // Filter out null results from the join (in case vendor went offline)
        allMeals = meals.filter(m => m.profiles !== null);
        renderMeals(allMeals);
        renderSlideshow(allMeals);
    }
}

function renderMeals(items) {
    const container = document.getElementById("mealSection");
    container.innerHTML = items.map(meal => `
        <div class="meal-card animate__animated animate__fadeIn">
            <img src="${meal.image_url}" alt="${meal.name}" onclick="location.href='details.html?id=${meal.id}'">
            <div class="meal-info">
                <span class="vendor-tag">${meal.profiles.business_name}</span>
                <h3>${meal.name}</h3>
                <p class="meal-price">UGX ${meal.price.toLocaleString()}</p>
                <button class="add-btn" onclick="addToCart('${meal.id}', '${meal.name}', ${meal.price})">Add to Bag</button>
            </div>
        </div>
    `).join('');
}

function renderSlideshow(items) {
    const slideContainer = document.getElementById("featuredSlideshow");
    slideContainer.innerHTML = items.slice(0, 4).map(meal => `
        <div class="slide">
            <img src="${meal.image_url}" class="slide-img">
            <div class="slide-overlay"></div>
            <div class="slide-info">
                <h2 style="font-size:0.9rem; font-weight:800;">${meal.name}</h2>
                <p style="font-size:0.7rem; opacity:0.8;">Trending at ${meal.profiles.business_name}</p>
            </div>
        </div>
    `).join('');
}

window.filterCat = (cat) => {
    const btns = document.querySelectorAll('.cat-btn');
    btns.forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');

    if(cat === 'All') renderMeals(allMeals);
    else renderMeals(allMeals.filter(m => m.category === cat));
}

document.getElementById("mealSearch").oninput = (e) => {
    const term = e.target.value.toLowerCase();
    renderMeals(allMeals.filter(m => m.name.toLowerCase().includes(term)));
};

window.addToCart = (id, name, price) => {
    let cart = JSON.parse(localStorage.getItem('nash_cart') || '[]');
    cart.push({id, name, price});
    localStorage.setItem('nash_cart', JSON.stringify(cart));
    
    // Quick haptic-like feedback
    const btn = event.target;
    btn.innerText = "Added! ✅";
    btn.style.background = "#2ecc71";
    setTimeout(() => { btn.innerText = "Add to Bag"; btn.style.background = "#1A1C1E"; }, 1500);
};

init();
</script>
</body>
</html>
