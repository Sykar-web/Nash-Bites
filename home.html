<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
  <title>Nash Bites | Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root{
      --primary:#FF4D2D;--primary-dark:#e63e20;--primary-light:#FFF0ED;
      --bg:#F5F7FA;--bg-card:#FFFFFF;--bg-input:#F1F5F9;
      --text:#0F172A;--text-secondary:#64748B;--text-muted:#94A3B8;--border:#E2E8F0;
      --success:#22C55E;--success-light:#F0FDF4;
      --warning:#F59E0B;--danger:#EF4444;
      --shadow-sm:0 2px 8px rgba(0,0,0,.06);--shadow-md:0 6px 20px rgba(0,0,0,.09);
      --footer-h:68px;
    }
    [data-theme="dark"]{
      --bg:#0A0F1E;--bg-card:#141B2D;--bg-input:#1E2940;
      --text:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;
      --border:#243046;--primary-light:#2A1510;--success-light:#052E16;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;padding-bottom:calc(var(--footer-h)+20px);transition:background .3s,color .3s;}

    /* ── TOPBAR ── */
    .topbar{
      position:sticky;top:0;z-index:200;
      background:var(--bg-card);border-bottom:1px solid var(--border);
      padding:0 16px;height:58px;
      display:flex;align-items:center;justify-content:space-between;
      transition:background .3s;
    }
    @media(min-width:768px){.topbar{padding:0 28px;height:64px;}}
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .brand-icon{width:36px;height:36px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;}
    .brand-icon svg{width:20px;height:20px;}
    .brand-name{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text);}
    .topbar-right{display:flex;align-items:center;gap:8px;}
    .top-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg-input);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;transition:.2s;text-decoration:none;}
    .top-btn:hover{border-color:var(--primary);color:var(--primary);}
    .top-btn img{width:100%;height:100%;border-radius:50%;object-fit:cover;}

    /* ── HERO / TICKER ── */
    .hero{background:var(--bg-card);border-bottom:1px solid var(--border);padding:18px 0 0;}
    .hero-inner{padding:0 16px 14px;max-width:1200px;margin:0 auto;}
    @media(min-width:768px){.hero-inner{padding:0 28px 18px;}}
    .hero-title{font-family:'Syne',sans-serif;font-size:clamp(1.3rem,3.5vw,1.8rem);font-weight:800;letter-spacing:-.3px;margin-bottom:3px;color:var(--text);}
    .hero-sub{font-size:.85rem;color:var(--text-muted);font-weight:500;}

    /* Ticker */
    .ticker-wrap{overflow:hidden;position:relative;margin:0;padding:12px 0;}
    .ticker-fade-l,.ticker-fade-r{position:absolute;top:0;bottom:0;width:48px;z-index:5;pointer-events:none;}
    .ticker-fade-l{left:0;background:linear-gradient(to right,var(--bg-card),transparent);}
    .ticker-fade-r{right:0;background:linear-gradient(to left,var(--bg-card),transparent);}
    .ticker-track{display:flex;gap:12px;padding:0 16px;animation:ticker-scroll 40s linear infinite;width:max-content;}
    .ticker-track:hover{animation-play-state:paused;}
    @keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .ticker-card{
      flex-shrink:0;background:var(--bg-input);border:1px solid var(--border);border-radius:14px;
      padding:10px 12px 10px 10px;display:flex;align-items:center;gap:10px;
      min-width:200px;max-width:240px;cursor:pointer;transition:.2s;
    }
    .ticker-card:hover{border-color:var(--primary);background:var(--primary-light);}
    .ticker-img{width:48px;height:48px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--border);}
    .ticker-img-ph{width:48px;height:48px;border-radius:10px;background:var(--primary-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
    .ticker-info{flex:1;min-width:0;}
    .ticker-name{font-size:.78rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
    .ticker-review{font-size:.68rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;margin-bottom:3px;}
    .ticker-stars{display:flex;gap:1px;align-items:center;}
    .ticker-stars i{color:var(--warning);font-size:.58rem;}
    .ticker-stars i.empty{color:var(--border);}
    .ticker-stars span{font-size:.62rem;font-weight:700;color:var(--text-secondary);margin-left:3px;}

    /* Vendor meta */
    .vendor-meta{display:flex;flex-wrap:wrap;gap:10px;padding:10px 16px;border-top:1px solid var(--border);max-width:1200px;margin:0 auto;}
    @media(min-width:768px){.vendor-meta{padding:10px 28px;}}
    .v-chip{display:flex;align-items:center;gap:5px;font-size:.73rem;font-weight:600;color:var(--text-secondary);}
    .v-chip i{color:var(--primary);font-size:.68rem;}
    .s-dot{width:7px;height:7px;border-radius:50%;background:var(--border);}
    .s-dot.open{background:var(--success);box-shadow:0 0 0 2px rgba(34,197,94,.2);animation:glow 2s infinite;}
    @keyframes glow{0%,100%{box-shadow:0 0 0 2px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}

    /* ── STICKY FILTERS ── */
    .sticky-filters{position:sticky;top:58px;z-index:150;background:var(--bg-card);border-bottom:1px solid var(--border);padding:10px 16px;transition:background .3s;}
    @media(min-width:768px){.sticky-filters{top:64px;padding:10px 28px;}}
    .search-wrap{position:relative;margin-bottom:9px;}
    .search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.82rem;pointer-events:none;}
    #mealSearch{width:100%;padding:10px 12px 10px 36px;border-radius:50px;border:1.5px solid var(--border);background:var(--bg-input);font-family:inherit;font-size:.88rem;color:var(--text);outline:none;transition:.2s;}
    #mealSearch::placeholder{color:var(--text-muted);}
    #mealSearch:focus{border-color:var(--primary);background:var(--bg-card);box-shadow:0 0 0 3px rgba(255,77,45,.1);}
    .cats{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px;}
    .cats::-webkit-scrollbar{display:none;}
    .cat-btn{padding:6px 14px;background:var(--bg-input);border-radius:50px;border:1.5px solid var(--border);font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap;color:var(--text-secondary);transition:.2s;font-family:inherit;}
    .cat-btn:hover{border-color:var(--primary);color:var(--primary);}
    .cat-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 3px 10px rgba(255,77,45,.3);}

    /* ── SECTION HEADER ── */
    .sec-header{padding:16px 16px 10px;display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;}
    @media(min-width:768px){.sec-header{padding:20px 28px 12px;}}
    .sec-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;}
    .sec-count{font-size:.73rem;font-weight:600;color:var(--text-muted);background:var(--bg-input);padding:4px 11px;border-radius:20px;border:1px solid var(--border);}

    /* ── MEAL GRID ── */
    .meal-wrap{padding:0 16px;max-width:1200px;margin:0 auto;}
    @media(min-width:768px){.meal-wrap{padding:0 28px;}}
    .meal-grid{display:grid;grid-template-columns:1fr;gap:12px;}
    @media(min-width:560px){.meal-grid{grid-template-columns:1fr 1fr;gap:14px;}}
    @media(min-width:1024px){.meal-grid{grid-template-columns:repeat(3,1fr);gap:16px;}}

    /* MEAL CARD — horizontal layout */
    .meal-card{
      background:var(--bg-card);border-radius:16px;overflow:hidden;
      border:1px solid var(--border);box-shadow:var(--shadow-sm);
      display:flex;align-items:stretch;min-height:140px;cursor:pointer;
      transition:transform .25s,box-shadow .25s,border-color .2s;
      animation:fadeUp .35s ease both;
    }
    .meal-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--border);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    /* image side */
    .meal-img-side{position:relative;width:130px;min-width:130px;overflow:hidden;border-radius:16px 0 0 16px;flex-shrink:0;}
    @media(min-width:560px){.meal-img-side{width:140px;min-width:140px;}}
    .meal-img-side img{width:100%;height:100%;object-fit:cover;transition:transform .4s;display:block;}
    .meal-card:hover .meal-img-side img{transform:scale(1.06);}
    .meal-img-ph{width:100%;height:100%;background:linear-gradient(135deg,var(--primary-light),#FFE4DC);display:flex;align-items:center;justify-content:center;font-size:2.2rem;}
    .unavail-overlay{position:absolute;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;}
    .unavail-badge{background:rgba(255,255,255,.95);color:var(--text);font-size:.55rem;font-weight:800;padding:3px 9px;border-radius:20px;text-transform:uppercase;}
    .cat-tag{position:absolute;bottom:7px;left:7px;background:rgba(15,23,42,.68);color:#fff;font-size:.54rem;font-weight:700;padding:2px 7px;border-radius:6px;}
    .rating-tag{position:absolute;top:7px;left:7px;background:rgba(255,255,255,.95);color:var(--text);font-size:.6rem;font-weight:800;padding:2px 7px;border-radius:6px;display:flex;align-items:center;gap:2px;}
    .rating-tag i{color:var(--warning);font-size:.56rem;}

    /* info side */
    .meal-info{flex:1;padding:12px 14px 12px 12px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
    .meal-vendor-lbl{font-size:.58rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:2px;}
    .meal-name{font-size:.93rem;font-weight:700;line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .meal-desc{font-size:.73rem;color:var(--text-secondary);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;}
    .meal-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:.67rem;color:var(--text-muted);font-weight:600;margin-bottom:6px;}
    .meal-meta i{color:var(--primary);font-size:.6rem;}
    .meal-meta i.star-i{color:var(--warning);}
    .meal-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:6px;border-top:1px solid var(--border);margin-top:auto;}
    .meal-price{font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;color:var(--text);}
    .add-btn{height:32px;padding:0 12px;border-radius:50px;background:var(--primary);color:#fff;border:none;cursor:pointer;font-size:.72rem;font-weight:700;display:flex;align-items:center;gap:4px;transition:.2s;flex-shrink:0;font-family:inherit;box-shadow:0 3px 8px rgba(255,77,45,.28);}
    .add-btn:hover{background:var(--primary-dark);transform:scale(1.05);}
    .add-btn.added{background:var(--success);}
    .add-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}

    /* skeleton */
    .skel{background:var(--bg-card);border-radius:16px;border:1px solid var(--border);display:flex;height:132px;animation:skel-pulse 1.5s ease infinite;overflow:hidden;}
    .skel-img{width:130px;min-width:130px;background:var(--bg-input);}
    .skel-body{padding:12px;flex:1;}
    .skel-line{height:10px;border-radius:5px;background:var(--bg-input);margin-bottom:8px;}
    .skel-line.short{width:55%;}
    @keyframes skel-pulse{0%,100%{opacity:1}50%{opacity:.55}}

    /* empty */
    .empty{grid-column:1/-1;text-align:center;padding:52px 20px;color:var(--text-muted);}
    .empty i{font-size:2.5rem;margin-bottom:12px;display:block;opacity:.3;}
    .empty h3{font-size:.95rem;font-weight:700;color:var(--text-secondary);margin-bottom:4px;}

    /* ── CART FLOAT ── */
    .cart-float{position:fixed;bottom:calc(var(--footer-h)+14px);right:16px;z-index:1800;display:none;flex-direction:column;align-items:flex-end;gap:7px;}
    .cart-float.visible{display:flex;}
    .cart-float-btn{width:54px;height:54px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.15rem;text-decoration:none;box-shadow:0 6px 22px rgba(255,77,45,.42);transition:.2s;position:relative;}
    .cart-float-btn:hover{transform:scale(1.07);}
    .cart-badge{position:absolute;top:-3px;right:-3px;width:20px;height:20px;border-radius:50%;background:var(--text);color:#fff;font-size:.62rem;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}
    .cart-float-label{background:var(--text);color:#fff;border-radius:50px;padding:6px 13px;font-size:.73rem;font-weight:700;white-space:nowrap;box-shadow:var(--shadow-md);}

    /* toast */
    .toast{position:fixed;bottom:calc(var(--footer-h)+14px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;padding:10px 20px;border-radius:50px;font-size:.8rem;font-weight:700;white-space:nowrap;z-index:3500;opacity:0;transition:.3s;pointer-events:none;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:7px;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast i{color:var(--success);}

    /* ── MEAL MODAL ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,15,30,.65);z-index:4000;backdrop-filter:blur(10px);align-items:flex-end;justify-content:center;}
    .modal-overlay.open{display:flex;}
    @media(min-width:640px){.modal-overlay.open{align-items:center;}}
    .meal-modal{background:var(--bg-card);border-radius:24px 24px 0 0;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative;animation:sheetUp .35s cubic-bezier(.16,1,.3,1);scrollbar-width:none;}
    .meal-modal::-webkit-scrollbar{display:none;}
    @media(min-width:640px){.meal-modal{border-radius:22px;margin:16px;animation:scaleIn .3s cubic-bezier(.16,1,.3,1);}}
    .meal-modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),#FF7055,var(--primary));z-index:5;border-radius:24px 24px 0 0;}
    @keyframes sheetUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-drag{width:32px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0;}
    @media(min-width:640px){.modal-drag{display:none;}}
    .modal-close{position:absolute;top:14px;right:14px;width:33px;height:33px;border-radius:50%;background:var(--bg-input);border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;font-size:.88rem;display:flex;align-items:center;justify-content:center;transition:.2s;z-index:6;}
    .modal-close:hover{background:var(--primary-light);color:var(--primary);transform:rotate(90deg);}
    .modal-img{width:100%;height:200px;overflow:hidden;position:relative;}
    .modal-img img{width:100%;height:100%;object-fit:cover;}
    .modal-img-ph{width:100%;height:200px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:5rem;}
    .modal-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,15,30,.4),transparent 50%);}
    .modal-unavail{position:absolute;top:14px;left:0;background:rgba(239,68,68,.9);color:#fff;font-size:.68rem;font-weight:800;padding:4px 14px;letter-spacing:.5px;text-transform:uppercase;}
    .modal-body{padding:18px 20px 10px;}
    .modal-vendor{font-size:.63rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;}
    .modal-name{font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:800;line-height:1.15;margin-bottom:10px;}
    .modal-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
    .modal-chip{padding:4px 10px;border-radius:7px;font-size:.68rem;font-weight:700;background:var(--bg-input);border:1px solid var(--border);color:var(--text-secondary);display:flex;align-items:center;gap:4px;}
    .modal-chip i{color:var(--primary);font-size:.62rem;}
    .modal-desc{font-size:.86rem;color:var(--text-secondary);line-height:1.7;margin-bottom:16px;}
    .modal-divider{height:1px;background:var(--border);margin:0 -20px 16px;}
    .modal-section-title{font-size:.68rem;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    .modal-section-title::after{content:'';flex:1;height:1px;background:var(--border);}

    /* rating summary */
    .rating-summary{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding:12px;background:var(--bg-input);border-radius:13px;border:1px solid var(--border);}
    .rating-big{text-align:center;}
    .rating-big .num{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;line-height:1;}
    .rating-big .all-stars{display:flex;gap:2px;justify-content:center;margin:4px 0;}
    .rating-big .all-stars i{color:var(--warning);font-size:.8rem;}
    .rating-big .all-stars i.empty{color:var(--border);}
    .rating-big .cnt{font-size:.63rem;color:var(--text-muted);font-weight:600;}
    .star-bars{flex:1;}
    .star-row-b{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
    .star-row-b span{font-size:.67rem;font-weight:700;color:var(--text-muted);width:8px;}
    .star-row-b i{color:var(--warning);font-size:.55rem;}
    .star-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
    .star-bar-fill{height:100%;background:var(--warning);border-radius:3px;transition:width .35s;}
    .star-row-b .cnt{font-size:.62rem;color:var(--text-muted);width:16px;text-align:right;}

    /* reviews */
    .reviews-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
    .review-card{padding:12px;background:var(--bg-input);border-radius:12px;border:1px solid var(--border);}
    .review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
    .review-author{display:flex;align-items:center;gap:8px;}
    .review-av{width:28px;height:28px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:var(--primary);}
    .review-name{font-size:.8rem;font-weight:700;}
    .review-date{font-size:.63rem;color:var(--text-muted);}
    .review-stars-sm{display:flex;gap:1px;}
    .review-stars-sm i{color:var(--warning);font-size:.68rem;}
    .review-stars-sm i.empty{color:var(--border);}
    .review-text{font-size:.8rem;color:var(--text-secondary);line-height:1.6;}
    .no-reviews{text-align:center;padding:20px;color:var(--text-muted);font-size:.83rem;background:var(--bg-input);border-radius:12px;border:1px solid var(--border);}
    .no-reviews i{display:block;font-size:1.6rem;margin-bottom:7px;opacity:.3;}

    /* write review */
    .write-review{padding:14px;background:var(--bg-input);border-radius:12px;border:1px solid var(--border);margin-bottom:16px;}
    .star-picker{display:flex;gap:5px;margin-bottom:10px;}
    .star-picker i{font-size:1.3rem;color:var(--border);cursor:pointer;transition:.12s;}
    .star-picker i.lit{color:var(--warning);}
    .review-ta{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg-card);font-family:inherit;font-size:.83rem;color:var(--text);resize:none;outline:none;transition:.2s;min-height:72px;}
    .review-ta:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,77,45,.1);}
    .review-ta::placeholder{color:var(--text-muted);}
    .review-submit{margin-top:8px;width:100%;padding:11px;border-radius:10px;background:var(--primary);color:#fff;font-family:inherit;font-size:.83rem;font-weight:700;border:none;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px;}
    .review-submit:hover{background:var(--primary-dark);}
    .review-submit:disabled{opacity:.5;cursor:not-allowed;}
    .review-msg{margin-top:7px;padding:8px 11px;border-radius:8px;font-size:.77rem;font-weight:600;display:none;}
    .review-msg.ok{background:var(--success-light);color:#166534;border:1px solid #BBF7D0;display:flex;align-items:center;gap:5px;}
    .review-msg.err{background:var(--danger-light);color:#DC2626;border:1px solid #FECACA;display:flex;align-items:center;gap:5px;}

    /* modal footer */
    .modal-footer{position:sticky;bottom:0;background:var(--bg-card);border-top:1px solid var(--border);padding:14px 20px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;}

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const S = createClient(
  'https://lwpwicajcbcmzkyecnbv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3cHdpY2FqY2JjbXpreWVjbmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDgxNjAsImV4cCI6MjA5MTkyNDE2MH0.BF2azgoZPOmo4OP9Zo1-QNpXX-EJ23BWQx-lf3GgW68'
);

let allMeals=[], vendorProfile=null, currentMeal=null, currentUser=null, currentProfile=null;
let selectedRating=0, mealReviews=[];
const params=new URLSearchParams(location.search);
const vendorId=params.get('vendor_id');

// Theme
function loadTheme(){const t=localStorage.getItem('nash-theme')||'light';document.documentElement.setAttribute('data-theme',t);document.querySelector('#themeBtn i').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}
window.toggleTheme=()=>{const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('nash-theme',t);document.querySelector('#themeBtn i').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';};
loadTheme();

async function init(){
  const {data:{user}}=await S.auth.getUser();
  if(!user){location.href='index.html';return;}
  currentUser=user;
  const {data:prof}=await S.from('profiles').select('full_name,avatar_url').eq('id',user.id).single();
  currentProfile=prof||{};
  loadProfileAvatar();
  if(vendorId){await loadVendorProfile();await loadMeals(vendorId);}
  else await loadAllMeals();
  updateCartUI();
}

function loadProfileAvatar(){
  const img=document.getElementById('profileAv'), icon=document.getElementById('profileFallback');
  if(currentProfile?.avatar_url){
    const {data}=S.storage.from('avatars').getPublicUrl(currentProfile.avatar_url);
    img.src=`${data.publicUrl}?t=${Date.now()}`;img.style.display='block';icon.style.display='none';
    img.onerror=()=>{img.style.display='none';icon.style.display='';};
  }
}

async function loadVendorProfile(){
  const {data}=await S.from('profiles').select('*').eq('id',vendorId).single();
  if(!data) return;
  vendorProfile=data;
  const name=data.business_name||data.full_name||'Our Kitchen';
  document.getElementById('brandName').textContent=name;
  document.title=`${name} | Nash Bites`;
  const meta=document.getElementById('vendorMeta');meta.style.display='flex';
  const dot=document.getElementById('statusDot'),txt=document.getElementById('statusText');
  if(data.is_online||data.store_open){dot.classList.add('open');txt.textContent='Open Now';}
  else{txt.textContent='Currently Closed';}
  if(data.biz_category){document.getElementById('metaCat').style.display='flex';document.getElementById('catLabel').textContent=data.biz_category;}
  if(data.operating_hours){document.getElementById('metaHours').style.display='flex';document.getElementById('hoursLabel').textContent=data.operating_hours;}
  if(data.kitchen_location){document.getElementById('metaLoc').style.display='flex';document.getElementById('locLabel').textContent=data.kitchen_location;}
}

async function loadMeals(vid){
  const {data,error}=await S.from('meals').select('*').eq('vendor_id',vid).order('created_at',{ascending:false});
  if(error){showError();return;}
  allMeals=data||[];
  buildCats(allMeals);renderMeals(allMeals);await buildTicker(allMeals);
}

async function loadAllMeals(){
  const {data,error}=await S.from('meals').select('*, profiles!meals_vendor_id_fkey(business_name,is_online,kitchen_location,store_open)').eq('is_available',true).order('created_at',{ascending:false});
  if(error){showError();return;}
  allMeals=(data||[]).filter(m=>m.profiles?.is_online||m.profiles?.store_open);
  buildCats(allMeals);renderMeals(allMeals);await buildTicker(allMeals);
}

// ── TICKER with real reviews from DB ──
async function buildTicker(meals){
  if(!meals.length){document.getElementById('heroSection').style.display='none';return;}
  const rated=[...meals].filter(m=>m.avg_rating&&+m.avg_rating>0).sort((a,b)=>(+b.avg_rating||0)-(+a.avg_rating||0)).slice(0,10);
  const pool=rated.length>=4?rated:meals.slice(0,8);

  // Load actual reviews for ticker
  const mealIds=pool.map(m=>m.id);
  let reviewMap={};
  try {
    const {data:revs}=await S.from('reviews').select('meal_id,comment,rating,reviewer:profiles!reviews_user_id_fkey(full_name)').in('meal_id',mealIds).eq('rating',5).limit(30);
    if(revs) revs.forEach(r=>{if(!reviewMap[r.meal_id])reviewMap[r.meal_id]=r;});
  } catch(e){}

  const doubled=[...pool,...pool];
  document.getElementById('tickerTrack').innerHTML=doubled.map(m=>{
    const rating=m.avg_rating?(+m.avg_rating).toFixed(1):null;
    const stars=rating?Math.round(+m.avg_rating):0;
    const starsHtml=[1,2,3,4,5].map(i=>`<i class="fa-solid fa-star${i<=stars?' lit':' empty'}"></i>`).join('');
    // Use real review comment if available, otherwise use description
    const rev=reviewMap[m.id];
    const snippet=rev?.comment?`"${rev.comment.slice(0,55)}${rev.comment.length>55?'…':''}" — ${rev.reviewer?.full_name?.split(' ')[0]||'student'}`:m.description?`"${m.description.slice(0,55)}${m.description.length>55?'…':''}"`:'Freshly prepared!';
    const imgHtml=m.image_url?`<img class="ticker-img" src="${m.image_url}" alt="${esc(m.name)}" loading="lazy">`:
      `<div class="ticker-img-ph">🍽️</div>`;
    return `<div class="ticker-card" onclick="openModal('${m.id}')">
      ${imgHtml}
      <div class="ticker-info">
        <div class="ticker-name">${esc(m.name)}</div>
        <div class="ticker-review">${snippet}</div>
        <div class="ticker-stars">${starsHtml}${rating?`<span>${rating}</span>`:''}</div>
      </div>
    </div>`;
  }).join('');
}

function buildCats(meals){
  const cats=[...new Set(meals.map(m=>m.category).filter(Boolean))];
  const bar=document.getElementById('catFilter');
  bar.innerHTML=`<button class="cat-btn active" onclick="filterCat('All',this)">✦ All</button>`;
  cats.forEach(c=>{const b=document.createElement('button');b.className='cat-btn';b.textContent=c;b.setAttribute('onclick',`filterCat('${c}',this)`);bar.appendChild(b);});
}

function renderMeals(meals){
  const grid=document.getElementById('mealGrid');
  document.getElementById('secCount').textContent=`${meals.length} item${meals.length!==1?'s':''}`;
  document.getElementById('secTitle').textContent=vendorProfile?(vendorProfile.business_name||'Menu'):'All Items';
  if(!meals.length){grid.innerHTML=`<div class="empty"><i class="fa-solid fa-bowl-food"></i><h3>Nothing found</h3><p>Try another category or search term</p></div>`;return;}
  const cart=getCart();const cartIds=new Set(cart.map(i=>i.id));
  grid.innerHTML=meals.map((m,i)=>{
    const inCart=cartIds.has(m.id);const avail=m.is_available!==false;
    const vName=m.profiles?.business_name||'';
    const rating=m.avg_rating?(+m.avg_rating).toFixed(1):null;
    const starsC=rating?Math.round(+m.avg_rating):0;
    const imgHtml=m.image_url?`<img src="${m.image_url}" alt="${esc(m.name)}" loading="lazy">`:
      `<div class="meal-img-ph">🍽️</div>`;
    const meta=[];
    if(m.prep_time) meta.push(`<span><i class="fa-solid fa-clock"></i>${m.prep_time}m</span>`);
    if(rating) meta.push(`<span>${[1,2,3,4,5].map(s=>`<i class="fa-solid fa-star${s<=starsC?' star-i':''}" style="${s<=starsC?'color:var(--warning)':'color:var(--border)'}"></i>`).join('')} ${rating}</span>`);
    if(m.review_count) meta.push(`<span><i class="fa-regular fa-comment"></i>${m.review_count}</span>`);
    return `<div class="meal-card" style="animation-delay:${i*40}ms" onclick="openModal('${m.id}')">
      <div class="meal-img-side">
        ${imgHtml}
        ${!avail?`<div class="unavail-overlay"><span class="unavail-badge">Unavailable</span></div>`:''}
        ${rating?`<span class="rating-tag"><i class="fa-solid fa-star"></i>${rating}</span>`:''}
        ${m.category?`<span class="cat-tag">${esc(m.category)}</span>`:''}
      </div>
      <div class="meal-info">
        <div>
          ${vName?`<div class="meal-vendor-lbl">${esc(vName)}</div>`:''}
          <div class="meal-name">${esc(m.name)}</div>
          ${m.description?`<div class="meal-desc">${esc(m.description)}</div>`:''}
          ${meta.length?`<div class="meal-meta">${meta.join('<span style="margin:0 2px;opacity:.4">·</span>')}</div>`:''}
        </div>
        <div class="meal-bottom">
          <div class="meal-price">UGX ${(+m.price).toLocaleString()}</div>
          <button class="add-btn ${inCart?'added':''}" id="add-${m.id}"
            onclick="event.stopPropagation();addToCart('${m.id}','${esc(m.name)}',${m.price})"
            ${!avail?'disabled':''}>${inCart?'<i class="fa-solid fa-check"></i> Added':'<i class="fa-solid fa-plus"></i> Add'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.filterCat=(cat,btn)=>{
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderMeals(cat==='All'?allMeals:allMeals.filter(m=>m.category===cat));
};
document.getElementById('mealSearch').addEventListener('input',e=>{
  const t=e.target.value.toLowerCase().trim();
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.cat-btn').classList.add('active');
  renderMeals(allMeals.filter(m=>m.name.toLowerCase().includes(t)||(m.description||'').toLowerCase().includes(t)||(m.category||'').toLowerCase().includes(t)));
});

// ── MODAL ──
window.openModal=async(id)=>{
  const m=allMeals.find(x=>x.id===id);if(!m) return;
  currentMeal=m;selectedRating=0;updateStarPicker(0);
  document.getElementById('reviewText').value='';document.getElementById('reviewMsg').className='review-msg';
  const iw=document.getElementById('modalImgWrap');
  iw.innerHTML=m.image_url?`<div class="modal-img"><img src="${m.image_url}" alt="${esc(m.name)}" loading="lazy"><div class="modal-img-overlay"></div>${m.is_available===false?'<div class="modal-unavail">Currently Unavailable</div>':''}</div>`:`<div class="modal-img-ph">🍽️</div>`;
  document.getElementById('modalVendor').textContent=m.profiles?.business_name||vendorProfile?.business_name||'';
  document.getElementById('modalName').textContent=m.name;
  document.getElementById('modalDesc').textContent=m.description||'A delicious dish prepared fresh for you.';
  document.getElementById('modalPrice').textContent=`UGX ${(+m.price).toLocaleString()}`;
  const chips=[];
  if(m.prep_time) chips.push(`<span class="modal-chip"><i class="fa-solid fa-clock"></i>${m.prep_time} min</span>`);
  if(m.category) chips.push(`<span class="modal-chip"><i class="fa-solid fa-tag"></i>${esc(m.category)}</span>`);
  if(m.is_available===false) chips.push(`<span class="modal-chip" style="color:var(--danger);border-color:var(--danger)"><i class="fa-solid fa-circle-xmark"></i>Unavailable</span>`);
  document.getElementById('modalChips').innerHTML=chips.join('');
  document.getElementById('modalAddBtn').disabled=m.is_available===false;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
  loadReviews(id);
};
window.closeModal=()=>{document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';currentMeal=null;};
window.handleOverlayClick=e=>{if(e.target===document.getElementById('modalOverlay')) closeModal();};
window.addFromModal=()=>{
  if(!currentMeal) return;
  addToCart(currentMeal.id,currentMeal.name,currentMeal.price);
  const btn=document.getElementById('modalAddBtn');
  btn.innerHTML='<i class="fa-solid fa-check"></i> Added!';btn.style.background='var(--success)';
  setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-plus"></i> Add to Cart';btn.style.background='';},1800);
};

// ── REVIEWS ──
async function loadReviews(mealId){
  document.getElementById('reviewsList').innerHTML=`<div style="text-align:center;padding:14px;color:var(--text-muted);font-size:.82rem;"><i class="fa-solid fa-spinner fa-spin" style="margin-right:6px;"></i> Loading…</div>`;
  const {data}=await S.from('reviews').select('*, reviewer:profiles!reviews_user_id_fkey(full_name,avatar_url)').eq('meal_id',mealId).order('created_at',{ascending:false}).limit(20);
  mealReviews=data||[];renderReviews(mealReviews);
}
function renderReviews(reviews){
  const cnt=reviews.length;
  if(!cnt){
    document.getElementById('ratingNum').textContent='—';document.getElementById('ratingStars').innerHTML='';
    document.getElementById('ratingCnt').textContent='No reviews yet';document.getElementById('starBars').innerHTML='';
    document.getElementById('reviewsList').innerHTML=`<div class="no-reviews"><i class="fa-regular fa-star"></i>No reviews yet — be the first!</div>`;return;
  }
  const avg=reviews.reduce((s,r)=>s+(r.rating||0),0)/cnt;
  document.getElementById('ratingNum').textContent=avg.toFixed(1);
  document.getElementById('ratingCnt').textContent=`${cnt} review${cnt!==1?'s':''}`;
  document.getElementById('ratingStars').innerHTML=[1,2,3,4,5].map(i=>`<i class="fa-solid fa-star${i<=Math.round(avg)?'':' empty'}" style="${i<=Math.round(avg)?'color:var(--warning)':'color:var(--border)'}"></i>`).join('');
  const dist=[5,4,3,2,1].map(v=>({v,c:reviews.filter(r=>r.rating===v).length}));
  document.getElementById('starBars').innerHTML=dist.map(d=>`<div class="star-row-b"><span>${d.v}</span><i class="fa-solid fa-star"></i><div class="star-bar"><div class="star-bar-fill" style="width:${cnt?Math.round(d.c/cnt*100):0}%"></div></div><span class="cnt">${d.c}</span></div>`).join('');
  document.getElementById('reviewsList').innerHTML=reviews.slice(0,8).map(r=>{
    const nm=r.reviewer?.full_name||'Anonymous';
    const init=nm.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const date=new Date(r.created_at).toLocaleDateString('en-UG',{day:'numeric',month:'short',year:'numeric'});
    const stars=[1,2,3,4,5].map(i=>`<i class="fa-solid fa-star${i<=(r.rating||0)?'':' empty'}" style="${i<=(r.rating||0)?'color:var(--warning)':'color:var(--border)'}"></i>`).join('');
    return `<div class="review-card"><div class="review-header"><div class="review-author"><div class="review-av">${init}</div><div><div class="review-name">${esc(nm)}</div><div class="review-date">${date}</div></div></div><div class="review-stars-sm">${stars}</div></div>${r.comment?`<div class="review-text">${esc(r.comment)}</div>`:''}</div>`;
  }).join('');
}

window.setRating=v=>{selectedRating=v;updateStarPicker(v);};
function updateStarPicker(v){document.querySelectorAll('#starPicker i').forEach((s,i)=>{s.className=i<v?'fa-solid fa-star lit':'fa-regular fa-star';});}
document.getElementById('starPicker').addEventListener('mouseover',e=>{if(e.target.tagName==='I'){const v=+e.target.getAttribute('data-v');document.querySelectorAll('#starPicker i').forEach((s,i)=>{s.className=i<v?'fa-solid fa-star lit':'fa-regular fa-star';});}});
document.getElementById('starPicker').addEventListener('mouseleave',()=>updateStarPicker(selectedRating));

window.submitReview=async()=>{
  if(!currentMeal) return;
  if(!selectedRating){showRevMsg('err','Please select a star rating first');return;}
  const comment=document.getElementById('reviewText').value.trim();
  const btn=document.getElementById('reviewSubmitBtn');
  btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Submitting…';
  try {
    const {data:ex}=await S.from('reviews').select('id').eq('meal_id',currentMeal.id).eq('user_id',currentUser.id).maybeSingle();
    if(ex){const {error}=await S.from('reviews').update({rating:selectedRating,comment,updated_at:new Date().toISOString()}).eq('id',ex.id);if(error) throw error;}
    else{const {error}=await S.from('reviews').insert({meal_id:currentMeal.id,user_id:currentUser.id,rating:selectedRating,comment,created_at:new Date().toISOString()});if(error) throw error;}
    showRevMsg('ok','✓ Review submitted! Thank you.');
    document.getElementById('reviewText').value='';selectedRating=0;updateStarPicker(0);
    await loadReviews(currentMeal.id);
  } catch(err){showRevMsg('err',err.message||'Could not submit. Try again.');}
  btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Submit Review';
};
function showRevMsg(t,msg){const el=document.getElementById('reviewMsg');el.className=`review-msg ${t}`;el.innerHTML=`<i class="fa-solid fa-${t==='ok'?'check-circle':'circle-exclamation'}"></i> ${msg}`;clearTimeout(el._t);if(t==='ok') el._t=setTimeout(()=>{el.className='review-msg';},4000);}

// ── CART ──
function getCart(){return JSON.parse(localStorage.getItem('nash_cart')||'[]');}
function saveCart(c){localStorage.setItem('nash_cart',JSON.stringify(c));}
window.addToCart=(id,name,price)=>{
  const cart=getCart();const ex=cart.find(i=>i.id===id);
  if(ex) ex.qty=(ex.qty||1)+1;else cart.push({id,name,price:+price,qty:1});
  saveCart(cart);
  const btn=document.getElementById(`add-${id}`);
  if(btn){btn.classList.add('added');btn.innerHTML='<i class="fa-solid fa-check"></i> Added';}
  showToast(`${name} added`);updateCartUI();
};
function updateCartUI(){
  const cart=getCart();const cnt=cart.reduce((s,i)=>s+(i.qty||1),0);const total=cart.reduce((s,i)=>s+(i.price*(i.qty||1)),0);
  const f=document.getElementById('cartFloat');
  f.classList.toggle('visible',cnt>0);
  document.getElementById('cartBadge').textContent=cnt;
  document.getElementById('cartFloatLabel').textContent=`UGX ${total.toLocaleString()} · ${cnt} item${cnt!==1?'s':''}`;
}
function showToast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function showError(){document.getElementById('mealGrid').innerHTML=`<div class="empty"><i class="fa-solid fa-triangle-exclamation"></i><h3>Couldn't load menu</h3><p>Check your connection and refresh</p></div>`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModal();});
init();
</script>
