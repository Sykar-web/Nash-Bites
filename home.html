<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
  <title>Nash Bites | Menu</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F8FAFC">
  <link rel="icon" href="/images/tent.jpeg" type="image/jpeg">
  <link rel="apple-touch-icon" href="/images/tent.jpeg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    /* ═══════════════════════════════════════════
       PROFILE THEME TOKENS
    ═══════════════════════════════════════════ */
    :root {
      --primary: #FF4D2D;
      --primary-dark: #e63e20;
      --primary-light: #FFF0ED;
      --bg: #F8FAFC;
      --bg-card: #FFFFFF;
      --bg-input: #F1F5F9;
      --text: #0F172A;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
      --border-hover: #CBD5E1;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
      --radius: 16px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --success: #22C55E;
      --warning: #F59E0B;
      --danger: #EF4444;
    }

    [data-theme="dark"] {
      --bg: #0B1121;
      --bg-card: #1E293B;
      --bg-input: #334155;
      --text: #F1F5F9;
      --text-secondary: #94A3B8;
      --text-muted: #64748B;
      --border: #2D3A4A;
      --border-hover: #3D4A5A;
      --primary-light: #2D1510;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      padding-bottom: 100px;
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
    }

    /* ═══════════════════════════════════════════
       TOP NAVBAR
    ═══════════════════════════════════════════ */
    .topbar {
      position: sticky; top: 0; z-index: 200;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 70px;
      display: flex; align-items: center; justify-content: space-between;
      backdrop-filter: blur(12px);
      transition: background 0.3s, border 0.3s;
    }

    /* App icon on the LEFT (logo style) */
    .topbar-app-icon {
      display: flex; align-items: center; gap: 10px; text-decoration: none;
    }
    .app-icon-img {
      width: 42px; height: 42px; border-radius: 12px;
      overflow: hidden; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(255,77,45,0.3);
    }
    .app-name-wrap { display: flex; flex-direction: column; line-height: 1.1; }
    .app-name {
      font-family: 'Poppins', sans-serif;
      font-size: 1.15rem; font-weight: 800; color: var(--text);
    }
    .app-tagline {
      font-size: .6rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1.5px;
    }

    /* Profile icon on the RIGHT */
    .top-icon-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-input);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); font-size: .95rem; cursor: pointer;
      transition: all .2s; text-decoration: none; position: relative;
      flex-shrink: 0;
    }
    .top-icon-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .top-icon-btn img {
      width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
    }

    /* ═══════════════════════════════════════════
       HERO BANNER — animated top meals ticker
    ═══════════════════════════════════════════ */
    .hero-section {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }
    .hero-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 24px 20px 0;
    }
    .hero-label {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--primary-light); border-radius: 50px;
      padding: 5px 14px; margin-bottom: 14px;
      font-size: .72rem; font-weight: 700; color: var(--primary);
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    .hero-label i { font-size: .65rem; }
    .hero-title {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800; line-height: 1.1;
      letter-spacing: -0.5px; color: var(--text);
      margin-bottom: 4px;
    }
    .hero-title span { color: var(--primary); }
    .hero-sub {
      font-size: .85rem; color: var(--text-secondary); font-weight: 500;
      margin-bottom: 20px;
    }

    /* Scrolling meal ticker */
    .ticker-track-wrap {
      position: relative;
      margin: 0 -20px;
      overflow: hidden;
    }
    .ticker-fade-l, .ticker-fade-r {
      position: absolute; top: 0; bottom: 0; width: 60px; z-index: 5; pointer-events: none;
    }
    .ticker-fade-l { left: 0; background: linear-gradient(to right, var(--bg-card), transparent); }
    .ticker-fade-r { right: 0; background: linear-gradient(to left, var(--bg-card), transparent); }

    .ticker-track {
      display: flex; gap: 14px; padding: 16px 20px;
      animation: ticker-scroll 36s linear infinite;
      width: max-content;
    }
    .ticker-track:hover { animation-play-state: paused; }
    @keyframes ticker-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .ticker-card {
      flex-shrink: 0;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px 10px 10px;
      display: flex; align-items: center; gap: 10px;
      min-width: 220px; max-width: 260px;
      cursor: pointer;
      transition: all .25s;
    }
    .ticker-card:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .ticker-img {
      width: 52px; height: 52px; border-radius: var(--radius-xs);
      object-fit: cover; flex-shrink: 0;
      background: var(--border);
    }
    .ticker-img-placeholder {
      width: 52px; height: 52px; border-radius: var(--radius-xs);
      background: var(--primary-light); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
    }
    .ticker-info { flex: 1; min-width: 0; }
    .ticker-name {
      font-size: .8rem; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .ticker-review {
      font-size: .7rem; color: var(--text-secondary); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-style: italic; margin-bottom: 4px;
    }
    .ticker-stars { display: flex; gap: 2px; }
    .ticker-stars i { color: var(--warning); font-size: .6rem; }
    .ticker-stars i.empty { color: var(--border); }

    /* Vendor status chip */
    .vendor-meta-row {
      display: flex; flex-wrap: wrap; gap: 10px;
      padding: 16px 20px;
      max-width: 1200px; margin: 0 auto;
      border-top: 1px solid var(--border);
    }
    .vendor-chip {
      display: flex; align-items: center; gap: 6px;
      font-size: .75rem; font-weight: 600; color: var(--text-secondary);
    }
    .vendor-chip i { color: var(--primary); font-size: .7rem; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--border);
      transition: background .3s;
    }
    .status-dot.open { background: var(--success); box-shadow: 0 0 0 3px rgba(34,197,94,.2); animation: glow 2s infinite; }
    @keyframes glow { 0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2)} 50%{box-shadow:0 0 0 6px rgba(34,197,94,0)} }

    /* ═══════════════════════════════════════════
       STICKY FILTERS
    ═══════════════════════════════════════════ */
    .sticky-filters {
      position: sticky; top: 70px; z-index: 150;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      transition: background 0.3s;
    }
    .sticky-filters-inner { max-width: 1200px; margin: 0 auto; }
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-wrap i {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: .85rem; pointer-events: none;
    }
    #mealSearch {
      width: 100%; padding: 11px 14px 11px 40px;
      border-radius: 50px; border: 2px solid var(--border);
      background: var(--bg-input); outline: none; font-family: inherit;
      font-size: .88rem; color: var(--text); transition: all .2s;
    }
    #mealSearch::placeholder { color: var(--text-muted); }
    #mealSearch:focus { border-color: var(--primary); background: var(--bg-card); box-shadow: 0 0 0 4px rgba(255,77,45,0.1); }

    .categories { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn {
      padding: 7px 16px; background: var(--bg-input); border-radius: 50px;
      border: 1.5px solid var(--border); font-size: .73rem; font-weight: 700;
      white-space: nowrap; cursor: pointer; transition: all .2s;
      color: var(--text-secondary); font-family: inherit; flex-shrink: 0;
    }
    .cat-btn:hover { border-color: var(--primary); color: var(--primary); }
    .cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 12px rgba(255,77,45,0.3); }

    /* ═══════════════════════════════════════════
       SECTION HEADER
    ═══════════════════════════════════════════ */
    .sec-header {
      padding: 20px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
      max-width: 1200px; margin: 0 auto;
    }
    .sec-title {
      font-family: 'Poppins', sans-serif;
      font-size: 1.1rem; font-weight: 700; color: var(--text);
    }
    .sec-count {
      font-size: .75rem; font-weight: 600; color: var(--text-muted);
      background: var(--bg-input); padding: 4px 12px; border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* ═══════════════════════════════════════════
       MEAL GRID — 1 col mobile, 2 col desktop
    ═══════════════════════════════════════════ */
    .meal-grid-wrap { padding: 0 20px; max-width: 1200px; margin: 0 auto; }
    .meal-section {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    @media (min-width: 768px) {
      .meal-section { grid-template-columns: repeat(2, 1fr); gap: 18px; }
    }

    /* ── HORIZONTAL MEAL CARD — image LEFT, info RIGHT ── */
    .meal-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: transform .28s cubic-bezier(.16,1,.3,1), box-shadow .28s, border-color .2s;
      cursor: pointer;
      animation: fadeUp .4s ease both;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      min-height: 158px;
      position: relative;
    }
    .meal-card:hover {
      transform: translateY(-4px) scale(1.005);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12), 0 4px 8px rgba(0,0,0,0.06);
      border-color: var(--border-hover);
    }
    .meal-card:active { transform: translateY(-1px) scale(1.002); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

    /* LEFT — image */
    .meal-img-wrap {
      position: relative;
      width: 140px; min-width: 140px;
      align-self: stretch;
      overflow: hidden;
      border-radius: var(--radius) 0 0 var(--radius);
      flex-shrink: 0;
    }
    .meal-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .5s ease; display: block;
    }
    .meal-card:hover .meal-img-wrap img { transform: scale(1.08); }
    .meal-img-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--primary-light), #FFE4DC);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.6rem;
    }
    .unavail-overlay {
      position: absolute; inset: 0;
      background: rgba(15,23,42,.6);
      display: flex; align-items: center; justify-content: center;
    }
    .unavail-badge {
      background: rgba(255,255,255,.95); color: var(--text);
      font-size: .58rem; font-weight: 800; padding: 4px 10px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: .5px;
    }
    .cat-tag {
      position: absolute; bottom: 8px; left: 8px;
      background: rgba(15,23,42,.72); color: #fff;
      font-size: .56rem; font-weight: 700; padding: 3px 8px;
      border-radius: 6px; backdrop-filter: blur(4px);
    }
    .rating-tag {
      position: absolute; top: 8px; left: 8px;
      background: rgba(255,255,255,.95); color: var(--text);
      font-size: .62rem; font-weight: 800; padding: 3px 8px;
      border-radius: 6px; display: flex; align-items: center; gap: 3px;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .rating-tag i { color: var(--warning); font-size: .58rem; }

    /* RIGHT — content */
    .meal-info {
      flex: 1;
      padding: 14px 16px 14px 14px;
      display: flex; flex-direction: column; justify-content: space-between;
      min-width: 0; gap: 6px;
    }
    .meal-info-top { display: flex; flex-direction: column; gap: 4px; }
    .meal-vendor-label {
      font-size: .6rem; font-weight: 800; color: var(--primary);
      text-transform: uppercase; letter-spacing: 1.2px;
    }
    .meal-name {
      font-size: .97rem; font-weight: 700; line-height: 1.3;
      color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .meal-notes {
      font-size: .76rem; color: var(--text-secondary); line-height: 1.5; font-weight: 400;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .meal-meta {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      font-size: .69rem; color: var(--text-muted); font-weight: 600;
    }
    .meal-meta-item { display: flex; align-items: center; gap: 3px; }
    .meal-meta-item i { color: var(--primary); font-size: .62rem; }
    .meal-meta-item i.star-i { color: var(--warning); }
    .meal-meta-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }

    .meal-bottom {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding-top: 6px; border-top: 1px solid var(--border);
      margin-top: auto;
    }
    .meal-price {
      font-family: 'Poppins', sans-serif;
      font-weight: 800; font-size: .95rem; color: var(--text);
      line-height: 1;
    }
    .meal-price-sub { font-size: .62rem; color: var(--text-muted); font-weight: 500; font-family: 'Plus Jakarta Sans', sans-serif; }

    .add-btn {
      height: 34px; padding: 0 14px; border-radius: 50px;
      background: var(--primary); color: #fff;
      border: none; cursor: pointer; font-size: .75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: all .2s; flex-shrink: 0; white-space: nowrap;
      font-family: inherit;
      box-shadow: 0 3px 10px rgba(255,77,45,0.3);
    }
    .add-btn:hover { background: var(--primary-dark); transform: scale(1.06); box-shadow: 0 6px 18px rgba(255,77,45,0.4); }
    .add-btn.added { background: var(--success); box-shadow: 0 3px 10px rgba(34,197,94,0.3); }
    .add-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── SKELETON ── */
    .skel {
      background: var(--bg-card); border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--border); animation: skel-pulse 1.6s ease infinite;
      display: flex; height: 150px;
    }
    .skel-body { padding: 14px; flex: 1; }
    .skel-line { height: 11px; border-radius: 6px; background: var(--bg-input); margin-bottom: 9px; }
    .skel-line.short { width: 55%; }
    .skel-img-r { width: 130px; background: var(--bg-input); flex-shrink: 0; border-radius: 0 var(--radius) var(--radius) 0; }
    @keyframes skel-pulse { 0%,100%{opacity:1} 50%{opacity:.55} }

    /* ── EMPTY / ERROR ── */
    .empty-state {
      grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty-state i { font-size: 3rem; margin-bottom: 14px; display: block; opacity: .3; }
    .empty-state h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; color: var(--text-secondary); }
    .empty-state p { font-size: .85rem; }

    /* ═══════════════════════════════════════════
       FLOATING CART BUBBLE
    ═══════════════════════════════════════════ */
    .cart-float {
      position: fixed; bottom: 28px; right: 20px; z-index: 1800;
      display: none; flex-direction: column; align-items: flex-end; gap: 8px;
    }
    .cart-float.visible { display: flex; }
    .cart-float-btn {
      width: 58px; height: 58px; border-radius: 50%;
      background: var(--primary); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; cursor: pointer; border: none;
      box-shadow: 0 8px 28px rgba(255,77,45,.4);
      transition: transform .2s, box-shadow .2s;
      text-decoration: none; position: relative;
    }
    .cart-float-btn:hover { transform: scale(1.08); box-shadow: 0 12px 36px rgba(255,77,45,.5); }
    .cart-float-badge {
      position: absolute; top: -4px; right: -4px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--text); color: #fff;
      font-size: .65rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      border: 2.5px solid var(--bg);
    }
    .cart-float-label {
      background: var(--text); color: #fff;
      border-radius: 50px; padding: 7px 14px;
      font-size: .75rem; font-weight: 700; white-space: nowrap;
      box-shadow: var(--shadow-md); animation: fadeUp .3s ease;
    }
    [data-theme="dark"] .cart-float-label { background: var(--bg-card); color: var(--text); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: var(--text); color: #fff;
      padding: 11px 22px; border-radius: 50px;
      font-size: .8rem; font-weight: 700;
      white-space: nowrap; z-index: 3500;
      opacity: 0; transition: all .3s; pointer-events: none;
      box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 8px;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast i { color: var(--success); }

    /* ═══════════════════════════════════════════
       MODAL — profile theme
    ═══════════════════════════════════════════ */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,.65); z-index: 4000;
      backdrop-filter: blur(8px);
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    @media (min-width: 640px) { .modal-overlay.open { align-items: center; } }

    .meal-modal {
      background: var(--bg-card);
      border-radius: 28px 28px 0 0;
      width: 100%; max-width: 560px; max-height: 90vh;
      overflow-y: auto; position: relative;
      animation: sheetUp .4s cubic-bezier(.16,1,.3,1);
      padding-bottom: env(safe-area-inset-bottom, 20px);
      scrollbar-width: none;
      border-top: 4px solid var(--primary);
    }
    .meal-modal::-webkit-scrollbar { display: none; }
    @media (min-width: 640px) {
      .meal-modal {
        border-radius: 24px;
        max-height: 88vh; margin: 16px;
        animation: scaleIn .35s cubic-bezier(.16,1,.3,1);
        border-top: 4px solid var(--primary);
      }
    }
    /* rainbow top bar matching profile modal style */
    .meal-modal::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--primary), #FF6B4D, var(--primary));
      z-index: 5; border-radius: 28px 28px 0 0;
    }
    @keyframes sheetUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .modal-drag { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 14px auto 0; }
    @media (min-width: 640px) { .modal-drag { display: none; } }

    .modal-close-btn {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg-input); border: 1px solid var(--border);
      color: var(--text-secondary); cursor: pointer; font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; z-index: 6;
    }

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://lwpwicajcbcmzkyecnbv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3cHdpY2FqY2JjbXpreWVjbmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDgxNjAsImV4cCI6MjA5MTkyNDE2MH0.BF2azgoZPOmo4OP9Zo1-QNpXX-EJ23BWQx-lf3GgW68'
);

let allMeals = [];
let vendorProfile = null;
let currentMeal = null;
let currentUser = null;
let currentProfile = null;
let selectedRating = 0;
let mealReviews = [];

const params = new URLSearchParams(location.search);
const vendorId = params.get('vendor_id');

// ── THEME ──
function loadTheme() {
  const saved = localStorage.getItem('nash-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
}
loadTheme();

// ── INIT ──
async function init() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) { location.href = 'index.html'; return; }
  currentUser = user;

  const { data: prof } = await supabase.from('profiles').select('full_name, avatar_url').eq('id', user.id).single();
  currentProfile = prof || {};
  loadProfileAvatar();

  if (vendorId) {
    await loadVendorProfile();
    await loadMeals(vendorId);
  } else {
    await loadAllMeals();
  }

  updateCartUI();
}

// ── PROFILE AVATAR ──
function loadProfileAvatar() {
  const img = document.getElementById('profileAvatarImg');
  const icon = document.getElementById('profileIconFallback');
  if (currentProfile?.avatar_url) {
    const { data } = supabase.storage.from('avatars').getPublicUrl(currentProfile.avatar_url);
    img.src = `${data.publicUrl}?t=${Date.now()}`;
    img.style.display = 'block';
    icon.style.display = 'none';
    img.onerror = () => { img.style.display = 'none'; icon.style.display = ''; };
  }
}

// ── LOAD VENDOR PROFILE ──
async function loadVendorProfile() {
  const { data } = await supabase.from('profiles').select('*').eq('id', vendorId).single();
  if (!data) return;
  vendorProfile = data;
  const name = data.business_name || data.full_name || 'Our Kitchen';
  document.getElementById('navBrandName').textContent = name;
  document.title = `${name} | Nash Bites`;

  const metaRow = document.getElementById('vendorMetaRow');
  metaRow.style.display = 'flex';

  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (data.is_online || data.store_open) { dot.classList.add('open'); txt.textContent = 'Open Now'; }
  else { txt.textContent = 'Closed'; }

  if (data.biz_category) { document.getElementById('metaCategory').style.display = 'flex'; document.getElementById('catLabel').textContent = data.biz_category; }
  if (data.operating_hours) { document.getElementById('metaHours').style.display = 'flex'; document.getElementById('hoursLabel').textContent = data.operating_hours; }
  if (data.kitchen_location) { document.getElementById('metaLocation').style.display = 'flex'; document.getElementById('locLabel').textContent = data.kitchen_location; }
}

// ── LOAD MEALS FOR ONE VENDOR ──
async function loadMeals(vid) {
  const { data, error } = await supabase.from('meals').select('*').eq('vendor_id', vid).order('created_at', { ascending: false });
  if (error) { showError(); return; }
  allMeals = data || [];
  buildCategoryTabs(allMeals);
  renderMeals(allMeals);
  buildTicker(allMeals);
}

// ── LOAD ALL MEALS ──
async function loadAllMeals() {
  const { data, error } = await supabase
    .from('meals')
    .select('*, profiles!meals_vendor_id_fkey(business_name, is_online, kitchen_location, store_open)')
    .eq('is_available', true)
    .order('created_at', { ascending: false });
  if (error) { showError(); return; }
  allMeals = (data || []).filter(m => m.profiles?.is_online || m.profiles?.store_open);
  buildCategoryTabs(allMeals);
  renderMeals(allMeals);
  buildTicker(allMeals);
}

// ── BUILD TICKER (top-rated meals with reviews) ──
function buildTicker(meals) {
  // Sort by avg_rating descending, filter those with a rating
  const rated = [...meals]
    .filter(m => m.avg_rating && +m.avg_rating > 0)
    .sort((a, b) => (+b.avg_rating || 0) - (+a.avg_rating || 0))
    .slice(0, 12);

  // If not enough rated meals, fill with recent meals
  const pool = rated.length >= 4 ? rated : meals.slice(0, 10);

  if (!pool.length) {
    document.getElementById('heroSection').style.display = 'none';
    return;
  }

  // Duplicate for seamless loop
  const doubled = [...pool, ...pool];

  const track = document.getElementById('tickerTrack');
  track.innerHTML = doubled.map(m => {
    const rating = m.avg_rating ? (+m.avg_rating).toFixed(1) : null;
    const stars = rating ? Math.round(+m.avg_rating) : 0;
    const starsHtml = [1,2,3,4,5].map(i =>
      `<i class="fa-solid fa-star${i <= stars ? '' : ' empty'}"></i>`
    ).join('');

    // Pick a review snippet if available (we can't load reviews here easily so use description as fallback quote)
    const snippet = m.description ? `"${m.description.slice(0, 60)}${m.description.length > 60 ? '…' : ''}"` : 'Fresh & delicious!';

    const imgHtml = m.image_url
      ? `<img class="ticker-img" src="${m.image_url}" alt="${esc(m.name)}" loading="lazy">`
      : `<div class="ticker-img-placeholder">🍽️</div>`;

    return `<div class="ticker-card" onclick="openModal('${m.id}')">
      ${imgHtml}
      <div class="ticker-info">
        <div class="ticker-name">${esc(m.name)}</div>
        <div class="ticker-review">${snippet}</div>
        <div class="ticker-stars">${starsHtml}${rating ? `<span style="margin-left:4px;font-size:.62rem;font-weight:700;color:var(--text-secondary);">${rating}</span>` : ''}</div>
      </div>
    </div>`;
  }).join('');
}

// ── BUILD CATEGORY TABS ──
function buildCategoryTabs(meals) {
  const cats = [...new Set(meals.map(m => m.category).filter(Boolean))];
  const bar = document.getElementById('catFilter');
  bar.innerHTML = `<button class="cat-btn active" onclick="filterCat('All', this)">✦ All</button>`;
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = c;
    btn.setAttribute('onclick', `filterCat('${c}', this)`);
    bar.appendChild(btn);
  });
}

// ── RENDER MEALS ──
function renderMeals(meals) {
  const container = document.getElementById('mealSection');
  document.getElementById('sectionCount').textContent = `${meals.length} item${meals.length !== 1 ? 's' : ''}`;
  document.getElementById('sectionTitle').textContent =
    vendorProfile ? (vendorProfile.business_name || 'Menu') : 'All Items';

  if (!meals.length) {
    container.innerHTML = `<div class="empty-state"><i class="fa-solid fa-bowl-food"></i><h3>Nothing here yet</h3><p>Try a different category or check back soon</p></div>`;
    return;
  }

  const cart = getCart();
  const cartIds = new Set(cart.map(i => i.id));

  container.innerHTML = meals.map((m, idx) => {
    const inCart = cartIds.has(m.id);
    const avail = m.is_available !== false;
    const vendorName = m.profiles?.business_name || '';
    const rating = m.avg_rating ? (+m.avg_rating).toFixed(1) : null;
    const starsCount = rating ? Math.round(+m.avg_rating) : 0;
    const starsHtml = rating
      ? [1,2,3,4,5].map(i=>`<i class="fa-solid fa-star${i<=starsCount?'':' empty'}" style="${i<=starsCount?'color:var(--warning)':'color:var(--border)'}"></i>`).join('')
      : '';

    const imgHtml = m.image_url
      ? `<img src="${m.image_url}" alt="${esc(m.name)}" loading="lazy">`
      : `<div class="meal-img-placeholder">🍽️</div>`;

    const notesHtml = m.description
      ? `<div class="meal-notes">${esc(m.description)}</div>`
      : '';

    const metaItems = [];
    if (m.prep_time) metaItems.push(`<span class="meal-meta-item"><i class="fa-solid fa-clock"></i>${m.prep_time} min</span>`);
    if (rating) metaItems.push(`<span class="meal-meta-item">${starsHtml}<span style="margin-left:2px;color:var(--text);font-weight:700;">${rating}</span></span>`);
    if (m.review_count) metaItems.push(`<span class="meal-meta-item"><i class="fa-regular fa-comment"></i>${m.review_count}</span>`);

    return `<div class="meal-card" style="animation-delay:${idx * 50}ms" onclick="openModal('${m.id}')">
      <!-- LEFT: image -->
      <div class="meal-img-wrap">
        ${imgHtml}
        ${!avail ? `<div class="unavail-overlay"><span class="unavail-badge">Unavailable</span></div>` : ''}
        ${rating ? `<span class="rating-tag"><i class="fa-solid fa-star"></i>${rating}</span>` : ''}
        ${m.category ? `<span class="cat-tag">${esc(m.category)}</span>` : ''}
      </div>
      <!-- RIGHT: details -->
      <div class="meal-info">
        <div class="meal-info-top">
          ${vendorName ? `<div class="meal-vendor-label">${esc(vendorName)}</div>` : ''}
          <div class="meal-name">${esc(m.name)}</div>
          ${notesHtml}
          ${metaItems.length ? `<div class="meal-meta">${metaItems.join('<span class="meal-meta-sep"></span>')}</div>` : ''}
        </div>
        <div class="meal-bottom">
          <div>
            <div class="meal-price">UGX ${(+m.price).toLocaleString()}</div>
          </div>
          <button class="add-btn ${inCart ? 'added' : ''}"
            id="add-${m.id}"
            onclick="event.stopPropagation(); addToCart('${m.id}', '${esc(m.name)}', ${m.price})"
            ${!avail ? 'disabled' : ''}
            aria-label="Add ${esc(m.name)} to cart">
            ${inCart ? '<i class="fa-solid fa-check"></i> Added' : '<i class="fa-solid fa-plus"></i> Add'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── FILTER ──
window.filterCat = (cat, btn) => {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const filtered = cat === 'All' ? allMeals : allMeals.filter(m => m.category === cat);
  renderMeals(filtered);
};

document.getElementById('mealSearch').addEventListener('input', e => {
  const term = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.cat-btn').classList.add('active');
  renderMeals(allMeals.filter(m =>
    m.name.toLowerCase().includes(term) ||
    (m.description || '').toLowerCase().includes(term) ||
    (m.category || '').toLowerCase().includes(term)
  ));
});

// ── OPEN MODAL ──
window.openModal = async (id) => {
  const m = allMeals.find(x => x.id === id);
  if (!m) return;
  currentMeal = m;
  selectedRating = 0;
  updateStarPicker(0);
  document.getElementById('reviewText').value = '';
  document.getElementById('reviewMsg').className = 'review-msg';

  const imgWrap = document.getElementById('modalImgWrap');
  imgWrap.innerHTML = m.image_url
    ? `<div class="modal-img-wrap"><img src="${m.image_url}" alt="${esc(m.name)}" loading="lazy"><div class="modal-img-overlay"></div>${m.is_available===false ? '<div class="modal-unavail-strip">Currently Unavailable</div>' : ''}</div>`
    : `<div class="modal-img-placeholder">🍽️</div>`;

  document.getElementById('modalVendor').textContent = m.profiles?.business_name || vendorProfile?.business_name || '';
  document.getElementById('modalName').textContent = m.name;
  document.getElementById('modalDesc').textContent = m.description || 'A delicious dish prepared fresh for you.';
  document.getElementById('modalPrice').textContent = `UGX ${(+m.price).toLocaleString()}`;

  const chips = [];
  if (m.prep_time) chips.push(`<span class="modal-chip"><i class="fa-solid fa-clock"></i>${m.prep_time} min prep</span>`);
  if (m.category) chips.push(`<span class="modal-chip"><i class="fa-solid fa-tag"></i>${esc(m.category)}</span>`);
  if (m.is_available === false) chips.push(`<span class="modal-chip" style="color:var(--danger);border-color:var(--danger)"><i class="fa-solid fa-circle-xmark"></i>Unavailable</span>`);
  document.getElementById('modalChips').innerHTML = chips.join('');

  const addBtn = document.getElementById('modalAddBtn');
  addBtn.disabled = m.is_available === false;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  loadReviews(id);
};

window.closeModal = () => {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentMeal = null;
};

window.handleOverlayClick = (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
};

window.addFromModal = () => {
  if (!currentMeal) return;
  addToCart(currentMeal.id, currentMeal.name, currentMeal.price);
  const btn = document.getElementById('modalAddBtn');
  btn.innerHTML = '<i class="fa-solid fa-check"></i> Added!';
  btn.style.background = 'var(--success)';
  setTimeout(() => {
    btn.innerHTML = '<i class="fa-solid fa-plus"></i> Add to Cart';
    btn.style.background = '';
  }, 1800);
};

// ── LOAD REVIEWS ──
async function loadReviews(mealId) {
  document.getElementById('reviewsList').innerHTML = `<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:.82rem;"><i class="fa-solid fa-spinner fa-spin" style="margin-right:6px;"></i> Loading reviews…</div>`;

  const { data, error } = await supabase
    .from('reviews')
    .select('*, reviewer:profiles!reviews_user_id_fkey(full_name, avatar_url)')
    .eq('meal_id', mealId)
    .order('created_at', { ascending: false })
    .limit(20);

  mealReviews = data || [];
  renderReviews(mealReviews);
}

function renderReviews(reviews) {
  const count = reviews.length;
  const avgEl = document.getElementById('ratingAvgNum');
  const avgStarsEl = document.getElementById('ratingAvgStars');
  const countEl = document.getElementById('ratingCount');
  const barsEl = document.getElementById('ratingBars');

  if (!count) {
    avgEl.textContent = '—';
    avgStarsEl.innerHTML = '';
    countEl.textContent = 'No reviews yet';
    barsEl.innerHTML = '';
    document.getElementById('reviewsList').innerHTML = `<div class="no-reviews"><i class="fa-regular fa-star"></i>No reviews yet — be the first!</div>`;
    return;
  }

  const avg = reviews.reduce((s, r) => s + (r.rating || 0), 0) / count;
  avgEl.textContent = avg.toFixed(1);
  countEl.textContent = `${count} review${count !== 1 ? 's' : ''}`;

  avgStarsEl.innerHTML = [1,2,3,4,5].map(i =>
    `<i class="fa-solid fa-star ${i <= Math.round(avg) ? '' : 'empty'}" style="${i <= Math.round(avg) ? 'color:var(--warning)' : 'color:var(--border)'}"></i>`
  ).join('');

  const dist = [5,4,3,2,1].map(v => ({ v, c: reviews.filter(r => r.rating === v).length }));
  barsEl.innerHTML = dist.map(d => `
    <div class="star-row">
      <span class="star-num">${d.v}</span>
      <i class="fa-solid fa-star" style="color:var(--warning);font-size:.6rem;"></i>
      <div class="star-bar"><div class="star-bar-fill" style="width:${count ? Math.round(d.c/count*100) : 0}%"></div></div>
      <span style="font-size:.65rem;color:var(--text-muted);font-weight:700;width:20px;text-align:right;">${d.c}</span>
    </div>`).join('');

  document.getElementById('reviewsList').innerHTML = reviews.slice(0, 8).map(r => {
    const name = r.reviewer?.full_name || 'Anonymous';
    const initials = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const date = new Date(r.created_at).toLocaleDateString('en-UG', { day:'numeric', month:'short', year:'numeric' });
    const stars = [1,2,3,4,5].map(i =>
      `<i class="fa-solid fa-star ${i <= (r.rating||0) ? '' : 'empty'}" style="${i <= (r.rating||0) ? 'color:var(--warning)' : 'color:var(--border)'}"></i>`
    ).join('');

    return `<div class="review-card">
      <div class="review-header">
        <div class="review-author">
          <div class="review-avatar">${initials}</div>
          <div>
            <div class="review-name">${esc(name)}</div>
            <div class="review-date">${date}</div>
          </div>
        </div>
        <div class="review-stars">${stars}</div>
      </div>
      ${r.comment ? `<div class="review-text">${esc(r.comment)}</div>` : ''}
    </div>`;
  }).join('');
}

// ── STAR PICKER ──
window.setRating = (v) => { selectedRating = v; updateStarPicker(v); };
function updateStarPicker(v) {
  document.querySelectorAll('#starPicker i').forEach((star, idx) => {
    star.className = idx < v ? 'fa-solid fa-star lit' : 'fa-regular fa-star';
  });
}
document.getElementById('starPicker').addEventListener('mouseover', e => {
  if (e.target.tagName === 'I') {
    const v = +e.target.getAttribute('data-v');
    document.querySelectorAll('#starPicker i').forEach((s, i) => {
      s.className = i < v ? 'fa-solid fa-star lit' : 'fa-regular fa-star';
    });
  }
});
document.getElementById('starPicker').addEventListener('mouseleave', () => updateStarPicker(selectedRating));

// ── SUBMIT REVIEW ──
window.submitReview = async () => {
  if (!currentMeal) return;
  if (!selectedRating) { showReviewMsg('err', 'Please select a star rating first'); return; }
  const comment = document.getElementById('reviewText').value.trim();
  const btn = document.getElementById('reviewSubmitBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting…';

  try {
    const { data: existing } = await supabase.from('reviews').select('id').eq('meal_id', currentMeal.id).eq('user_id', currentUser.id).maybeSingle();
    if (existing) {
      const { error } = await supabase.from('reviews').update({ rating: selectedRating, comment, updated_at: new Date().toISOString() }).eq('id', existing.id);
      if (error) throw error;
    } else {
      const { error } = await supabase.from('reviews').insert({ meal_id: currentMeal.id, user_id: currentUser.id, rating: selectedRating, comment, created_at: new Date().toISOString() });
      if (error) throw error;
    }
    showReviewMsg('ok', '✓ Review submitted! Thank you.');
    document.getElementById('reviewText').value = '';
    selectedRating = 0;
    updateStarPicker(0);
    await loadReviews(currentMeal.id);
  } catch (err) {
    showReviewMsg('err', err.message || 'Could not submit review. Try again.');
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit Review';
};

function showReviewMsg(type, text) {
  const el = document.getElementById('reviewMsg');
  el.className = `review-msg ${type}`;
  el.innerHTML = `<i class="fa-solid fa-${type==='ok'?'check-circle':'circle-exclamation'}"></i> ${text}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { if (type === 'ok') el.className = 'review-msg'; }, 4000);
}

// ── CART ──
function getCart() { return JSON.parse(localStorage.getItem('nash_cart') || '[]'); }
function saveCart(c) { localStorage.setItem('nash_cart', JSON.stringify(c)); }

window.addToCart = (id, name, price) => {
  const cart = getCart();
  const ex = cart.find(i => i.id === id);
  if (ex) ex.qty = (ex.qty || 1) + 1;
  else cart.push({ id, name, price: +price, qty: 1 });
  saveCart(cart);
  const btn = document.getElementById(`add-${id}`);
  if (btn) { btn.classList.add('added'); btn.innerHTML = '<i class="fa-solid fa-check"></i> Added'; }
  showToast(`${name} added`);
  updateCartUI();
};

function updateCartUI() {
  const cart = getCart();
  const count = cart.reduce((s, i) => s + (i.qty || 1), 0);
  const total = cart.reduce((s, i) => s + (i.price * (i.qty || 1)), 0);
  const floatEl = document.getElementById('cartFloat');
  const badge = document.getElementById('cartFloatBadge');
  const label = document.getElementById('cartFloatLabel');
  if (floatEl) {
    floatEl.classList.toggle('visible', count > 0);
    if (badge) badge.textContent = count;
    if (label) label.textContent = `UGX ${total.toLocaleString()} · ${count} item${count !== 1 ? 's' : ''}`;
  }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── ERROR ──
function showError() {
  document.getElementById('mealSection').innerHTML = `
    <div class="empty-state">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <h3>Couldn't load menu</h3>
      <p>Check your connection and try again</p>
    </div>`;
}

// ── UTIL ──
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── BOOT ──
init();
</script>
</body>
</html>
