<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF4D2D">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nash Bites">
  <link rel="apple-touch-icon" href="tent.jpg">
  <link rel="icon" type="image/jpeg" href="tent.jpg">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
  <title>Nash Bites | Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root{
      --primary:#FF4D2D;--primary-dark:#e63e20;--primary-light:#FFF0ED;--primary-glow:rgba(255,77,45,.18);
      --bg:#F4F6FB;--bg-card:#FFFFFF;--bg-input:#F0F3F9;
      --text:#0D1321;--text-secondary:#5A6A85;--text-muted:#9DADC4;--border:#E4EAF4;
      --success:#22C55E;--success-light:#F0FDF4;
      --warning:#F59E0B;--danger:#EF4444;
      --shadow-sm:0 2px 10px rgba(13,19,33,.07);
      --shadow-md:0 8px 28px rgba(13,19,33,.11);
      --shadow-lg:0 16px 48px rgba(13,19,33,.14);
      --shadow-card:0 4px 20px rgba(13,19,33,.08);
      --footer-h:72px;
      --radius-card:20px;
    }
    [data-theme="dark"]{
      --bg:#080E1C;--bg-card:#111827;--bg-input:#1A2540;
      --text:#F1F5F9;--text-secondary:#8DA0BC;--text-muted:#4A6080;
      --border:#1E2E48;--primary-light:#2A1510;--success-light:#052E16;
      --shadow-sm:0 2px 10px rgba(0,0,0,.25);
      --shadow-md:0 8px 28px rgba(0,0,0,.3);
      --shadow-card:0 4px 20px rgba(0,0,0,.22);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Nunito',sans-serif;
      background:var(--bg);color:var(--text);
      overflow-x:hidden;
      padding-bottom:calc(var(--footer-h) + 32px);
      transition:background .3s,color .3s;
    }

    /* ── TOPBAR ── */
    .topbar{
      position:sticky;top:0;z-index:200;
      background:var(--bg-card);
      border-bottom:1px solid var(--border);
      padding:0 18px;height:62px;
      display:flex;align-items:center;justify-content:space-between;
      transition:background .3s;
      box-shadow:var(--shadow-sm);
    }
    @media(min-width:768px){.topbar{padding:0 32px;height:68px;}}
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .brand-icon{width:38px;height:38px;border-radius:12px;overflow:hidden;box-shadow:0 4px 12px rgba(255,77,45,.35);flex-shrink:0;}
    .brand-icon img{width:100%;height:100%;object-fit:cover;display:block;}
    .brand-name{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;color:var(--text);letter-spacing:-0.3px;}
    .topbar-right{display:flex;align-items:center;gap:8px;}
    .top-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-input);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.88rem;transition:.2s;text-decoration:none;}
    .top-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
    .top-btn img{width:100%;height:100%;border-radius:50%;object-fit:cover;}

    /* Vendor meta */
    .vendor-meta{display:flex;flex-wrap:wrap;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);max-width:1200px;margin:0 auto;}
    @media(min-width:768px){.vendor-meta{padding:10px 32px;}}
    .v-chip{display:flex;align-items:center;gap:5px;font-size:.74rem;font-weight:700;color:var(--text-secondary);}
    .v-chip i{color:var(--primary);font-size:.68rem;}
    .s-dot{width:8px;height:8px;border-radius:50%;background:var(--border);}
    .s-dot.open{background:var(--success);box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:glow 2s infinite;}
    @keyframes glow{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}

    /* ── STICKY FILTERS ── */
    .sticky-filters{position:sticky;top:62px;z-index:150;background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 18px;transition:background .3s;}
    @media(min-width:768px){.sticky-filters{top:68px;padding:12px 32px;}}
    .search-wrap{position:relative;margin-bottom:10px;}
    .search-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.85rem;pointer-events:none;}
    #mealSearch{width:100%;padding:11px 14px 11px 40px;border-radius:50px;border:1.5px solid var(--border);background:var(--bg-input);font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:600;color:var(--text);outline:none;transition:.2s;}
    #mealSearch::placeholder{color:var(--text-muted);}
    #mealSearch:focus{border-color:var(--primary);background:var(--bg-card);box-shadow:0 0 0 3px var(--primary-glow);}
    .cats{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:2px 1px;}
    .cats::-webkit-scrollbar{display:none;}
    .cat-btn{padding:7px 16px;background:var(--bg-input);border-radius:50px;border:1.5px solid var(--border);font-size:.73rem;font-weight:800;cursor:pointer;white-space:nowrap;color:var(--text-secondary);transition:.2s;font-family:'Nunito',sans-serif;}
    .cat-btn:hover{border-color:var(--primary);color:var(--primary);}
    .cat-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 12px rgba(255,77,45,.32);}

    /* ── CATEGORY SECTIONS — 2-column vertical grid ── */
    .meal-wrap{padding:0 0 4px;max-width:100%;}
    .cat-section{margin-bottom:32px;}
    .cat-section-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:18px 18px 12px;
    }
    @media(min-width:768px){.cat-section-header{padding:22px 32px 14px;}}
    .cat-section-title{
      font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:900;
      color:var(--text);display:flex;align-items:center;gap:8px;
    }
    .cat-section-title::before{content:'';display:inline-block;width:4px;height:18px;border-radius:3px;background:var(--primary);flex-shrink:0;}

    /* View all link */
    .view-all-link{
      font-size:.72rem;font-weight:800;color:var(--primary);
      text-decoration:none;display:flex;align-items:center;gap:4px;
      padding:5px 12px;border-radius:20px;border:1.5px solid var(--primary-light);
      background:var(--primary-light);transition:.2s;
    }
    .view-all-link:hover{background:var(--primary);color:#fff;}

    /* 2-col vertical grid for each section */
    .cat-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:12px;
      padding:0 18px;
    }
    @media(min-width:560px){.cat-grid{gap:14px;}}
    @media(min-width:768px){.cat-grid{padding:0 32px;gap:16px;}}
    @media(min-width:900px){.cat-grid{grid-template-columns:repeat(3,1fr);}}
    @media(min-width:1200px){.cat-grid{grid-template-columns:repeat(4,1fr);}}

    /* Search/flat grid (same layout) */
    .meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 18px;}
    @media(min-width:560px){.meal-grid{gap:14px;}}
    @media(min-width:768px){.meal-grid{padding:0 32px;grid-template-columns:repeat(2,1fr);gap:16px;}}
    @media(min-width:900px){.meal-grid{grid-template-columns:repeat(3,1fr);}}
    @media(min-width:1200px){.meal-grid{grid-template-columns:repeat(4,1fr);}}

    /* ── MEAL CARD ── */
    .meal-card{
      background:var(--bg-card);border-radius:18px;overflow:hidden;
      border:1px solid var(--border);
      box-shadow:var(--shadow-card);
      display:flex;flex-direction:column;
      cursor:pointer;
      transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s;
      animation:fadeUp .4s ease both;
      position:relative;
    }
    .meal-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .meal-img-top{position:relative;width:100%;padding-top:72%;overflow:hidden;background:linear-gradient(135deg,var(--primary-light),#FFE4DC);flex-shrink:0;}
    .meal-img-top img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.16,1,.3,1);display:block;}
    .meal-card:hover .meal-img-top img{transform:scale(1.06);}
    .meal-img-ph{position:absolute;inset:0;background:linear-gradient(135deg,#FFF0ED,#FFE4DC);display:flex;align-items:center;justify-content:center;font-size:2.8rem;}
    .meal-img-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.42) 0%,rgba(0,0,0,.06) 40%,transparent 70%);}
    .unavail-overlay{position:absolute;inset:0;background:rgba(13,19,33,.45);display:flex;align-items:center;justify-content:center;}
    .unavail-badge{background:rgba(255,255,255,.96);color:var(--danger);font-size:.52rem;font-weight:900;padding:4px 11px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;}
    .rating-tag{position:absolute;top:8px;left:8px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);color:var(--text);font-size:.6rem;font-weight:900;padding:3px 8px;border-radius:30px;display:flex;align-items:center;gap:3px;box-shadow:0 2px 8px rgba(0,0,0,.12);}
    .rating-tag i{color:var(--warning);font-size:.58rem;}
    .cat-pill{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);color:rgba(255,255,255,.92);font-size:.5rem;font-weight:800;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.6px;}

    /* Heart — saved state */
    .meal-save{
      position:absolute;bottom:8px;right:8px;
      width:28px;height:28px;border-radius:50%;
      background:rgba(255,255,255,.88);backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:center;
      font-size:.72rem;color:var(--text-muted);
      transition:.2s;cursor:pointer;border:none;
      box-shadow:0 2px 8px rgba(0,0,0,.14);
    }
    .meal-save:hover{color:var(--danger);background:#fff;transform:scale(1.15);}
    .meal-save.saved{color:var(--danger);background:#fff;}
    .meal-save.saved i{font-weight:900;}

    .meal-body{padding:10px 10px 10px;display:flex;flex-direction:column;flex:1;}
    .meal-vendor-lbl{font-size:.56rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:2px;}
    .meal-name{font-size:.83rem;font-weight:900;line-height:1.25;margin-bottom:3px;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;letter-spacing:-.2px;}
    .meal-desc{font-size:.68rem;color:var(--text-muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:7px;font-weight:500;}
    .meal-meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap;font-size:.62rem;color:var(--text-muted);font-weight:700;margin-bottom:7px;}
    .meal-meta i{color:var(--primary);font-size:.55rem;}
    .meal-meta i.star-i{color:var(--warning);}
    .meal-footer{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:auto;}
    .meal-price{font-weight:900;font-size:.82rem;color:var(--text);letter-spacing:-.3px;}

    /* ADD BUTTON */
    .add-btn{height:30px;padding:0 12px;border-radius:50px;background:var(--primary);color:#fff;border:none;cursor:pointer;font-size:.67rem;font-weight:800;display:flex;align-items:center;gap:4px;transition:.2s;flex-shrink:0;font-family:'Nunito',sans-serif;box-shadow:0 3px 10px rgba(255,77,45,.28);}
    .add-btn:hover{background:var(--primary-dark);transform:scale(1.04);}
    .add-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}

    /* QTY CONTROLS */
    .qty-ctrl{display:flex;align-items:center;gap:0;flex-shrink:0;background:var(--bg-input);border-radius:50px;overflow:hidden;border:1.5px solid var(--border);}
    .qty-btn{width:28px;height:28px;border:none;background:transparent;color:var(--text);cursor:pointer;font-size:.85rem;font-weight:900;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
    .qty-btn:hover{background:var(--primary);color:#fff;}
    .qty-btn.minus:hover{background:var(--danger);}
    .qty-num{min-width:24px;text-align:center;font-size:.78rem;font-weight:900;color:var(--text);padding:0 2px;line-height:28px;}

    /* skeleton */
    .skel{background:var(--bg-card);border-radius:18px;border:1px solid var(--border);overflow:hidden;animation:skel-pulse 1.6s ease infinite;}
    .skel-img{height:140px;background:var(--bg-input);}
    .skel-body{padding:10px;}
    .skel-line{height:11px;border-radius:6px;background:var(--bg-input);margin-bottom:9px;}
    .skel-line.short{width:55%;}
    @keyframes skel-pulse{0%,100%{opacity:1}50%{opacity:.5}}

    .empty{grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--text-muted);}
    .empty i{font-size:2.8rem;margin-bottom:14px;display:block;opacity:.25;}
    .empty h3{font-size:.98rem;font-weight:800;color:var(--text-secondary);margin-bottom:5px;}
    .empty p{font-size:.83rem;}

    /* ── CART FLOAT ── */
    .cart-float{position:fixed;bottom:32px;right:28px;z-index:1800;display:none;align-items:center;gap:10px;}
    @media(min-width:768px){.cart-float.visible{display:flex;}}
    .cart-float-btn{height:52px;padding:0 22px;border-radius:50px;background:var(--primary);color:#fff;display:flex;align-items:center;gap:10px;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:800;text-decoration:none;box-shadow:0 8px 28px rgba(255,77,45,.42);transition:.22s;position:relative;animation:cartPop .3s cubic-bezier(.16,1,.3,1);}
    @keyframes cartPop{from{transform:scale(.8) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
    .cart-float-btn:hover{transform:scale(1.04) translateY(-2px);box-shadow:0 12px 36px rgba(255,77,45,.5);}
    .cart-badge{background:rgba(255,255,255,.25);width:22px;height:22px;border-radius:50%;font-size:.65rem;font-weight:900;display:flex;align-items:center;justify-content:center;}
    .cart-float-label{font-size:.82rem;font-weight:800;}

    /* toast */
    .toast{position:fixed;bottom:calc(var(--footer-h)+16px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;padding:11px 22px;border-radius:50px;font-size:.82rem;font-weight:800;white-space:nowrap;z-index:3500;opacity:0;transition:.3s;pointer-events:none;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast i{color:var(--success);}

    /* ── OFFLINE / SLOW NETWORK BANNER ── */
    .net-banner{
      position:fixed;top:0;left:0;right:0;z-index:9000;
      padding:10px 18px;
      display:flex;align-items:center;gap:10px;
      font-size:.8rem;font-weight:800;
      transform:translateY(-100%);transition:transform .35s cubic-bezier(.16,1,.3,1);
      pointer-events:none;
    }
    .net-banner.show{transform:translateY(0);pointer-events:auto;}
    .net-banner.offline{background:#1e293b;color:#f1f5f9;}
    .net-banner.slow{background:#78350f;color:#fef3c7;}
    .net-banner i{font-size:1rem;flex-shrink:0;}
    .net-banner-msg{flex:1;}
    .net-banner-close{cursor:pointer;background:rgba(255,255,255,.18);border:none;color:inherit;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:.15s;pointer-events:auto;}
    .net-banner-close:hover{background:rgba(255,255,255,.32);}

    /* ── FAB BUBBLE NAV ── */
    .footer-nav{display:none;}

    .fab-nav{position:fixed;bottom:28px;right:22px;z-index:2000;display:flex;flex-direction:column-reverse;align-items:center;gap:12px;}
    @media(min-width:768px){.fab-nav{display:none;}}

    /* + styled main button */
    .fab-main{
      width:56px;height:56px;border-radius:50%;
      background:var(--primary);color:#fff;
      border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 8px 28px rgba(255,77,45,.48);
      transition:transform .3s cubic-bezier(.16,1,.3,1), background .2s;
      position:relative;z-index:2;
      -webkit-tap-highlight-color:transparent;
    }
    .fab-main:hover{background:var(--primary-dark);}
    /* The + icon built with CSS pseudo-elements for a clean design */
    .fab-plus-icon{
      position:relative;width:22px;height:22px;
      transition:transform .35s cubic-bezier(.16,1,.3,1);
    }
    .fab-plus-icon::before,.fab-plus-icon::after{
      content:'';position:absolute;background:#fff;border-radius:3px;
      transition:transform .35s cubic-bezier(.16,1,.3,1),opacity .25s;
    }
    .fab-plus-icon::before{width:22px;height:3px;top:50%;left:0;transform:translateY(-50%);}
    .fab-plus-icon::after{width:3px;height:22px;left:50%;top:0;transform:translateX(-50%);}
    /* Rotate + to × when open */
    .fab-nav.open .fab-plus-icon{transform:rotate(45deg);}
    .fab-nav.open .fab-main{background:var(--text);}

    .fab-main::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid rgba(255,77,45,.25);transform:scale(0);opacity:0;transition:transform .3s, opacity .3s;}
    .fab-nav.open .fab-main::after{transform:scale(1);opacity:1;}

    .fab-items{display:flex;flex-direction:column-reverse;align-items:center;gap:10px;pointer-events:none;}
    .fab-nav.open .fab-items{pointer-events:auto;}

    .fab-item{display:flex;align-items:center;gap:0;text-decoration:none;opacity:0;transform:translateY(20px) scale(.7);transition:opacity .28s, transform .28s cubic-bezier(.16,1,.3,1);}
    .fab-nav.open .fab-item{opacity:1;transform:translateY(0) scale(1);}
    .fab-nav.open .fab-item:nth-child(1){transition-delay:.03s;}
    .fab-nav.open .fab-item:nth-child(2){transition-delay:.07s;}
    .fab-nav.open .fab-item:nth-child(3){transition-delay:.11s;}
    .fab-nav.open .fab-item:nth-child(4){transition-delay:.15s;}

    .fab-label{background:var(--bg-card);color:var(--text);font-size:.7rem;font-weight:800;padding:5px 11px;border-radius:20px;box-shadow:var(--shadow-md);border:1px solid var(--border);white-space:nowrap;margin-right:8px;opacity:0;transform:translateX(6px);transition:opacity .2s .1s, transform .2s .1s;}
    .fab-nav.open .fab-item:hover .fab-label,
    .fab-nav.open .fab-item:focus .fab-label{opacity:1;transform:translateX(0);}

    .fab-circle{width:46px;height:46px;border-radius:50%;background:var(--bg-card);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:var(--shadow-md);border:1.5px solid var(--border);transition:background .2s, color .2s, border-color .2s, transform .15s;flex-shrink:0;}
    .fab-item[data-nav="orders"] .fab-circle{color:#3B82F6;border-color:#BFDBFE;background:#EFF6FF;}
    .fab-item[data-nav="orders"]:hover .fab-circle,.fab-item[data-nav="orders"].active .fab-circle{background:#3B82F6;color:#fff;border-color:#3B82F6;transform:scale(1.08);}
    [data-theme="dark"] .fab-item[data-nav="orders"] .fab-circle{background:#172554;border-color:#1E3A5F;color:#60A5FA;}
    .fab-item[data-nav="cart"] .fab-circle{color:#22C55E;border-color:#BBF7D0;background:#F0FDF4;}
    .fab-item[data-nav="cart"]:hover .fab-circle,.fab-item[data-nav="cart"].active .fab-circle{background:#22C55E;color:#fff;border-color:#22C55E;transform:scale(1.08);}
    [data-theme="dark"] .fab-item[data-nav="cart"] .fab-circle{background:#052E16;border-color:#166534;color:#4ADE80;}
    .fab-item[data-nav="profile"] .fab-circle{color:#F59E0B;border-color:#FDE68A;background:#FFFBEB;}
    .fab-item[data-nav="profile"]:hover .fab-circle,.fab-item[data-nav="profile"].active .fab-circle{background:#F59E0B;color:#fff;border-color:#F59E0B;transform:scale(1.08);}
    [data-theme="dark"] .fab-item[data-nav="profile"] .fab-circle{background:#451A03;border-color:#78350F;color:#FCD34D;}
    .fab-item[data-nav="home"] .fab-circle{color:var(--primary);border-color:#FFCBBB;background:var(--primary-light);}
    .fab-item[data-nav="home"]:hover .fab-circle,.fab-item[data-nav="home"].active .fab-circle{background:var(--primary);color:#fff;border-color:var(--primary);transform:scale(1.08);}

    /* sec-header — hide count */
    .sec-header{padding:18px 18px 12px;display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;}
    @media(min-width:768px){.sec-header{padding:22px 32px 14px;}}
    .sec-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:900;color:var(--text);}
    .sec-count{display:none;}

    /* Modal — kept for detail page navigation (no longer used as popup) */
    .modal-overlay{display:none;}
  </style>
</head>
<body>

<!-- OFFLINE / SLOW BANNER -->
<div class="net-banner" id="netBanner">
  <i id="netBannerIcon" class="fa-solid fa-wifi-slash"></i>
  <span class="net-banner-msg" id="netBannerMsg">You're offline. Showing cached content.</span>
  <button class="net-banner-close" onclick="closeBanner()" title="Dismiss"><i class="fa-solid fa-xmark"></i></button>
</div>

<!-- TOPBAR -->
<nav class="topbar">
  <a href="home.html" class="brand">
    <div class="brand-icon"><img src="tent.jpg" alt="Nash Bites"></div>
    <span class="brand-name" id="brandName">Nash Bites</span>
  </a>
  <div class="topbar-right">
    <button class="top-btn" onclick="toggleTheme()" id="themeBtn" title="Toggle theme"><i class="fa-solid fa-moon"></i></button>
    <a class="top-btn" href="profile.html" id="profileBtn" title="Profile">
      <i class="fa-solid fa-user" id="profileFallback"></i>
      <img src="" alt="" id="profileAv" style="display:none">
    </a>
  </div>
</nav>

<!-- VENDOR META -->
<div class="vendor-meta-wrap" id="heroSection">
  <div class="vendor-meta" id="vendorMeta" style="display:none">
    <div class="v-chip"><div class="s-dot" id="statusDot"></div><span id="statusText">Checking…</span></div>
    <div class="v-chip" id="metaCat" style="display:none"><i class="fa-solid fa-tag"></i><span id="catLabel"></span></div>
    <div class="v-chip" id="metaHours" style="display:none"><i class="fa-solid fa-clock"></i><span id="hoursLabel"></span></div>
    <div class="v-chip" id="metaLoc" style="display:none"><i class="fa-solid fa-location-dot"></i><span id="locLabel"></span></div>
  </div>
</div>

<!-- FILTERS -->
<div class="sticky-filters">
  <div class="search-wrap">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="mealSearch" placeholder="Search meals, categories…" autocomplete="off">
  </div>
  <div class="cats" id="catFilter">
    <button class="cat-btn active" onclick="filterCat('All',this)">✦ All</button>
  </div>
</div>

<!-- SECTION HEADER -->
<div class="sec-header">
  <span class="sec-title" id="secTitle">All Items</span>
  <span class="sec-count" id="secCount"></span>
</div>

<!-- MEAL SECTIONS -->
<div class="meal-wrap" id="mealWrap">
  <div class="meal-grid" id="mealGrid">
    <div class="skel"><div class="skel-img"></div><div class="skel-body"><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line"></div></div></div>
    <div class="skel"><div class="skel-img"></div><div class="skel-body"><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line"></div></div></div>
    <div class="skel"><div class="skel-img"></div><div class="skel-body"><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line"></div></div></div>
    <div class="skel"><div class="skel-img"></div><div class="skel-body"><div class="skel-line"></div><div class="skel-line short"></div><div class="skel-line"></div></div></div>
  </div>
</div>

<!-- CART FLOAT (desktop only) -->
<div class="cart-float" id="cartFloat">
  <a class="cart-float-btn" href="cart.html">
    <i class="fa-solid fa-bag-shopping"></i>
    <span class="cart-float-label" id="cartFloatLabel">View Cart</span>
    <span class="cart-badge" id="cartBadge">0</span>
  </a>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-check-circle"></i><span id="toastMsg"></span></div>

<!-- FAB BUBBLE NAV (mobile) -->
<nav class="fab-nav" id="fabNav">
  <button class="fab-main" onclick="toggleFab()" aria-label="Navigation">
    <div class="fab-plus-icon"></div>
  </button>
  <div class="fab-items">
    <a href="order-history.html" class="fab-item" data-nav="orders">
      <span class="fab-label">Orders</span>
      <div class="fab-circle"><i class="fa-solid fa-receipt"></i></div>
    </a>
    <a href="cart.html" class="fab-item" data-nav="cart" id="fabCartLink">
      <span class="fab-label">Cart</span>
      <div class="fab-circle" style="position:relative;">
        <i class="fa-solid fa-bag-shopping"></i>
        <span id="fabCartBadge" style="display:none;position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--primary);color:#fff;font-size:.55rem;font-weight:900;align-items:center;justify-content:center;border:2px solid var(--bg-card);"></span>
      </div>
    </a>
    <a href="profile.html" class="fab-item" data-nav="profile">
      <span class="fab-label">Profile</span>
      <div class="fab-circle"><i class="fa-solid fa-user"></i></div>
    </a>
  </div>
</nav>

<nav class="footer-nav" style="display:none!important"></nav>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const S = createClient(
  'https://lwpwicajcbcmzkyecnbv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3cHdpY2FqY2JjbXpreWVjbmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDgxNjAsImV4cCI6MjA5MTkyNDE2MH0.BF2azgoZPOmo4OP9Zo1-QNpXX-EJ23BWQx-lf3GgW68'
);

let allMeals=[], vendorProfile=null, currentUser=null, currentProfile=null;
const params=new URLSearchParams(location.search);
const vendorId=params.get('vendor_id');

// ── THEME ──
function loadTheme(){const t=localStorage.getItem('nash-theme')||'light';document.documentElement.setAttribute('data-theme',t);document.querySelector('#themeBtn i').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}
window.toggleTheme=()=>{const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('nash-theme',t);document.querySelector('#themeBtn i').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';};
loadTheme();

// ── NETWORK DETECTION ──
let slowTimer=null,bannerShown=false;
function showBanner(type, msg){
  const b=document.getElementById('netBanner');
  const ic=document.getElementById('netBannerIcon');
  const ms=document.getElementById('netBannerMsg');
  b.className=`net-banner ${type} show`;
  ic.className=type==='offline'?'fa-solid fa-wifi-slash':'fa-solid fa-signal-weak';
  ms.textContent=msg;
  bannerShown=true;
}
window.closeBanner=()=>{
  const b=document.getElementById('netBanner');
  b.classList.remove('show');
  bannerShown=false;
};
window.addEventListener('offline',()=>showBanner('offline',"You're offline. Some content may not load."));
window.addEventListener('online',()=>{
  if(bannerShown) closeBanner();
  showToast('Back online ✓');
});
// Slow connection detection
function startSlowTimer(){
  slowTimer=setTimeout(()=>{
    if(!navigator.onLine){showBanner('offline',"You appear to be offline.");return;}
    showBanner('slow',"Slow connection detected. Meals are taking longer than usual…");
  },5000);
}
function clearSlowTimer(){clearTimeout(slowTimer);}

// ── FAVORITES (localStorage) ──
function getFavs(){return JSON.parse(localStorage.getItem('nash_favs')||'[]');}
function saveFavs(f){localStorage.setItem('nash_favs',JSON.stringify(f));}
window.toggleFav=(id, btn, e)=>{
  if(e) e.stopPropagation();
  let favs=getFavs();
  const idx=favs.indexOf(id);
  if(idx>=0){
    favs.splice(idx,1);
    btn.classList.remove('saved');
    btn.querySelector('i').className='fa-regular fa-heart';
    showToast('Removed from favorites');
  } else {
    favs.push(id);
    btn.classList.add('saved');
    btn.querySelector('i').className='fa-solid fa-heart';
    showToast('Saved to favorites ♥');
  }
  saveFavs(favs);
};

async function init(){
  const {data:{user}}=await S.auth.getUser();
  if(!user){location.href='index.html';return;}
  currentUser=user;
  const {data:prof}=await S.from('profiles').select('full_name,avatar_url').eq('id',user.id).single();
  currentProfile=prof||{};
  loadProfileAvatar();
  startSlowTimer();
  if(vendorId){await loadVendorProfile();await loadMeals(vendorId);}
  else await loadAllMeals();
  clearSlowTimer();
  closeBanner();
  updateCartUI();
}

function loadProfileAvatar(){
  const img=document.getElementById('profileAv'), icon=document.getElementById('profileFallback');
  if(currentProfile?.avatar_url){
    const {data}=S.storage.from('avatars').getPublicUrl(currentProfile.avatar_url);
    img.src=`${data.publicUrl}?t=${Date.now()}`;img.style.display='block';icon.style.display='none';
    img.onerror=()=>{img.style.display='none';icon.style.display='';};
  }
}

async function loadVendorProfile(){
  const {data}=await S.from('profiles').select('*').eq('id',vendorId).single();
  if(!data) return;
  vendorProfile=data;
  const name=data.business_name||data.full_name||'Our Kitchen';
  document.getElementById('brandName').textContent=name;
  document.title=`${name} | Nash Bites`;
  const meta=document.getElementById('vendorMeta');meta.style.display='flex';
  const dot=document.getElementById('statusDot'),txt=document.getElementById('statusText');
  if(data.is_online||data.store_open){dot.classList.add('open');txt.textContent='Open Now';}
  else{txt.textContent='Currently Closed';}
  if(data.biz_category){document.getElementById('metaCat').style.display='flex';document.getElementById('catLabel').textContent=data.biz_category;}
  if(data.operating_hours){document.getElementById('metaHours').style.display='flex';document.getElementById('hoursLabel').textContent=data.operating_hours;}
  if(data.kitchen_location){document.getElementById('metaLoc').style.display='flex';document.getElementById('locLabel').textContent=data.kitchen_location;}
}

async function loadMeals(vid){
  const {data,error}=await S.from('meals').select('*').eq('vendor_id',vid).order('created_at',{ascending:false});
  if(error){showError();return;}
  allMeals=data||[];
  buildCats(allMeals);renderMeals(allMeals,true);
}

async function loadAllMeals(){
  const {data,error}=await S.from('meals').select('*, profiles!meals_vendor_id_fkey(business_name,is_online,kitchen_location,store_open)').eq('is_available',true).order('created_at',{ascending:false});
  if(error){showError();return;}
  allMeals=(data||[]).filter(m=>m.profiles?.is_online||m.profiles?.store_open);
  buildCats(allMeals);renderMeals(allMeals,true);
}

function buildCats(meals){
  const cats=[...new Set(meals.map(m=>m.category).filter(Boolean))];
  const bar=document.getElementById('catFilter');
  bar.innerHTML=`<button class="cat-btn active" onclick="filterCat('All',this)">✦ All</button>`;
  cats.forEach(c=>{const b=document.createElement('button');b.className='cat-btn';b.textContent=c;b.setAttribute('onclick',`filterCat('${c}',this)`);bar.appendChild(b);});
}

function renderMeals(meals, grouped){
  const wrap=document.getElementById('mealWrap');
  const cart=getCart();
  const favs=getFavs();
  document.getElementById('secTitle').textContent=vendorProfile?(vendorProfile.business_name||'Menu'):'All Items';
  if(!meals.length){
    wrap.innerHTML=`<div class="meal-grid"><div class="empty"><i class="fa-solid fa-bowl-food"></i><h3>Nothing found</h3><p>Try another category or search term</p></div></div>`;
    return;
  }

  const cardHtml=(m,i)=>{
    const cartItem=cart.find(c=>c.id===m.id);const inCart=!!cartItem;const qty=cartItem?.qty||0;
    const avail=m.is_available!==false;
    const isFav=favs.includes(m.id);
    const vName=m.profiles?.business_name||'';
    const rating=m.avg_rating?(+m.avg_rating).toFixed(1):null;
    const starsC=rating?Math.round(+m.avg_rating):0;
    const imgHtml=m.image_url
      ?`<img src="${m.image_url}" alt="${esc(m.name)}" loading="lazy">`
      :`<div class="meal-img-ph">🍽️</div>`;
    const meta=[];
    if(m.prep_time) meta.push(`<span><i class="fa-solid fa-clock"></i>${m.prep_time}m</span>`);
    if(rating) meta.push(`<span>${[1,2,3,4,5].map(s=>`<i class="fa-solid fa-star${s<=starsC?' star-i':''}" style="${s<=starsC?'color:var(--warning)':'color:var(--border)'}"></i>`).join('')} ${rating}</span>`);
    const footerBtn=inCart
      ?`<div class="qty-ctrl">
          <button class="qty-btn minus" onclick="event.stopPropagation();removeFromCart('${m.id}')" title="Remove one"><i class="fa-solid fa-minus"></i></button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn plus" onclick="event.stopPropagation();addToCart('${m.id}','${esc(m.name)}',${m.price})" title="Add one"><i class="fa-solid fa-plus"></i></button>
        </div>`
      :`<button class="add-btn" onclick="event.stopPropagation();addToCart('${m.id}','${esc(m.name)}',${m.price})" ${!avail?'disabled':''}><i class="fa-solid fa-plus"></i> Add</button>`;
    return `<div class="meal-card" data-meal-id="${m.id}" style="animation-delay:${i*35}ms" onclick="goToDetail('${m.id}')">
      <div class="meal-img-top">
        ${imgHtml}
        <div class="meal-img-gradient"></div>
        ${!avail?`<div class="unavail-overlay"><span class="unavail-badge">Unavailable</span></div>`:''}
        ${rating?`<span class="rating-tag"><i class="fa-solid fa-star"></i>${rating}</span>`:''}
        ${m.category?`<span class="cat-pill">${esc(m.category)}</span>`:''}
        <button class="meal-save${isFav?' saved':''}" onclick="toggleFav('${m.id}',this,event)" title="${isFav?'Remove from favorites':'Save to favorites'}">
          <i class="fa-${isFav?'solid':'regular'} fa-heart"></i>
        </button>
      </div>
      <div class="meal-body">
        <div>
          ${vName?`<div class="meal-vendor-lbl">${esc(vName)}</div>`:''}
          <div class="meal-name">${esc(m.name)}</div>
          ${m.description?`<div class="meal-desc">${esc(m.description)}</div>`:''}
          ${meta.length?`<div class="meal-meta">${meta.join('<span style="margin:0 3px;opacity:.3">·</span>')}</div>`:''}
        </div>
        <div class="meal-footer">
          <div class="meal-price">UGX ${(+m.price).toLocaleString()}</div>
          ${footerBtn}
        </div>
      </div>
    </div>`;
  };

  if(grouped){
    const ORDER=['Breakfast','Lunch','Drinks'];
    const allCats=[...new Set(meals.map(m=>m.category||'Other'))];
    const cats=[...ORDER.filter(c=>allCats.includes(c)),...allCats.filter(c=>!ORDER.includes(c))];
    wrap.innerHTML=cats.map(cat=>{
      const catMeals=meals.filter(m=>(m.category||'Other')===cat);
      // Show only 4 meals per section in home; more on detail page
      const preview=catMeals.slice(0,4);
      const hasMore=catMeals.length>4;
      const catParam=encodeURIComponent(cat);
      const vendorParam=vendorId?`&vendor_id=${vendorId}`:'';
      return `<div class="cat-section">
        <div class="cat-section-header">
          <span class="cat-section-title">${esc(cat)}</span>
          ${hasMore?`<a href="meal-details.html?cat=${catParam}${vendorParam}" class="view-all-link">View all <i class="fa-solid fa-arrow-right" style="font-size:.6rem"></i></a>`:''}
        </div>
        <div class="cat-grid">${preview.map((m,i)=>cardHtml(m,i)).join('')}</div>
      </div>`;
    }).join('');
  } else {
    wrap.innerHTML=`<div class="meal-grid">${meals.map((m,i)=>cardHtml(m,i)).join('')}</div>`;
  }
}

// Navigate to detail page instead of opening modal
window.goToDetail=(id)=>{
  const vendorParam=vendorId?`&vendor_id=${vendorId}`:'';
  location.href=`meal-details.html?meal_id=${id}${vendorParam}`;
};

window.filterCat=(cat,btn)=>{
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const filtered=cat==='All'?allMeals:allMeals.filter(m=>m.category===cat);
  renderMeals(filtered, cat==='All');
};
document.getElementById('mealSearch').addEventListener('input',e=>{
  const t=e.target.value.toLowerCase().trim();
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.cat-btn').classList.add('active');
  const filtered=allMeals.filter(m=>m.name.toLowerCase().includes(t)||(m.description||'').toLowerCase().includes(t)||(m.category||'').toLowerCase().includes(t));
  renderMeals(filtered, !t);
});

// ── CART ──
function getCart(){return JSON.parse(localStorage.getItem('nash_cart')||'[]');}
function saveCart(c){localStorage.setItem('nash_cart',JSON.stringify(c));}
window.addToCart=(id,name,price)=>{
  const cart=getCart();const ex=cart.find(i=>i.id===id);
  if(ex) ex.qty=(ex.qty||1)+1;else cart.push({id,name,price:+price,qty:1});
  saveCart(cart);
  showToast(`${name} added`);updateCartUI();updateCardFooter(id);
};
window.removeFromCart=(id)=>{
  const cart=getCart();const ex=cart.find(i=>i.id===id);
  if(!ex) return;
  ex.qty=(ex.qty||1)-1;
  if(ex.qty<=0) cart.splice(cart.indexOf(ex),1);
  saveCart(cart);
  updateCartUI();updateCardFooter(id);
};
function updateCardFooter(id){
  const m=allMeals.find(x=>x.id===id);if(!m) return;
  const card=document.querySelector(`[data-meal-id="${id}"]`);if(!card) return;
  const footer=card.querySelector('.meal-footer');if(!footer) return;
  const cart=getCart();
  const cartItem=cart.find(c=>c.id===id);const inCart=!!cartItem;const qty=cartItem?.qty||0;
  const avail=m.is_available!==false;
  const footerBtn=inCart
    ?`<div class="qty-ctrl">
        <button class="qty-btn minus" onclick="event.stopPropagation();removeFromCart('${id}')" title="Remove one"><i class="fa-solid fa-minus"></i></button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn plus" onclick="event.stopPropagation();addToCart('${id}','${esc(m.name)}',${m.price})" title="Add one"><i class="fa-solid fa-plus"></i></button>
      </div>`
    :`<button class="add-btn" onclick="event.stopPropagation();addToCart('${id}','${esc(m.name)}',${m.price})" ${!avail?'disabled':''}><i class="fa-solid fa-plus"></i> Add</button>`;
  footer.innerHTML=`<div class="meal-price">UGX ${(+m.price).toLocaleString()}</div>${footerBtn}`;
}
function updateCartUI(){
  const cart=getCart();const cnt=cart.reduce((s,i)=>s+(i.qty||1),0);const total=cart.reduce((s,i)=>s+(i.price*(i.qty||1)),0);
  const f=document.getElementById('cartFloat');
  f.classList.toggle('visible',cnt>0);
  document.getElementById('cartBadge').textContent=cnt;
  document.getElementById('cartFloatLabel').textContent=`${cnt} item${cnt!==1?'s':''} · UGX ${total.toLocaleString()}`;
  const fab=document.getElementById('fabCartBadge');
  if(fab){fab.textContent=cnt;fab.style.display=cnt>0?'flex':'none';}
}
function showToast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function showError(){document.getElementById('mealWrap').innerHTML=`<div class="meal-grid"><div class="empty"><i class="fa-solid fa-triangle-exclamation"></i><h3>Couldn't load menu</h3><p>Check your connection and refresh</p></div></div>`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
init();
</script>
<script>
  function toggleFab(){document.getElementById('fabNav').classList.toggle('open');}
  function closeFab(){document.getElementById('fabNav').classList.remove('open');}
  document.addEventListener('keydown',e=>{if(e.key==='Escape') closeFab();});
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
