<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF4D2D">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nash Bites">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
  <title>Nash Bites | Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root{
      --primary:#FF4D2D;--primary-dark:#e63e20;--primary-light:#FFF0ED;--primary-glow:rgba(255,77,45,.18);
      --bg:#F4F6FB;--bg-card:#FFFFFF;--bg-input:#F0F3F9;
      --text:#0D1321;--text-secondary:#5A6A85;--text-muted:#9DADC4;--border:#E4EAF4;
      --success:#22C55E;--success-light:#F0FDF4;
      --warning:#F59E0B;--danger:#EF4444;
      --shadow-sm:0 2px 10px rgba(13,19,33,.07);
      --shadow-md:0 8px 28px rgba(13,19,33,.11);
      --shadow-lg:0 16px 48px rgba(13,19,33,.14);
      --shadow-card:0 4px 20px rgba(13,19,33,.08);
      --footer-h:72px;
      --radius-card:20px;
    }
    [data-theme="dark"]{
      --bg:#080E1C;--bg-card:#111827;--bg-input:#1A2540;
      --text:#F1F5F9;--text-secondary:#8DA0BC;--text-muted:#4A6080;
      --border:#1E2E48;--primary-light:#2A1510;--success-light:#052E16;
      --shadow-sm:0 2px 10px rgba(0,0,0,.25);
      --shadow-md:0 8px 28px rgba(0,0,0,.3);
      --shadow-card:0 4px 20px rgba(0,0,0,.22);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Nunito',sans-serif;
      background:var(--bg);color:var(--text);
      overflow-x:hidden;
      padding-bottom:calc(var(--footer-h)+24px);
      transition:background .3s,color .3s;
    }

    /* ──────────────────────────────────────
       TOPBAR
    ────────────────────────────────────── */
    .topbar{
      position:sticky;top:0;z-index:200;
      background:var(--bg-card);
      border-bottom:1px solid var(--border);
      padding:0 18px;height:62px;
      display:flex;align-items:center;justify-content:space-between;
      transition:background .3s;
      box-shadow:var(--shadow-sm);
    }
    @media(min-width:768px){.topbar{padding:0 32px;height:68px;}}
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .brand-icon{
      width:38px;height:38px;border-radius:12px;
      overflow:hidden;
      box-shadow:0 4px 12px rgba(255,77,45,.35);
      flex-shrink:0;
    }
    .brand-icon img{width:100%;height:100%;object-fit:cover;display:block;}
    .brand-name{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;color:var(--text);letter-spacing:-0.3px;}
    .topbar-right{display:flex;align-items:center;gap:8px;}
    .top-btn{
      width:38px;height:38px;border-radius:50%;
      border:1.5px solid var(--border);
      background:var(--bg-input);
      color:var(--text-secondary);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;font-size:.88rem;transition:.2s;text-decoration:none;
    }
    .top-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
    .top-btn img{width:100%;height:100%;border-radius:50%;object-fit:cover;}

    /* Vendor meta */
    .vendor-meta{display:flex;flex-wrap:wrap;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);max-width:1200px;margin:0 auto;}
    @media(min-width:768px){.vendor-meta{padding:10px 32px;}}
    .v-chip{display:flex;align-items:center;gap:5px;font-size:.74rem;font-weight:700;color:var(--text-secondary);}
    .v-chip i{color:var(--primary);font-size:.68rem;}
    .s-dot{width:8px;height:8px;border-radius:50%;background:var(--border);}
    .s-dot.open{background:var(--success);box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:glow 2s infinite;}
    @keyframes glow{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}

    /* ──────────────────────────────────────
       STICKY FILTERS
    ────────────────────────────────────── */
    .sticky-filters{
      position:sticky;top:62px;z-index:150;
      background:var(--bg-card);border-bottom:1px solid var(--border);
      padding:12px 18px;transition:background .3s;
    }
    @media(min-width:768px){.sticky-filters{top:68px;padding:12px 32px;}}
    .search-wrap{position:relative;margin-bottom:10px;}
    .search-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.85rem;pointer-events:none;}
    #mealSearch{
      width:100%;padding:11px 14px 11px 40px;
      border-radius:50px;border:1.5px solid var(--border);
      background:var(--bg-input);
      font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:600;
      color:var(--text);outline:none;transition:.2s;
    }
    #mealSearch::placeholder{color:var(--text-muted);}
    #mealSearch:focus{border-color:var(--primary);background:var(--bg-card);box-shadow:0 0 0 3px var(--primary-glow);}
    .cats{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:2px 1px;}
    .cats::-webkit-scrollbar{display:none;}
    .cat-btn{
      padding:7px 16px;background:var(--bg-input);
      border-radius:50px;border:1.5px solid var(--border);
      font-size:.73rem;font-weight:800;cursor:pointer;
      white-space:nowrap;color:var(--text-secondary);
      transition:.2s;font-family:'Nunito',sans-serif;
    }
    .cat-btn:hover{border-color:var(--primary);color:var(--primary);}
    .cat-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 12px rgba(255,77,45,.32);}

    /* ──────────────────────────────────────
       SECTION HEADER
    ────────────────────────────────────── */
    .sec-header{
      padding:18px 18px 12px;display:flex;align-items:center;
      justify-content:space-between;max-width:1200px;margin:0 auto;
    }
    @media(min-width:768px){.sec-header{padding:22px 32px 14px;}}
    .sec-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:900;color:var(--text);}
    .sec-count{
      font-size:.73rem;font-weight:800;color:var(--text-muted);
      background:var(--bg-input);padding:4px 12px;
      border-radius:20px;border:1px solid var(--border);
    }

    /* ──────────────────────────────────────
       MEAL GRID — editorial asymmetric cards
    ────────────────────────────────────── */
    .meal-wrap{padding:0 16px 4px;max-width:1200px;margin:0 auto;}
    @media(min-width:768px){.meal-wrap{padding:0 30px 4px;}}

    .meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    @media(min-width:560px){.meal-grid{grid-template-columns:repeat(2,1fr);gap:14px;}}
    @media(min-width:900px){.meal-grid{grid-template-columns:repeat(3,1fr);gap:16px;}}
    @media(min-width:1200px){.meal-grid{grid-template-columns:repeat(4,1fr);gap:18px;}}

    /* ── MEAL CARD — editorial, borderless, unique ── */
    .meal-card{
      background:transparent;
      border-radius:0;
      overflow:visible;
      border:none;
      box-shadow:none;
      display:flex;flex-direction:column;
      cursor:pointer;
      transition:transform .35s cubic-bezier(.16,1,.3,1);
      animation:fadeUp .4s ease both;
      position:relative;
    }
    .meal-card:hover{transform:translateY(-4px);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    /* image area — borderless, full-bleed with radius */
    .meal-img-top{
      position:relative;width:100%;
      padding-top:75%;
      overflow:hidden;
      border-radius:16px;
      background:linear-gradient(135deg,var(--primary-light),#FFE4DC);
      flex-shrink:0;
    }
    .meal-img-top img{
      position:absolute;inset:0;width:100%;height:100%;
      object-fit:cover;transition:transform .5s cubic-bezier(.16,1,.3,1);display:block;
    }
    .meal-card:hover .meal-img-top img{transform:scale(1.06);}
    .meal-img-ph{
      position:absolute;inset:0;
      background:linear-gradient(135deg,#FFF0ED,#FFE4DC);
      display:flex;align-items:center;justify-content:center;font-size:3rem;
    }
    /* soft dark scrim at bottom only */
    .meal-img-gradient{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(0,0,0,.48) 0%,rgba(0,0,0,.08) 40%,transparent 70%);
      border-radius:16px;
    }
    .unavail-overlay{
      position:absolute;inset:0;border-radius:16px;
      background:rgba(13,19,33,.45);
      display:flex;align-items:center;justify-content:center;
    }
    .unavail-badge{
      background:rgba(255,255,255,.96);color:var(--danger);
      font-size:.55rem;font-weight:900;padding:4px 11px;
      border-radius:20px;text-transform:uppercase;letter-spacing:.5px;
    }
    /* rating pill — top left */
    .rating-tag{
      position:absolute;top:10px;left:10px;
      background:rgba(255,255,255,.9);backdrop-filter:blur(8px);
      color:var(--text);font-size:.62rem;font-weight:900;
      padding:4px 9px;border-radius:30px;
      display:flex;align-items:center;gap:3px;
      box-shadow:0 2px 8px rgba(0,0,0,.12);
    }
    .rating-tag i{color:var(--warning);font-size:.6rem;}
    /* category tag — top right */
    .cat-pill{
      position:absolute;top:10px;right:10px;
      background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
      color:rgba(255,255,255,.92);font-size:.52rem;font-weight:800;
      padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.6px;
    }
    /* save/heart */
    .meal-save{
      position:absolute;bottom:10px;right:10px;
      width:28px;height:28px;border-radius:50%;
      background:rgba(255,255,255,.85);backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:center;
      font-size:.68rem;color:var(--text-muted);
      transition:.2s;cursor:pointer;border:none;
      box-shadow:0 2px 8px rgba(0,0,0,.12);
    }
    .meal-save:hover{color:var(--danger);background:#fff;}

    /* card body — minimal, typographic */
    .meal-body{padding:10px 2px 4px;display:flex;flex-direction:column;flex:1;}
    .meal-vendor-lbl{font-size:.58rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:2px;}
    .meal-name{
      font-size:.88rem;font-weight:900;line-height:1.25;margin-bottom:3px;color:var(--text);
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
      letter-spacing:-.2px;
    }
    .meal-desc{
      font-size:.7rem;color:var(--text-muted);line-height:1.5;
      display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
      margin-bottom:8px;font-weight:500;
    }
    .meal-meta{
      display:flex;align-items:center;gap:4px;flex-wrap:wrap;
      font-size:.63rem;color:var(--text-muted);font-weight:700;margin-bottom:8px;
    }
    .meal-meta i{color:var(--primary);font-size:.56rem;}
    .meal-meta i.star-i{color:var(--warning);}
    .meal-footer{
      display:flex;align-items:center;justify-content:space-between;
      gap:6px;margin-top:auto;
    }
    .meal-price{font-weight:900;font-size:.85rem;color:var(--text);letter-spacing:-.3px;}

    /* ADD BUTTON — normal state */
    .add-btn{
      height:32px;padding:0 13px;border-radius:50px;
      background:var(--primary);color:#fff;border:none;cursor:pointer;
      font-size:.68rem;font-weight:800;
      display:flex;align-items:center;gap:4px;
      transition:.2s;flex-shrink:0;font-family:'Nunito',sans-serif;
      box-shadow:0 3px 10px rgba(255,77,45,.28);
    }
    .add-btn:hover{background:var(--primary-dark);transform:scale(1.04);}
    .add-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}

    /* QTY CONTROLS — shown when in cart */
    .qty-ctrl{
      display:flex;align-items:center;gap:0;flex-shrink:0;
      background:var(--bg-input);border-radius:50px;
      overflow:hidden;border:1.5px solid var(--border);
    }
    .qty-btn{
      width:30px;height:30px;border:none;background:transparent;
      color:var(--text);cursor:pointer;font-size:.9rem;font-weight:900;
      display:flex;align-items:center;justify-content:center;
      transition:.15s;flex-shrink:0;
    }
    .qty-btn:hover{background:var(--primary);color:#fff;}
    .qty-btn.minus:hover{background:var(--danger);}
    .qty-num{
      min-width:26px;text-align:center;font-size:.8rem;font-weight:900;
      color:var(--text);padding:0 2px;line-height:30px;
    }

    /* skeleton */
    .skel{
      background:var(--bg-card);border-radius:16px;
      border:none;overflow:hidden;
      animation:skel-pulse 1.6s ease infinite;
    }
    .skel-img{height:160px;background:var(--bg-input);border-radius:16px;}
    .skel-body{padding:10px 2px;}
    .skel-line{height:11px;border-radius:6px;background:var(--bg-input);margin-bottom:9px;}
    .skel-line.short{width:55%;}
    @keyframes skel-pulse{0%,100%{opacity:1}50%{opacity:.5}}

    /* empty */
    .empty{grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--text-muted);}
    .empty i{font-size:2.8rem;margin-bottom:14px;display:block;opacity:.25;}
    .empty h3{font-size:.98rem;font-weight:800;color:var(--text-secondary);margin-bottom:5px;}
    .empty p{font-size:.83rem;}

    /* ──────────────────────────────────────
       CART FLOAT — desktop only, appears when items in cart
    ────────────────────────────────────── */
    .cart-float{
      position:fixed;bottom:32px;right:28px;
      z-index:1800;display:none;align-items:center;gap:10px;
    }
    /* Only show on desktop (768+), mobile uses footer nav */
    @media(min-width:768px){
      .cart-float.visible{display:flex;}
    }
    .cart-float-btn{
      height:52px;padding:0 22px;border-radius:50px;
      background:var(--primary);color:#fff;
      display:flex;align-items:center;gap:10px;
      font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:800;
      text-decoration:none;
      box-shadow:0 8px 28px rgba(255,77,45,.42);
      transition:.22s;position:relative;
      animation:cartPop .3s cubic-bezier(.16,1,.3,1);
    }
    @keyframes cartPop{from{transform:scale(.8) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
    .cart-float-btn:hover{transform:scale(1.04) translateY(-2px);box-shadow:0 12px 36px rgba(255,77,45,.5);}
    .cart-float-btn i{font-size:1rem;}
    .cart-badge{
      background:rgba(255,255,255,.25);
      width:22px;height:22px;border-radius:50%;
      font-size:.65rem;font-weight:900;
      display:flex;align-items:center;justify-content:center;
    }
    .cart-float-label{font-size:.82rem;font-weight:800;}

    /* toast */
    .toast{
      position:fixed;bottom:calc(var(--footer-h)+16px);left:50%;
      transform:translateX(-50%) translateY(16px);
      background:var(--text);color:#fff;
      padding:11px 22px;border-radius:50px;
      font-size:.82rem;font-weight:800;white-space:nowrap;
      z-index:3500;opacity:0;transition:.3s;pointer-events:none;
      box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast i{color:var(--success);}

    /* ──────────────────────────────────────
       MEAL MODAL
    ────────────────────────────────────── */
    .modal-overlay{
      display:none;position:fixed;inset:0;
      background:rgba(8,14,28,.55);z-index:4000;
      backdrop-filter:blur(8px);
      align-items:flex-end;justify-content:center;
    }
    .modal-overlay.open{display:flex;}
    /* Mobile: sheet from bottom */
    .meal-modal{
      background:var(--bg-card);
      border-radius:26px 26px 0 0;
      width:100%;max-width:600px;
      max-height:92vh;overflow-y:auto;
      position:relative;
      animation:sheetUp .38s cubic-bezier(.16,1,.3,1);
      scrollbar-width:none;
    }
    .meal-modal::-webkit-scrollbar{display:none;}
    @keyframes sheetUp{from{transform:translateY(70px);opacity:0}to{transform:translateY(0);opacity:1}}

    /* Desktop: panel from left */
    @media(min-width:768px){
      .modal-overlay{align-items:stretch;justify-content:flex-start;}
      .meal-modal{
        border-radius:0 24px 24px 0;
        width:420px;max-width:420px;
        max-height:100vh;height:100%;
        animation:slideFromRight .38s cubic-bezier(.16,1,.3,1);
        margin:0;
      }
    }
    @keyframes slideFromRight{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}

    .meal-modal::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--primary),#FF8A65,var(--primary));
      background-size:200%;animation:shimmer 2.5s linear infinite;
      z-index:5;border-radius:26px 26px 0 0;
    }
    @media(min-width:768px){.meal-modal::before{border-radius:0 24px 0 0;}}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .modal-drag{width:34px;height:4px;border-radius:2px;background:var(--border);margin:14px auto 0;}
    @media(min-width:768px){.modal-drag{display:none;}}
    .modal-close{
      position:absolute;top:15px;right:15px;
      width:34px;height:34px;border-radius:50%;
      background:var(--bg-input);border:1.5px solid var(--border);
      color:var(--text-secondary);cursor:pointer;font-size:.88rem;
      display:flex;align-items:center;justify-content:center;
      transition:.2s;z-index:6;
    }
    .modal-close:hover{background:var(--primary-light);color:var(--primary);transform:rotate(90deg);}
    .modal-img{width:100%;height:220px;overflow:hidden;position:relative;}
    .modal-img img{width:100%;height:100%;object-fit:cover;}
    .modal-img-ph{width:100%;height:220px;background:linear-gradient(135deg,var(--primary-light),#FFE4DC);display:flex;align-items:center;justify-content:center;font-size:6rem;}
    .modal-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,14,28,.45),transparent 55%);}
    .modal-unavail{position:absolute;top:14px;left:0;background:rgba(239,68,68,.9);color:#fff;font-size:.68rem;font-weight:800;padding:4px 14px;letter-spacing:.5px;text-transform:uppercase;}
    .modal-body{padding:20px 22px 12px;}
    .modal-vendor{font-size:.63rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;}
    .modal-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;line-height:1.15;margin-bottom:12px;color:var(--text);}
    .modal-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
    .modal-chip{
      padding:5px 11px;border-radius:8px;
      font-size:.69rem;font-weight:700;
      background:var(--bg-input);border:1px solid var(--border);
      color:var(--text-secondary);display:flex;align-items:center;gap:4px;
    }
    .modal-chip i{color:var(--primary);font-size:.62rem;}
    .modal-desc{font-size:.87rem;color:var(--text-secondary);line-height:1.72;margin-bottom:18px;}
    .modal-divider{height:1px;background:var(--border);margin:0 -22px 18px;}
    .modal-section-title{
      font-size:.68rem;font-weight:900;color:var(--text);
      text-transform:uppercase;letter-spacing:2px;
      margin-bottom:14px;display:flex;align-items:center;gap:10px;
    }
    .modal-section-title::after{content:'';flex:1;height:1px;background:var(--border);}

    /* rating summary */
    .rating-summary{
      display:flex;align-items:center;gap:16px;margin-bottom:16px;
      padding:14px;background:var(--bg-input);border-radius:14px;border:1px solid var(--border);
    }
    .rating-big{text-align:center;}
    .rating-big .num{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;line-height:1;color:var(--text);}
    .rating-big .all-stars{display:flex;gap:2px;justify-content:center;margin:5px 0;}
    .rating-big .all-stars i{color:var(--warning);font-size:.82rem;}
    .rating-big .all-stars i.empty{color:var(--border);}
    .rating-big .cnt{font-size:.63rem;color:var(--text-muted);font-weight:700;}
    .star-bars{flex:1;}
    .star-row-b{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
    .star-row-b span{font-size:.67rem;font-weight:700;color:var(--text-muted);width:8px;}
    .star-row-b i{color:var(--warning);font-size:.55rem;}
    .star-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
    .star-bar-fill{height:100%;background:linear-gradient(to right,var(--warning),#F97316);border-radius:3px;transition:width .4s;}
    .star-row-b .cnt{font-size:.62rem;color:var(--text-muted);width:16px;text-align:right;}

    /* reviews */
    .reviews-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
    .review-card{padding:13px;background:var(--bg-input);border-radius:13px;border:1px solid var(--border);}
    .review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
    .review-author{display:flex;align-items:center;gap:8px;}
    .review-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--primary-light),#FFE4DC);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;color:var(--primary);}
    .review-name{font-size:.8rem;font-weight:800;}
    .review-date{font-size:.63rem;color:var(--text-muted);}
    .review-stars-sm{display:flex;gap:1px;}
    .review-stars-sm i{color:var(--warning);font-size:.68rem;}
    .review-stars-sm i.empty{color:var(--border);}
    .review-text{font-size:.81rem;color:var(--text-secondary);line-height:1.6;font-weight:500;}
    .no-reviews{text-align:center;padding:22px;color:var(--text-muted);font-size:.84rem;background:var(--bg-input);border-radius:13px;border:1px solid var(--border);}
    .no-reviews i{display:block;font-size:1.8rem;margin-bottom:8px;opacity:.25;}

    /* write review */
    .write-review{padding:14px;background:var(--bg-input);border-radius:14px;border:1px solid var(--border);margin-bottom:18px;}
    .star-picker{display:flex;gap:5px;margin-bottom:10px;}
    .star-picker i{font-size:1.4rem;color:var(--border);cursor:pointer;transition:.12s;}
    .star-picker i.lit{color:var(--warning);}
    .review-ta{
      width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:11px;
      background:var(--bg-card);font-family:'Nunito',sans-serif;font-size:.84rem;
      font-weight:600;color:var(--text);resize:none;outline:none;transition:.2s;min-height:74px;
    }
    .review-ta:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);}
    .review-ta::placeholder{color:var(--text-muted);}
    .review-submit{
      margin-top:9px;width:100%;padding:12px;border-radius:11px;
      background:var(--primary);color:#fff;font-family:'Nunito',sans-serif;
      font-size:.84rem;font-weight:800;border:none;cursor:pointer;transition:.2s;
      display:flex;align-items:center;justify-content:center;gap:7px;
    }
    .review-submit:hover{background:var(--primary-dark);}
    .review-submit:disabled{opacity:.5;cursor:not-allowed;}
    .review-msg{margin-top:7px;padding:9px 12px;border-radius:9px;font-size:.78rem;font-weight:700;display:none;}
    .review-msg.ok{background:var(--success-light);color:#166534;border:1px solid #BBF7D0;display:flex;align-items:center;gap:5px;}
    .review-msg.err{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;display:flex;align-items:center;gap:5px;}

    /* modal footer */
    .modal-footer{
      position:sticky;bottom:0;background:var(--bg-card);
      border-top:1px solid var(--border);
      padding:14px 22px 18px;
      display:flex;align-items:center;justify-content:space-between;gap:14px;
    }
    .modal-price-lbl{font-size:.63rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
    .modal-price{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--text);}
    .modal-add{
      background:var(--primary);color:#fff;border:none;
      padding:14px 26px;border-radius:14px;
      font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;
      cursor:pointer;display:flex;align-items:center;gap:7px;transition:.22s;
      box-shadow:0 6px 18px rgba(255,77,45,.35);
    }
    .modal-add:hover{background:var(--primary-dark);transform:translateY(-1px);}
    .modal-add:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}

    /* ──────────────────────────────────────
       FOOTER NAV
    ────────────────────────────────────── */
    .footer-nav{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--bg-card);border-top:1px solid var(--border);
      display:flex;justify-content:space-around;
      padding:10px 0 calc(10px + env(safe-area-inset-bottom,0px));
      border-radius:24px 24px 0 0;z-index:200;
      transition:background .3s;
      box-shadow:0 -4px 20px rgba(13,19,33,.07);
    }
    .nav-link{
      text-decoration:none;color:var(--text-muted);
      display:flex;flex-direction:column;align-items:center;gap:3px;
      font-size:.67rem;font-weight:800;transition:.2s;
    }
    .nav-link i{font-size:1.15rem;}
    .nav-link.active{color:var(--primary);}
    @media(min-width:768px){.footer-nav{display:none;}}
  </style>
</head>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const S = createClient(
  'https://lwpwicajcbcmzkyecnbv.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3cHdpY2FqY2JjbXpreWVjbmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDgxNjAsImV4cCI6MjA5MTkyNDE2MH0.BF2azgoZPOmo4OP9Zo1-QNpXX-EJ23BWQx-lf3GgW68'
);

let allMeals=[], vendorProfile=null, currentMeal=null, currentUser=null, currentProfile=null;
let selectedRating=0, mealReviews=[];
const params=new URLSearchParams(location.search);
const vendorId=params.get('vendor_id');

// ── THEME ──
function loadTheme(){const t=localStorage.getItem('nash-theme')||'light';document.documentElement.setAttribute('data-theme',t);document.querySelector('#themeBtn i').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';}
window.toggleTheme=()=>{const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('nash-theme',t);document.querySelector('#themeBtn i').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';};
loadTheme();

async function init(){
  const {data:{user}}=await S.auth.getUser();
  if(!user){location.href='index.html';return;}
  currentUser=user;
  const {data:prof}=await S.from('profiles').select('full_name,avatar_url').eq('id',user.id).single();
  currentProfile=prof||{};
  loadProfileAvatar();
  if(vendorId){await loadVendorProfile();await loadMeals(vendorId);}
  else await loadAllMeals();
  updateCartUI();
}

function loadProfileAvatar(){
  const img=document.getElementById('profileAv'), icon=document.getElementById('profileFallback');
  if(currentProfile?.avatar_url){
    const {data}=S.storage.from('avatars').getPublicUrl(currentProfile.avatar_url);
    img.src=`${data.publicUrl}?t=${Date.now()}`;img.style.display='block';icon.style.display='none';
    img.onerror=()=>{img.style.display='none';icon.style.display='';};
  }
}

async function loadVendorProfile(){
  const {data}=await S.from('profiles').select('*').eq('id',vendorId).single();
  if(!data) return;
  vendorProfile=data;
  const name=data.business_name||data.full_name||'Our Kitchen';
  document.getElementById('brandName').textContent=name;
  document.title=`${name} | Nash Bites`;
  const meta=document.getElementById('vendorMeta');meta.style.display='flex';
  const dot=document.getElementById('statusDot'),txt=document.getElementById('statusText');
  if(data.is_online||data.store_open){dot.classList.add('open');txt.textContent='Open Now';}
  else{txt.textContent='Currently Closed';}
  if(data.biz_category){document.getElementById('metaCat').style.display='flex';document.getElementById('catLabel').textContent=data.biz_category;}
  if(data.operating_hours){document.getElementById('metaHours').style.display='flex';document.getElementById('hoursLabel').textContent=data.operating_hours;}
  if(data.kitchen_location){document.getElementById('metaLoc').style.display='flex';document.getElementById('locLabel').textContent=data.kitchen_location;}
}

async function loadMeals(vid){
  const {data,error}=await S.from('meals').select('*').eq('vendor_id',vid).order('created_at',{ascending:false});
  if(error){showError();return;}
  allMeals=data||[];
  buildCats(allMeals);renderMeals(allMeals);await buildTicker(allMeals);
}

async function loadAllMeals(){
  const {data,error}=await S.from('meals').select('*, profiles!meals_vendor_id_fkey(business_name,is_online,kitchen_location,store_open)').eq('is_available',true).order('created_at',{ascending:false});
  if(error){showError();return;}
  allMeals=(data||[]).filter(m=>m.profiles?.is_online||m.profiles?.store_open);
  buildCats(allMeals);renderMeals(allMeals);await buildTicker(allMeals);
}

// ── TICKER removed — no-op ──
async function buildTicker(meals){}

function buildCats(meals){
  const cats=[...new Set(meals.map(m=>m.category).filter(Boolean))];
  const bar=document.getElementById('catFilter');
  bar.innerHTML=`<button class="cat-btn active" onclick="filterCat('All',this)">✦ All</button>`;
  cats.forEach(c=>{const b=document.createElement('button');b.className='cat-btn';b.textContent=c;b.setAttribute('onclick',`filterCat('${c}',this)`);bar.appendChild(b);});
}

function renderMeals(meals){
  const grid=document.getElementById('mealGrid');
  const cart=getCart();
  document.getElementById('secCount').textContent=`${meals.length} item${meals.length!==1?'s':''}`;
  document.getElementById('secTitle').textContent=vendorProfile?(vendorProfile.business_name||'Menu'):'All Items';
  if(!meals.length){grid.innerHTML=`<div class="empty"><i class="fa-solid fa-bowl-food"></i><h3>Nothing found</h3><p>Try another category or search term</p></div>`;return;}
  grid.innerHTML=meals.map((m,i)=>{
    const cartItem=cart.find(c=>c.id===m.id);const inCart=!!cartItem;const qty=cartItem?.qty||0;
    const avail=m.is_available!==false;
    const vName=m.profiles?.business_name||'';
    const rating=m.avg_rating?(+m.avg_rating).toFixed(1):null;
    const starsC=rating?Math.round(+m.avg_rating):0;
    const imgHtml=m.image_url
      ?`<img src="${m.image_url}" alt="${esc(m.name)}" loading="lazy">`
      :`<div class="meal-img-ph">🍽️</div>`;
    const meta=[];
    if(m.prep_time) meta.push(`<span><i class="fa-solid fa-clock"></i>${m.prep_time}m</span>`);
    if(rating) meta.push(`<span>${[1,2,3,4,5].map(s=>`<i class="fa-solid fa-star${s<=starsC?' star-i':''}" style="${s<=starsC?'color:var(--warning)':'color:var(--border)'}"></i>`).join('')} ${rating}</span>`);
    if(m.review_count) meta.push(`<span><i class="fa-regular fa-comment"></i>${m.review_count}</span>`);
    const footerBtn=inCart
      ?`<div class="qty-ctrl">
          <button class="qty-btn minus" onclick="event.stopPropagation();removeFromCart('${m.id}')" title="Remove one"><i class="fa-solid fa-minus"></i></button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn plus" onclick="event.stopPropagation();addToCart('${m.id}','${esc(m.name)}',${m.price})" title="Add one"><i class="fa-solid fa-plus"></i></button>
        </div>`
      :`<button class="add-btn" id="add-${m.id}"
          onclick="event.stopPropagation();addToCart('${m.id}','${esc(m.name)}',${m.price})"
          ${!avail?'disabled':''}><i class="fa-solid fa-plus"></i> Add</button>`;
    return `<div class="meal-card" style="animation-delay:${i*35}ms" onclick="openModal('${m.id}')">
      <div class="meal-img-top">
        ${imgHtml}
        <div class="meal-img-gradient"></div>
        ${!avail?`<div class="unavail-overlay"><span class="unavail-badge">Unavailable</span></div>`:''}
        ${rating?`<span class="rating-tag"><i class="fa-solid fa-star"></i>${rating}</span>`:''}
        ${m.category?`<span class="cat-pill">${esc(m.category)}</span>`:''}
        <button class="meal-save" onclick="event.stopPropagation()" title="Save"><i class="fa-regular fa-heart"></i></button>
      </div>
      <div class="meal-body">
        <div>
          ${vName?`<div class="meal-vendor-lbl">${esc(vName)}</div>`:''}
          <div class="meal-name">${esc(m.name)}</div>
          ${m.description?`<div class="meal-desc">${esc(m.description)}</div>`:''}
          ${meta.length?`<div class="meal-meta">${meta.join('<span style="margin:0 3px;opacity:.3">·</span>')}</div>`:''}
        </div>
        <div class="meal-footer">
          <div class="meal-price">UGX ${(+m.price).toLocaleString()}</div>
          ${footerBtn}
        </div>
      </div>
    </div>`;
  }).join('');
}

window.filterCat=(cat,btn)=>{
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderMeals(cat==='All'?allMeals:allMeals.filter(m=>m.category===cat));
};
document.getElementById('mealSearch').addEventListener('input',e=>{
  const t=e.target.value.toLowerCase().trim();
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.cat-btn').classList.add('active');
  renderMeals(allMeals.filter(m=>m.name.toLowerCase().includes(t)||(m.description||'').toLowerCase().includes(t)||(m.category||'').toLowerCase().includes(t)));
});

// ── MODAL ──
window.openModal=async(id)=>{
  const m=allMeals.find(x=>x.id===id);if(!m) return;
  currentMeal=m;selectedRating=0;updateStarPicker(0);
  document.getElementById('reviewText').value='';document.getElementById('reviewMsg').className='review-msg';
  const iw=document.getElementById('modalImgWrap');
  iw.innerHTML=m.image_url
    ?`<div class="modal-img"><img src="${m.image_url}" alt="${esc(m.name)}" loading="lazy"><div class="modal-img-overlay"></div>${m.is_available===false?'<div class="modal-unavail">Currently Unavailable</div>':''}</div>`
    :`<div class="modal-img-ph">🍽️</div>`;
  document.getElementById('modalVendor').textContent=m.profiles?.business_name||vendorProfile?.business_name||'';
  document.getElementById('modalName').textContent=m.name;
  document.getElementById('modalDesc').textContent=m.description||'A delicious dish prepared fresh for you.';
  document.getElementById('modalPrice').textContent=`UGX ${(+m.price).toLocaleString()}`;
  const chips=[];
  if(m.prep_time) chips.push(`<span class="modal-chip"><i class="fa-solid fa-clock"></i>${m.prep_time} min</span>`);
  if(m.category) chips.push(`<span class="modal-chip"><i class="fa-solid fa-tag"></i>${esc(m.category)}</span>`);
  if(m.is_available===false) chips.push(`<span class="modal-chip" style="color:var(--danger);border-color:var(--danger)"><i class="fa-solid fa-circle-xmark"></i>Unavailable</span>`);
  document.getElementById('modalChips').innerHTML=chips.join('');
  document.getElementById('modalAddBtn').disabled=m.is_available===false;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
  loadReviews(id);
};
window.closeModal=()=>{document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';currentMeal=null;};
window.handleOverlayClick=e=>{if(e.target===document.getElementById('modalOverlay')) closeModal();};
window.addFromModal=()=>{
  if(!currentMeal) return;
  addToCart(currentMeal.id,currentMeal.name,currentMeal.price);
  const btn=document.getElementById('modalAddBtn');
  btn.innerHTML='<i class="fa-solid fa-check"></i> Added!';btn.style.background='var(--success)';
  setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-plus"></i> Add to Cart';btn.style.background='';},1800);
};

// ── REVIEWS ──
async function loadReviews(mealId){
  document.getElementById('reviewsList').innerHTML=`<div style="text-align:center;padding:16px;color:var(--text-muted);font-size:.83rem;"><i class="fa-solid fa-spinner fa-spin" style="margin-right:6px;"></i> Loading…</div>`;
  const {data}=await S.from('reviews').select('*, reviewer:profiles!reviews_user_id_fkey(full_name,avatar_url)').eq('meal_id',mealId).order('created_at',{ascending:false}).limit(20);
  mealReviews=data||[];renderReviews(mealReviews);
}
function renderReviews(reviews){
  const cnt=reviews.length;
  if(!cnt){
    document.getElementById('ratingNum').textContent='—';document.getElementById('ratingStars').innerHTML='';
    document.getElementById('ratingCnt').textContent='No reviews yet';document.getElementById('starBars').innerHTML='';
    document.getElementById('reviewsList').innerHTML=`<div class="no-reviews"><i class="fa-regular fa-star"></i>No reviews yet — be the first!</div>`;return;
  }
  const avg=reviews.reduce((s,r)=>s+(r.rating||0),0)/cnt;
  document.getElementById('ratingNum').textContent=avg.toFixed(1);
  document.getElementById('ratingCnt').textContent=`${cnt} review${cnt!==1?'s':''}`;
  document.getElementById('ratingStars').innerHTML=[1,2,3,4,5].map(i=>`<i class="fa-solid fa-star${i<=Math.round(avg)?'':' empty'}" style="${i<=Math.round(avg)?'color:var(--warning)':'color:var(--border)'}"></i>`).join('');
  const dist=[5,4,3,2,1].map(v=>({v,c:reviews.filter(r=>r.rating===v).length}));
  document.getElementById('starBars').innerHTML=dist.map(d=>`<div class="star-row-b"><span>${d.v}</span><i class="fa-solid fa-star"></i><div class="star-bar"><div class="star-bar-fill" style="width:${cnt?Math.round(d.c/cnt*100):0}%"></div></div><span class="cnt">${d.c}</span></div>`).join('');
  document.getElementById('reviewsList').innerHTML=reviews.slice(0,8).map(r=>{
    const nm=r.reviewer?.full_name||'Anonymous';
    const init=nm.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const date=new Date(r.created_at).toLocaleDateString('en-UG',{day:'numeric',month:'short',year:'numeric'});
    const stars=[1,2,3,4,5].map(i=>`<i class="fa-solid fa-star${i<=(r.rating||0)?'':' empty'}" style="${i<=(r.rating||0)?'color:var(--warning)':'color:var(--border)'}"></i>`).join('');
    return `<div class="review-card"><div class="review-header"><div class="review-author"><div class="review-av">${init}</div><div><div class="review-name">${esc(nm)}</div><div class="review-date">${date}</div></div></div><div class="review-stars-sm">${stars}</div></div>${r.comment?`<div class="review-text">${esc(r.comment)}</div>`:''}</div>`;
  }).join('');
}

window.setRating=v=>{selectedRating=v;updateStarPicker(v);};
function updateStarPicker(v){document.querySelectorAll('#starPicker i').forEach((s,i)=>{s.className=i<v?'fa-solid fa-star lit':'fa-regular fa-star';});}
document.getElementById('starPicker').addEventListener('mouseover',e=>{if(e.target.tagName==='I'){const v=+e.target.getAttribute('data-v');document.querySelectorAll('#starPicker i').forEach((s,i)=>{s.className=i<v?'fa-solid fa-star lit':'fa-regular fa-star';});}});
document.getElementById('starPicker').addEventListener('mouseleave',()=>updateStarPicker(selectedRating));

window.submitReview=async()=>{
  if(!currentMeal) return;
  if(!selectedRating){showRevMsg('err','Please select a star rating first');return;}
  const comment=document.getElementById('reviewText').value.trim();
  const btn=document.getElementById('reviewSubmitBtn');
  btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Submitting…';
  try {
    const {data:ex}=await S.from('reviews').select('id').eq('meal_id',currentMeal.id).eq('user_id',currentUser.id).maybeSingle();
    if(ex){const {error}=await S.from('reviews').update({rating:selectedRating,comment,updated_at:new Date().toISOString()}).eq('id',ex.id);if(error) throw error;}
    else{const {error}=await S.from('reviews').insert({meal_id:currentMeal.id,user_id:currentUser.id,rating:selectedRating,comment,created_at:new Date().toISOString()});if(error) throw error;}
    showRevMsg('ok','✓ Review submitted! Thank you.');
    document.getElementById('reviewText').value='';selectedRating=0;updateStarPicker(0);
    await loadReviews(currentMeal.id);
  } catch(err){showRevMsg('err',err.message||'Could not submit. Try again.');}
  btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Submit Review';
};
function showRevMsg(t,msg){const el=document.getElementById('reviewMsg');el.className=`review-msg ${t}`;el.innerHTML=`<i class="fa-solid fa-${t==='ok'?'check-circle':'circle-exclamation'}"></i> ${msg}`;clearTimeout(el._t);if(t==='ok') el._t=setTimeout(()=>{el.className='review-msg';},4000);}

// ── CART ──
function getCart(){return JSON.parse(localStorage.getItem('nash_cart')||'[]');}
function saveCart(c){localStorage.setItem('nash_cart',JSON.stringify(c));}
window.addToCart=(id,name,price)=>{
  const cart=getCart();const ex=cart.find(i=>i.id===id);
  if(ex) ex.qty=(ex.qty||1)+1;else cart.push({id,name,price:+price,qty:1});
  saveCart(cart);
  showToast(`${name} added`);updateCartUI();renderMeals(allMeals);
};
window.removeFromCart=(id)=>{
  const cart=getCart();const ex=cart.find(i=>i.id===id);
  if(!ex) return;
  ex.qty=(ex.qty||1)-1;
  if(ex.qty<=0) cart.splice(cart.indexOf(ex),1);
  saveCart(cart);
  updateCartUI();renderMeals(allMeals);
};
function updateCartUI(){
  const cart=getCart();const cnt=cart.reduce((s,i)=>s+(i.qty||1),0);const total=cart.reduce((s,i)=>s+(i.price*(i.qty||1)),0);
  const f=document.getElementById('cartFloat');
  f.classList.toggle('visible',cnt>0);
  document.getElementById('cartBadge').textContent=cnt;
  document.getElementById('cartFloatLabel').textContent=`${cnt} item${cnt!==1?'s':''} · UGX ${total.toLocaleString()}`;
}
function showToast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function showError(){document.getElementById('mealGrid').innerHTML=`<div class="empty"><i class="fa-solid fa-triangle-exclamation"></i><h3>Couldn't load menu</h3><p>Check your connection and refresh</p></div>`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModal();});
init();
