<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
    <meta name="theme-color" content="#FFFFFF">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
  <title>Meal Details | Nash Bites</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root{
      --primary:#FF4D2D;--primary-dark:#e63e20;--primary-light:#FFF0ED;--primary-glow:rgba(255,77,45,.18);
      --bg:#F4F6FB;--bg-card:#FFFFFF;--bg-input:#F0F3F9;
      --text:#0D1321;--text-secondary:#5A6A85;--text-muted:#9DADC4;--border:#E4EAF4;
      --success:#22C55E;--success-light:#F0FDF4;
      --warning:#F59E0B;--danger:#EF4444;
      --shadow-sm:0 2px 10px rgba(13,19,33,.07);
      --shadow-md:0 8px 28px rgba(13,19,33,.11);
      --shadow-card:0 4px 20px rgba(13,19,33,.08);
    }
    [data-theme="dark"]{
      --bg:#080E1C;--bg-card:#111827;--bg-input:#1A2540;
      --text:#F1F5F9;--text-secondary:#8DA0BC;--text-muted:#4A6080;
      --border:#1E2E48;--primary-light:#2A1510;--success-light:#052E16;
      --shadow-sm:0 2px 10px rgba(0,0,0,.25);
      --shadow-md:0 8px 28px rgba(0,0,0,.3);
      --shadow-card:0 4px 20px rgba(0,0,0,.22);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;padding-bottom:100px;transition:background .3s,color .3s;}

    /* ── TOPBAR ── */
    .topbar{position:sticky;top:0;z-index:200;background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 18px;height:62px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm);}
    .back-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-input);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.88rem;transition:.2s;text-decoration:none;}
    .back-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
    .topbar-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:900;color:var(--text);}
    .topbar-right{display:flex;align-items:center;gap:8px;}
    .top-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-input);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.88rem;transition:.2s;text-decoration:none;}
    .top-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
    .top-btn img{width:100%;height:100%;border-radius:50%;object-fit:cover;}

    /* ── HERO IMAGE ── */
    .detail-hero{
      position:relative;width:100%;height:300px;overflow:hidden;
      background:linear-gradient(135deg,var(--primary-light),#FFE4DC);
    }
    @media(min-width:768px){.detail-hero{height:400px;}}
    .detail-hero img{width:100%;height:100%;object-fit:cover;display:block;}
    .hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:6rem;}
    .hero-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,14,28,.65) 0%,rgba(8,14,28,.1) 50%,transparent 80%);}
    .hero-unavail{position:absolute;top:16px;left:0;background:rgba(239,68,68,.9);color:#fff;font-size:.7rem;font-weight:800;padding:5px 16px;letter-spacing:.5px;text-transform:uppercase;border-radius:0 20px 20px 0;}
    .hero-cat{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);color:#fff;font-size:.62rem;font-weight:800;padding:5px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.6px;}
    .hero-fav{position:absolute;bottom:16px;right:16px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--text-muted);border:none;cursor:pointer;transition:.2s;box-shadow:0 4px 12px rgba(0,0,0,.18);}
    .hero-fav:hover{color:var(--danger);transform:scale(1.1);}
    .hero-fav.saved{color:var(--danger);}
    .hero-rating{position:absolute;bottom:16px;left:16px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);color:var(--text);font-size:.72rem;font-weight:900;padding:5px 12px;border-radius:30px;display:flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,.14);}
    .hero-rating i{color:var(--warning);}

    /* ── DETAIL BODY ── */
    .detail-body{max-width:760px;margin:0 auto;padding:24px 18px 0;}
    @media(min-width:768px){.detail-body{padding:30px 32px 0;}}

    .detail-vendor{font-size:.68rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
    .detail-name{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;line-height:1.15;margin-bottom:12px;color:var(--text);}
    @media(min-width:768px){.detail-name{font-size:2rem;}}
    .detail-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
    .detail-chip{padding:6px 13px;border-radius:10px;font-size:.72rem;font-weight:700;background:var(--bg-input);border:1px solid var(--border);color:var(--text-secondary);display:flex;align-items:center;gap:5px;}
    .detail-chip i{color:var(--primary);font-size:.65rem;}
    .detail-desc{font-size:.92rem;color:var(--text-secondary);line-height:1.78;margin-bottom:24px;}

    .detail-divider{height:1px;background:var(--border);margin:0 0 22px;}

    /* ── PRICE + ADD ── */
    .detail-cta{
      display:flex;align-items:center;justify-content:space-between;gap:16px;
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:18px;padding:16px 20px;margin-bottom:24px;
      box-shadow:var(--shadow-card);
    }
    .detail-price-lbl{font-size:.62rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
    .detail-price{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:var(--text);}
    .detail-add{background:var(--primary);color:#fff;border:none;padding:14px 28px;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.92rem;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.22s;box-shadow:0 6px 18px rgba(255,77,45,.35);white-space:nowrap;}
    .detail-add:hover{background:var(--primary-dark);transform:translateY(-2px);}
    .detail-add:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
    .detail-qty{display:flex;align-items:center;gap:0;background:var(--bg-input);border-radius:14px;overflow:hidden;border:2px solid var(--primary);}
    .detail-qty-btn{width:44px;height:48px;border:none;background:transparent;color:var(--primary);cursor:pointer;font-size:1rem;font-weight:900;display:flex;align-items:center;justify-content:center;transition:.15s;}
    .detail-qty-btn:hover{background:var(--primary);color:#fff;}
    .detail-qty-btn.minus:hover{background:var(--danger);color:#fff;}
    .detail-qty-num{min-width:38px;text-align:center;font-size:1.1rem;font-weight:900;color:var(--text);}

    /* ── SECTION TITLE ── */
    .sec-label{font-size:.68rem;font-weight:900;color:var(--text);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
    .sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

    /* ── REVIEWS ── */
    .rating-summary{display:flex;align-items:center;gap:16px;margin-bottom:16px;padding:16px;background:var(--bg-input);border-radius:16px;border:1px solid var(--border);}
    .rating-big{text-align:center;}
    .rating-big .num{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;line-height:1;color:var(--text);}
    .rating-big .all-stars{display:flex;gap:2px;justify-content:center;margin:5px 0;}
    .rating-big .all-stars i{color:var(--warning);font-size:.85rem;}
    .rating-big .all-stars i.empty{color:var(--border);}
    .rating-big .cnt{font-size:.64rem;color:var(--text-muted);font-weight:700;}
    .star-bars{flex:1;}
    .star-row-b{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
    .star-row-b span{font-size:.67rem;font-weight:700;color:var(--text-muted);width:8px;}
    .star-row-b i{color:var(--warning);font-size:.56rem;}
    .star-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
    .star-bar-fill{height:100%;background:linear-gradient(to right,var(--warning),#F97316);border-radius:3px;transition:width .4s;}
    .star-row-b .cnt{font-size:.62rem;color:var(--text-muted);width:16px;text-align:right;}
    .reviews-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
    .review-card{padding:14px;background:var(--bg-input);border-radius:14px;border:1px solid var(--border);}
    .review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
    .review-author{display:flex;align-items:center;gap:8px;}
    .review-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary-light),#FFE4DC);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;color:var(--primary);}
    .review-name{font-size:.82rem;font-weight:800;}
    .review-date{font-size:.64rem;color:var(--text-muted);}
    .review-stars-sm{display:flex;gap:1px;}
    .review-stars-sm i{color:var(--warning);font-size:.7rem;}
    .review-stars-sm i.empty{color:var(--border);}
    .review-text{font-size:.83rem;color:var(--text-secondary);line-height:1.6;font-weight:500;}
    .no-reviews{text-align:center;padding:24px;color:var(--text-muted);font-size:.86rem;background:var(--bg-input);border-radius:14px;border:1px solid var(--border);}
    .no-reviews i{display:block;font-size:2rem;margin-bottom:10px;opacity:.25;}

    /* Write review */
    .write-review{padding:16px;background:var(--bg-input);border-radius:16px;border:1px solid var(--border);margin-bottom:24px;}
    .star-picker{display:flex;gap:6px;margin-bottom:12px;}
    .star-picker i{font-size:1.5rem;color:var(--border);cursor:pointer;transition:.12s;}
    .star-picker i.lit{color:var(--warning);}
    .review-ta{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg-card);font-family:'Nunito',sans-serif;font-size:.86rem;font-weight:600;color:var(--text);resize:none;outline:none;transition:.2s;min-height:78px;}
    .review-ta:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);}
    .review-ta::placeholder{color:var(--text-muted);}
    .review-submit{margin-top:10px;width:100%;padding:13px;border-radius:12px;background:var(--primary);color:#fff;font-family:'Nunito',sans-serif;font-size:.86rem;font-weight:800;border:none;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px;}
    .review-submit:hover{background:var(--primary-dark);}
    .review-submit:disabled{opacity:.5;cursor:not-allowed;}
    .review-msg{margin-top:8px;padding:9px 13px;border-radius:10px;font-size:.78rem;font-weight:700;display:none;}
    .review-msg.ok{background:var(--success-light);color:#166534;border:1px solid #BBF7D0;display:flex;align-items:center;gap:5px;}
    .review-msg.err{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;display:flex;align-items:center;gap:5px;}

    /* ── MORE FROM THIS SECTION / RECENTLY VIEWED ── */
    .more-section{margin-bottom:28px;}
    .more-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .more-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:900;color:var(--text);display:flex;align-items:center;gap:8px;}
    .more-title::before{content:'';display:inline-block;width:4px;height:16px;border-radius:3px;background:var(--primary);flex-shrink:0;}
    .view-all-link{font-size:.72rem;font-weight:800;color:var(--primary);text-decoration:none;display:flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--primary-light);background:var(--primary-light);transition:.2s;}
    .view-all-link:hover{background:var(--primary);color:#fff;}

    /* Horizontal scroll for "more" rows */
    .meal-row{display:flex;gap:12px;overflow-x:auto;padding:4px 0 16px;scrollbar-width:none;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
    .meal-row::-webkit-scrollbar{display:none;}

    /* Mini meal card for rows */
    .mini-card{
      background:var(--bg-card);border-radius:16px;overflow:hidden;
      border:1px solid var(--border);box-shadow:var(--shadow-card);
      display:flex;flex-direction:column;cursor:pointer;
      transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s;
      min-width:150px;max-width:150px;flex-shrink:0;
      scroll-snap-align:start;
      animation:fadeUp .4s ease both;
    }
    @media(min-width:480px){.mini-card{min-width:170px;max-width:170px;}}
    @media(min-width:768px){.mini-card{min-width:200px;max-width:200px;}}
    .mini-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .mini-img{position:relative;width:100%;padding-top:70%;overflow:hidden;background:linear-gradient(135deg,var(--primary-light),#FFE4DC);flex-shrink:0;}
    .mini-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s;}
    .mini-card:hover .mini-img img{transform:scale(1.06);}
    .mini-img-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.2rem;}
    .mini-body{padding:10px 10px 10px;flex:1;display:flex;flex-direction:column;}
    .mini-name{font-size:.8rem;font-weight:900;line-height:1.25;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .mini-price{font-size:.76rem;font-weight:800;color:var(--primary);margin-top:auto;}
    .mini-save{position:absolute;top:7px;right:7px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--text-muted);border:none;cursor:pointer;transition:.2s;box-shadow:0 2px 6px rgba(0,0,0,.12);}
    .mini-save.saved{color:var(--danger);}
    .mini-save:hover{color:var(--danger);transform:scale(1.15);}

    /* toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;padding:11px 22px;border-radius:50px;font-size:.82rem;font-weight:800;white-space:nowrap;z-index:3500;opacity:0;transition:.3s;pointer-events:none;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast i{color:var(--success);}

    /* skeleton */
    .skel-row{display:flex;gap:12px;padding:0 0 16px;}
    .skel-mini{background:var(--bg-card);border-radius:16px;border:1px solid var(--border);overflow:hidden;animation:skel-pulse 1.6s ease infinite;min-width:150px;flex-shrink:0;}
    .skel-mini-img{height:105px;background:var(--bg-input);}
    .skel-mini-body{padding:9px;}
    .skel-line{height:10px;border-radius:5px;background:var(--bg-input);margin-bottom:8px;}
    .skel-line.short{width:55%;}
    @keyframes skel-pulse{0%,100%{opacity:1}50%{opacity:.5}}

    /* loading state */
    .loading-hero{width:100%;height:300px;background:var(--bg-input);animation:skel-pulse 1.6s ease infinite;}
    .loading-body{padding:24px 18px;max-width:760px;margin:0 auto;}
    .loading-line{height:14px;border-radius:7px;background:var(--bg-input);margin-bottom:14px;animation:skel-pulse 1.6s ease infinite;}
    
      /* ── FOOTER NAV (mobile) ── */
    .footer-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:72px;
    background:var(--bg-card);
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-around;
    align-items:center;
    z-index:2000;
    box-shadow:0 -4px 20px rgba(0,0,0,.08);
}

.footer-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:var(--text-muted);
    font-size:.7rem;
    font-weight:700;
    gap:4px;
    position:relative;
}

.footer-item i{
    font-size:1.1rem;
}

.footer-item.active{
    color:var(--primary);
}

.footer-badge{
    position:absolute;
    top:10px;
    right:25%;
    min-width:16px;
    height:16px;
    border-radius:50%;
    background:var(--primary);
    color:#fff;
    font-size:.55rem;
    display:none;
    align-items:center;
    justify-content:center;
}
    *{
      -webkit-tap-highlight-color:transparent;
    }
  </style>
</head>

// ── THEME ──

function loadTheme() {
    const theme = localStorage.getItem("nash-theme") || "light";
    document.documentElement.setAttribute("data-theme", theme);

    const icon = document.querySelector("#themeBtn i");

    if (icon) {
        icon.className = theme === "dark"
            ? "fa-solid fa-sun"
            : "fa-solid fa-moon";
    }
}

// ── FAVORITES ──
function getFavs(){return JSON.parse(localStorage.getItem('nash_favs')||'[]');}
function saveFavs(f){localStorage.setItem('nash_favs',JSON.stringify(f));}
window.toggleFav = async (id, btn, e) => {
  if (e) e.stopPropagation();
  const { data: existing } = await S.from('favorites')
    .select('id').eq('meal_id', id).eq('user_id', currentUser.id).maybeSingle();
  if (existing) {
    await S.from('favorites').delete().eq('id', existing.id);
    btn.classList.remove('saved');
    btn.querySelector('i').className = 'fa-regular fa-heart';
    showToast('Removed from favorites');
  } else {
    await S.from('favorites').insert({ meal_id: id, user_id: currentUser.id });
    btn.classList.add('saved');
    btn.querySelector('i').className = 'fa-solid fa-heart';
    showToast('Saved to favorites ♥');
  }
};
// ── RECENTLY VIEWED ──
function getRecent(){return JSON.parse(localStorage.getItem('nash_recent')||'[]');}
function addRecent(id){
  let r=getRecent().filter(x=>x!==id);
  r.unshift(id);
  localStorage.setItem('nash_recent',JSON.stringify(r.slice(0,20)));
}

// ── CART ──
function getCart(){return JSON.parse(localStorage.getItem('nash_cart')||'[]');}
function saveCart(c){localStorage.setItem('nash_cart',JSON.stringify(c));}
window.addToCart=(id,name,price)=>{
  const cart=getCart();const ex=cart.find(i=>i.id===id);
  if(ex) ex.qty=(ex.qty||1)+1;else cart.push({id,name,price:+price,qty:1});
  saveCart(cart);showToast(`${name} added`);
  if(id===meal?.id) renderCTA();
};
window.removeFromCart=(id)=>{
  const cart=getCart();const ex=cart.find(i=>i.id===id);
  if(!ex) return;
  ex.qty=(ex.qty||1)-1;if(ex.qty<=0) cart.splice(cart.indexOf(ex),1);
  saveCart(cart);
  if(id===meal?.id) renderCTA();
};

async function init(){
  const {data:{user}}=await S.auth.getUser();
  if(!user){location.href='index.html';return;}
  currentUser=user;

  if(mealId){
    // Load specific meal
    const {data,error}=await S.from('meals').select('*, profiles!meals_vendor_id_fkey(business_name,is_online,kitchen_location,store_open)').eq('id',mealId).single();
    if(error||!data){renderError();return;}
    meal=data;
    addRecent(meal.id);
    document.getElementById('topbarTitle').textContent=meal.name;
    document.title=`${meal.name} | Nash Bites`;
    renderHero();
    renderBody();
    loadReviews(meal.id);

    // Load same-category meals
    const qCat=meal.category;
    const qVid=vendorId||meal.vendor_id;
    let q=S.from('meals').select('*, profiles!meals_vendor_id_fkey(business_name)');
    if(qVid) q=q.eq('vendor_id',qVid);
    if(qCat) q=q.eq('category',qCat);
    const {data:more}=await q.neq('id',meal.id).eq('is_available',true).order('created_at',{ascending:false}).limit(10);
    allMeals=more||[];
    renderMoreSection(allMeals,'More in '+qCat,'more-wrap');
    renderRecentSection();
  } else if(catParam){
    // Category listing page
    document.getElementById('topbarTitle').textContent=catParam;
    document.title=`${catParam} | Nash Bites`;
    let q=S.from('meals').select('*, profiles!meals_vendor_id_fkey(business_name,is_online,store_open)').eq('category',catParam).eq('is_available',true);
    if(vendorId) q=q.eq('vendor_id',vendorId);
    const {data,error}=await q.order('created_at',{ascending:false});
    if(error){renderError();return;}
    allMeals=(data||[]).filter(m=>m.profiles?.is_online||m.profiles?.store_open||vendorId);
    renderCategoryPage(allMeals, catParam);
  }
}

function renderHero(){
  const favs=getFavs();const isFav=favs.includes(meal.id);
  const avail=meal.is_available!==false;
  const rating=meal.avg_rating?(+meal.avg_rating).toFixed(1):null;
  document.getElementById('heroWrap').innerHTML=`
    <div class="detail-hero">
      ${meal.image_url
        ?`<img src="${meal.image_url}" alt="${esc(meal.name)}" loading="lazy">`
        :`<div class="hero-ph">🍽️</div>`}
      <div class="hero-gradient"></div>
      ${!avail?'<div class="hero-unavail">Currently Unavailable</div>':''}
      ${meal.category?`<div class="hero-cat">${esc(meal.category)}</div>`:''}
      ${rating?`<div class="hero-rating"><i class="fa-solid fa-star"></i>${rating}</div>`:''}
      <button class="hero-fav fav-btn-${meal.id}${isFav?' saved':''}" onclick="toggleFav('${meal.id}',this,event)" title="${isFav?'Remove from favorites':'Save'}">
        <i class="fa-${isFav?'solid':'regular'} fa-heart"></i>
      </button>
    </div>`;
}

function renderBody(){
  const avail=meal.is_available!==false;
  const vName=meal.profiles?.business_name||'';
  const chips=[];
  if(meal.prep_time) chips.push(`<span class="detail-chip"><i class="fa-solid fa-clock"></i>${meal.prep_time} min prep</span>`);
  if(meal.category) chips.push(`<span class="detail-chip"><i class="fa-solid fa-tag"></i>${esc(meal.category)}</span>`);
  if(!avail) chips.push(`<span class="detail-chip" style="color:var(--danger);border-color:var(--danger)"><i class="fa-solid fa-circle-xmark"></i>Unavailable</span>`);

  document.getElementById('detailBody').innerHTML=`
    ${vName?`<div class="detail-vendor">${esc(vName)}</div>`:''}
    <div class="detail-name">${esc(meal.name)}</div>
    ${chips.length?`<div class="detail-chips">${chips.join('')}</div>`:''}
    <div class="detail-desc">${esc(meal.description||'A delicious dish prepared fresh for you.')}</div>
    <div class="detail-cta" id="ctaWrap">
      <div>
        <div class="detail-price-lbl">Price</div>
        <div class="detail-price">UGX ${(+meal.price).toLocaleString()}</div>
      </div>
      <div id="ctaBtn"></div>
    </div>
    <div class="detail-divider"></div>
    <div class="sec-label">Reviews</div>
    <div class="rating-summary" id="ratingSummary">
      <div class="rating-big">
        <div class="num" id="ratingNum">—</div>
        <div class="all-stars" id="ratingStars"></div>
        <div class="cnt" id="ratingCnt">No reviews</div>
      </div>
      <div class="star-bars" id="starBars"></div>
    </div>
    <div class="reviews-list" id="reviewsList"></div>
    <div class="sec-label">Leave a Review</div>
    <div class="write-review">
      <div class="star-picker" id="starPicker">
        <i class="fa-star fa-regular" data-v="1" onclick="setRating(1)"></i>
        <i class="fa-star fa-regular" data-v="2" onclick="setRating(2)"></i>
        <i class="fa-star fa-regular" data-v="3" onclick="setRating(3)"></i>
        <i class="fa-star fa-regular" data-v="4" onclick="setRating(4)"></i>
        <i class="fa-star fa-regular" data-v="5" onclick="setRating(5)"></i>
      </div>
      <textarea class="review-ta" id="reviewText" placeholder="Share your experience with this dish…" rows="3"></textarea>
      <button class="review-submit" id="reviewSubmitBtn" onclick="submitReview()"><i class="fa-solid fa-paper-plane"></i> Submit Review</button>
      <div class="review-msg" id="reviewMsg"></div>
    </div>
    <div id="more-wrap"></div>
    <div id="recent-wrap"></div>
  `;
  renderCTA();
  // star picker events
  document.getElementById('starPicker').addEventListener('mouseover',e=>{if(e.target.tagName==='I'){const v=+e.target.getAttribute('data-v');document.querySelectorAll('#starPicker i').forEach((s,i)=>{s.className=i<v?'fa-solid fa-star lit':'fa-regular fa-star';});}});
  document.getElementById('starPicker').addEventListener('mouseleave',()=>updateStarPicker(selectedRating));
}

function renderCTA(){
  const btn=document.getElementById('ctaBtn');if(!btn) return;
  const cart=getCart();const cartItem=cart.find(c=>c.id===meal.id);
  const inCart=!!cartItem;const qty=cartItem?.qty||0;const avail=meal.is_available!==false;
  if(inCart){
    btn.innerHTML=`<div class="detail-qty">
      <button class="detail-qty-btn minus" onclick="removeFromCart('${meal.id}')"><i class="fa-solid fa-minus"></i></button>
      <span class="detail-qty-num">${qty}</span>
      <button class="detail-qty-btn" onclick="addToCart('${meal.id}','${esc(meal.name)}',${meal.price})"><i class="fa-solid fa-plus"></i></button>
    </div>`;
  } else {
    btn.innerHTML=`<button class="detail-add" onclick="addToCart('${meal.id}','${esc(meal.name)}',${meal.price})" ${!avail?'disabled':''}><i class="fa-solid fa-plus"></i> Add to Cart</button>`;
  }
}

// ── CATEGORY PAGE (when opened from "View all") ──
function renderCategoryPage(meals, cat){
  document.getElementById('heroWrap').innerHTML='';
  const grid=meals.map((m,i)=>miniCardHtml(m,i,true)).join('');
  document.getElementById('detailBody').innerHTML=`
    <div class="detail-vendor" style="margin-bottom:4px">${esc(cat)}</div>
    <div class="detail-name" style="font-size:1.4rem;margin-bottom:20px">${meals.length} meal${meals.length!==1?'s':''} available</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;" id="catGrid">${grid}</div>
    <div id="more-wrap" style="margin-top:28px"></div>
  `;
  renderRecentSection();
}

// ── MORE SECTION (horizontal scroll row) ──
function renderMoreSection(meals, title, wrapperId){
  const wrap=document.getElementById(wrapperId);if(!wrap||!meals.length) return;
  const homeUrl=vendorId?`home.html?vendor_id=${vendorId}`:'home.html';
  wrap.innerHTML=`
    <div class="more-section">
      <div class="more-section-header">
        <span class="more-title">${esc(title)}</span>
        <a href="${homeUrl}" class="view-all-link">See menu <i class="fa-solid fa-arrow-right" style="font-size:.6rem"></i></a>
      </div>
      <div class="meal-row">${meals.map((m,i)=>miniCardHtml(m,i)).join('')}</div>
    </div>`;
}

function renderRecentSection(){
  const recentIds=getRecent().filter(id=>id!==meal?.id).slice(0,10);
  if(!recentIds.length) return;
  S.from('meals').select('*, profiles!meals_vendor_id_fkey(business_name)').in('id',recentIds).then(({data})=>{
    if(!data||!data.length) return;
    // sort to match recent order
    const sorted=recentIds.map(id=>data.find(m=>m.id===id)).filter(Boolean);
    const wrap=document.getElementById('recent-wrap');if(!wrap) return;
    wrap.innerHTML=`
      <div class="more-section">
        <div class="more-section-header">
          <span class="more-title">Recently Viewed</span>
        </div>
        <div class="meal-row">${sorted.map((m,i)=>miniCardHtml(m,i)).join('')}</div>
      </div>`;
  });
}

function miniCardHtml(m, i, fullCard=false){
  const favs=getFavs();const isFav=favs.includes(m.id);
  const imgHtml=m.image_url
    ?`<img src="${m.image_url}" alt="${esc(m.name)}" loading="lazy">`
    :`<div class="mini-img-ph">🍽️</div>`;
  if(fullCard){
    // Full 2-col card for category page
    const cart=getCart();const cartItem=cart.find(c=>c.id===m.id);const inCart=!!cartItem;const qty=cartItem?.qty||0;const avail=m.is_available!==false;
    const footerBtn=inCart
      ?`<div class="qty-ctrl" style="display:flex;align-items:center;border:1.5px solid var(--border);border-radius:50px;overflow:hidden;background:var(--bg-input)">
          <button style="width:28px;height:28px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;" onclick="event.stopPropagation();removeFromCart('${m.id}')"><i class="fa-solid fa-minus" style="font-size:.8rem"></i></button>
          <span style="min-width:24px;text-align:center;font-size:.78rem;font-weight:900">${qty}</span>
          <button style="width:28px;height:28px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;" onclick="event.stopPropagation();addToCart('${m.id}','${esc(m.name)}',${m.price})"><i class="fa-solid fa-plus" style="font-size:.8rem"></i></button>
        </div>`
      :`<button style="height:28px;padding:0 10px;border-radius:50px;background:var(--primary);color:#fff;border:none;cursor:pointer;font-size:.65rem;font-weight:800;display:flex;align-items:center;gap:3px" onclick="event.stopPropagation();addToCart('${m.id}','${esc(m.name)}',${m.price})" ${!avail?'disabled':''}><i class="fa-solid fa-plus"></i> Add</button>`;
    return `<div style="background:var(--bg-card);border-radius:16px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow-card);display:flex;flex-direction:column;cursor:pointer;animation:fadeUp .4s ease both;animation-delay:${i*40}ms" onclick="goTo('${m.id}')">
      <div class="mini-img" style="position:relative;width:100%;padding-top:68%;overflow:hidden;background:linear-gradient(135deg,var(--primary-light),#FFE4DC);">
        ${imgHtml}
        <button class="mini-save fav-btn-${m.id}${isFav?' saved':''}" onclick="toggleFav('${m.id}',this,event)"><i class="fa-${isFav?'solid':'regular'} fa-heart"></i></button>
      </div>
      <div style="padding:10px;flex:1;display:flex;flex-direction:column;">
        <div style="font-size:.8rem;font-weight:900;line-height:1.25;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(m.name)}</div>
        <div style="font-size:.72rem;font-weight:800;color:var(--primary);margin-bottom:8px">UGX ${(+m.price).toLocaleString()}</div>
        <div style="margin-top:auto">${footerBtn}</div>
      </div>
    </div>`;
  }
  return `<div class="mini-card" style="animation-delay:${i*40}ms" onclick="goTo('${m.id}')">
    <div class="mini-img" style="position:relative;width:100%;padding-top:68%;overflow:hidden;background:linear-gradient(135deg,var(--primary-light),#FFE4DC);">
      ${imgHtml}
      <button class="mini-save fav-btn-${m.id}${isFav?' saved':''}" onclick="toggleFav('${m.id}',this,event)"><i class="fa-${isFav?'solid':'regular'} fa-heart"></i></button>
    </div>
    <div class="mini-body">
      <div class="mini-name">${esc(m.name)}</div>
      <div class="mini-price">UGX ${(+m.price).toLocaleString()}</div>
    </div>
  </div>`;
}

window.goTo=(id)=>{
  const vendorParam=vendorId?`&vendor_id=${vendorId}`:'';
  location.href=`meal-details.html?meal_id=${id}${vendorParam}`;
};

// ── REVIEWS ──
async function loadReviews(id){
  document.getElementById('reviewsList').innerHTML=`<div style="text-align:center;padding:18px;color:var(--text-muted);font-size:.83rem"><i class="fa-solid fa-spinner fa-spin" style="margin-right:6px"></i> Loading…</div>`;
  const {data}=await S.from('reviews').select('*, reviewer:profiles!reviews_user_id_fkey(full_name,avatar_url)').eq('meal_id',id).order('created_at',{ascending:false}).limit(20);
  mealReviews=data||[];renderReviews(mealReviews);
}
function renderReviews(reviews){
  const cnt=reviews.length;
  if(!cnt){
    document.getElementById('ratingNum').textContent='—';document.getElementById('ratingStars').innerHTML='';
    document.getElementById('ratingCnt').textContent='No reviews yet';document.getElementById('starBars').innerHTML='';
    document.getElementById('reviewsList').innerHTML=`<div class="no-reviews"><i class="fa-regular fa-star"></i>No reviews yet — be the first!</div>`;return;
  }
  const avg=reviews.reduce((s,r)=>s+(r.rating||0),0)/cnt;
  document.getElementById('ratingNum').textContent=avg.toFixed(1);
  document.getElementById('ratingCnt').textContent=`${cnt} review${cnt!==1?'s':''}`;
  document.getElementById('ratingStars').innerHTML=[1,2,3,4,5].map(i=>`<i class="fa-solid fa-star${i<=Math.round(avg)?'':' empty'}" style="${i<=Math.round(avg)?'color:var(--warning)':'color:var(--border)'}"></i>`).join('');
  const dist=[5,4,3,2,1].map(v=>({v,c:reviews.filter(r=>r.rating===v).length}));
  document.getElementById('starBars').innerHTML=dist.map(d=>`<div class="star-row-b"><span>${d.v}</span><i class="fa-solid fa-star"></i><div class="star-bar"><div class="star-bar-fill" style="width:${cnt?Math.round(d.c/cnt*100):0}%"></div></div><span class="cnt">${d.c}</span></div>`).join('');
  document.getElementById('reviewsList').innerHTML=reviews.slice(0,8).map(r=>{
    const nm=r.reviewer?.full_name||'Anonymous';
    const init=nm.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const date=new Date(r.created_at).toLocaleDateString('en-UG',{day:'numeric',month:'short',year:'numeric'});
    const stars=[1,2,3,4,5].map(i=>`<i class="fa-solid fa-star${i<=(r.rating||0)?'':' empty'}" style="${i<=(r.rating||0)?'color:var(--warning)':'color:var(--border)'}"></i>`).join('');
    return `<div class="review-card"><div class="review-header"><div class="review-author"><div class="review-av">${init}</div><div><div class="review-name">${esc(nm)}</div><div class="review-date">${date}</div></div></div><div class="review-stars-sm">${stars}</div></div>${r.comment?`<div class="review-text">${esc(r.comment)}</div>`:''}</div>`;
  }).join('');
}

window.setRating=v=>{selectedRating=v;updateStarPicker(v);};
function updateStarPicker(v){document.querySelectorAll('#starPicker i').forEach((s,i)=>{s.className=i<v?'fa-solid fa-star lit':'fa-regular fa-star';});}

window.submitReview=async()=>{
  if(!meal||!currentUser) return;
  if(!selectedRating){showRevMsg('err','Please select a star rating first');return;}
  const comment=document.getElementById('reviewText').value.trim();
  const btn=document.getElementById('reviewSubmitBtn');
  btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Submitting…';
  try {
    const {data:ex}=await S.from('reviews').select('id').eq('meal_id',meal.id).eq('user_id',currentUser.id).maybeSingle();
    if(ex){const {error}=await S.from('reviews').update({rating:selectedRating,comment,updated_at:new Date().toISOString()}).eq('id',ex.id);if(error) throw error;}
    else{const {error}=await S.from('reviews').insert({meal_id:meal.id,user_id:currentUser.id,rating:selectedRating,comment,created_at:new Date().toISOString()});if(error) throw error;}
    showRevMsg('ok','✓ Review submitted! Thank you.');
    document.getElementById('reviewText').value='';selectedRating=0;updateStarPicker(0);
    await loadReviews(meal.id);
  } catch(err){showRevMsg('err',err.message||'Could not submit. Try again.');}
  btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Submit Review';
};
function showRevMsg(t,msg){const el=document.getElementById('reviewMsg');el.className=`review-msg ${t}`;el.innerHTML=`<i class="fa-solid fa-${t==='ok'?'check-circle':'circle-exclamation'}"></i> ${msg}`;clearTimeout(el._t);if(t==='ok') el._t=setTimeout(()=>{el.className='review-msg';},4000);}

function renderError(){document.getElementById('heroWrap').innerHTML='';document.getElementById('detailBody').innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><i class="fa-solid fa-triangle-exclamation" style="font-size:2.5rem;margin-bottom:14px;display:block;opacity:.3"></i><h3 style="font-size:1rem;font-weight:800;color:var(--text-secondary);margin-bottom:6px">Meal not found</h3><p style="font-size:.85rem">It may have been removed or is unavailable.</p><a href="home.html" style="display:inline-flex;align-items:center;gap:6px;margin-top:18px;background:var(--primary);color:#fff;padding:12px 24px;border-radius:12px;font-size:.85rem;font-weight:800;text-decoration:none"><i class="fa-solid fa-arrow-left"></i>Back to Menu</a></div>`;}

function showToast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
</body>
</html>
